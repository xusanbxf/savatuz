<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAVAT.UZ — Mahsulot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><path d='M25 35h50l-6 30a3 3 0 0 1-3 2.5H34a3 3 0 0 1-3-2.5Z' fill='white'/><path d='M32 35L38 22L50 35M68 35L62 22L50 35' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f7f5fb; --surface: #fff; --ink: #1b1430; --ink-2: #4a4360; --ink-3: #8a849c;
    --line: #ece8f4; --brand: #6c2bd9; --brand-soft: #f1ebff; --hot: #f0432e;
    --save: #12a150; --save-soft: #e7f7ee; --r: 18px; --r-sm: 12px; --r-pill: 999px;
    --font: "Plus Jakarta Sans", system-ui, sans-serif;
    --display: "Sora", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid var(--line); padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
  .logo { font-family: var(--display); font-weight: 800; font-size: 20px; color: var(--brand); text-decoration: none; }
  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: var(--ink-2); text-decoration: none; background: var(--bg); border: 1.5px solid var(--line); border-radius: var(--r-pill); padding: 8px 16px; transition: .15s; margin-left: auto; }
  .back:hover { background: var(--brand-soft); border-color: var(--brand); color: var(--brand); }

  .wrap { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  /* Loading */
  .loading { text-align: center; padding: 80px 20px; color: var(--ink-3); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--brand); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Product layout */
  .product { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 640px) { .product { grid-template-columns: 1fr; } }

  .media { border-radius: var(--r); overflow: hidden; background: var(--surface); border: 1px solid var(--line); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
  .media img { width: 100%; height: 100%; object-fit: contain; }
  .ph { width: 100%; height: 100%; min-height: 280px; display: grid; place-items: center; background: linear-gradient(135deg, #ede4ff 0%, #e0d4f8 100%); }
  .ph span { font-size: 48px; }

  .info { display: flex; flex-direction: column; gap: 16px; }
  .cat-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--brand-soft); color: var(--brand); font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: var(--r-pill); text-transform: uppercase; letter-spacing: .04em; width: fit-content; }
  .name { font-family: var(--display); font-weight: 800; font-size: 26px; line-height: 1.2; letter-spacing: -.02em; }
  .sub { color: var(--ink-3); font-size: 14px; line-height: 1.6; }

  .price-box { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 18px; }
  .price-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 8px; }
  .price-now { font-family: var(--display); font-weight: 800; font-size: 32px; color: var(--ink); }
  .price-now small { font-size: 16px; font-weight: 600; color: var(--ink-3); }
  .price-was { font-size: 14px; color: var(--ink-3); text-decoration: line-through; }
  .save-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--save-soft); color: var(--save); font-weight: 800; font-size: 13px; padding: 6px 12px; border-radius: var(--r-pill); }

  .breakdown { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .bd-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink-2); }
  .bd-row b { color: var(--ink); }

  .variants { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 16px; }
  .var-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; color: var(--ink-2); }
  .var-group { margin-bottom: 10px; }
  .var-label { font-size: 12px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .var-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .var-chip { padding: 6px 14px; border-radius: var(--r-pill); border: 1.5px solid var(--line); font-size: 13px; font-weight: 600; background: var(--bg); color: var(--ink-2); cursor: pointer; transition: .15s; }
  .var-chip:hover { border-color: var(--brand); color: var(--brand); }

  .meta { display: flex; gap: 16px; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-size: 11px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: .04em; }
  .meta-val { font-size: 14px; font-weight: 600; color: var(--ink); }

  .btn-order { display: flex; align-items: center; justify-content: center; gap: 10px; height: 54px; border-radius: var(--r-pill); background: linear-gradient(135deg, var(--brand) 0%, #9333ea 100%); color: #fff; font-family: var(--display); font-weight: 800; font-size: 16px; border: none; cursor: pointer; text-decoration: none; transition: .18s; box-shadow: 0 8px 24px rgba(108,43,217,.28); }
  .btn-order:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(108,43,217,.38); }

  .not-found { text-align: center; padding: 80px 20px; }
  .not-found h2 { font-family: var(--display); font-size: 24px; margin-bottom: 10px; }
  .not-found p { color: var(--ink-3); font-size: 15px; }
</style>
</head>
<body>

<div class="header">
  <a href="https://www.savatmarket.uz" class="logo">🛒 SAVAT.UZ</a>
  <a href="https://www.savatmarket.uz" class="back">← Bosh sahifa</a>
</div>

<div class="wrap">
  <div id="root">
    <div class="loading">
      <div class="spinner"></div>
      <div>Yuklanmoqda...</div>
    </div>
  </div>
</div>

<script>
var SB = "https://gjsaelqqubmlwnmfyuso.supabase.co";
var KEY = "sb_publishable_ckKVB9tWH-dXgHh_dtgapQ_Htl3IACg";
var CARGO_PER_KG = 120000;
var SERVICE_UNDER = 20000;
var SERVICE_PER_KG = 15000;

var CATS = { shoes: "👟 Oyoq kiyim", tech: "📱 Texnika", fashion: "👗 Kiyim", home: "🏠 Uy-ro'zg'or" };

function fmt(n) { return Math.round(n).toLocaleString("ru-RU").replace(/\u00A0/g, " "); }
function h(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function serviceFee(w) { return w < 1 ? SERVICE_UNDER : Math.ceil(w) * SERVICE_PER_KG; }
function cargoFee(w) { return Math.round(w * CARGO_PER_KG / 1000) * 1000; }
function breakdown(p) {
  var cargo = cargoFee(p.weight);
  var service = serviceFee(p.weight);
  var total = p.china + cargo + service;
  var save = Math.max(0, p.market - total);
  var pct = p.market > 0 ? Math.max(0, Math.round(save / p.market * 100)) : 0;
  return { china: p.china, cargo: cargo, service: service, total: total, market: p.market, save: save, pct: pct };
}

function renderProduct(p, variants) {
  var b = breakdown(p);
  var imgHtml = p.image_url
    ? '<img src="'+h(p.image_url)+'" alt="'+h(p.name_uz)+'" />'
    : '<div class="ph"><span>🛒</span></div>';

  // Variants
  var varHtml = "";
  if (variants && variants.length > 0) {
    var groups = {};
    variants.forEach(function(v) {
      if (!groups[v.type]) groups[v.type] = [];
      groups[v.type].push(v.value);
    });
    var typeLabels = { color: "Rang", size: "O'lcham", model: "Model" };
    var groupsHtml = Object.keys(groups).map(function(type) {
      var chips = groups[type].map(function(val) {
        return '<span class="var-chip">'+h(val)+'</span>';
      }).join("");
      return '<div class="var-group"><div class="var-label">'+(typeLabels[type]||type)+'</div><div class="var-chips">'+chips+'</div></div>';
    }).join("");
    varHtml = '<div class="variants"><div class="var-title">Variantlar</div>'+groupsHtml+'</div>';
  }

  document.getElementById("root").innerHTML =
    '<div class="product">'+
      '<div class="media">'+imgHtml+'</div>'+
      '<div class="info">'+
        '<div class="cat-badge">'+(CATS[p.cat]||p.cat||"")+'</div>'+
        '<h1 class="name">'+h(p.name_uz)+'</h1>'+
        (p.sub_uz ? '<p class="sub">'+h(p.sub_uz)+'</p>' : '')+
        '<div class="price-box">'+
          '<div class="price-row">'+
            '<div class="price-now">'+fmt(b.total)+' <small>so\'m</small></div>'+
            (b.pct > 0 ? '<div class="save-chip">−'+b.pct+'%</div>' : '')+
          '</div>'+
          (b.pct > 0 ? '<div class="price-was">Bozor narxi: '+fmt(b.market)+' so\'m</div>' : '')+
          '<div class="breakdown">'+
            '<div class="bd-row"><span>🏭 Zavod narxi</span><b>'+fmt(p.china)+' so\'m</b></div>'+
            '<div class="bd-row"><span>🚚 Kargo</span><b>'+fmt(b.cargo)+' so\'m</b></div>'+
            '<div class="bd-row"><span>⚙️ Xizmat</span><b>'+fmt(b.service)+' so\'m</b></div>'+
          '</div>'+
        '</div>'+
        varHtml+
        '<div class="meta">'+
          (p.rating ? '<div class="meta-item"><span class="meta-label">Reyting</span><span class="meta-val">⭐ '+p.rating+'</span></div>' : '')+
          (p.sold ? '<div class="meta-item"><span class="meta-label">Sotilgan</span><span class="meta-val">'+fmt(p.sold)+' ta</span></div>' : '')+
          (p.days ? '<div class="meta-item"><span class="meta-label">Yetkazish</span><span class="meta-val">'+p.days+' kun</span></div>' : '')+
          (p.weight ? '<div class="meta-item"><span class="meta-label">Og\'irligi</span><span class="meta-val">'+p.weight+' kg</span></div>' : '')+
        '</div>'+
        '<a href="https://www.savatmarket.uz?p='+p.id+'" class="btn-order">🛒 Buyurtma berish</a>'+
      '</div>'+
    '</div>';

  document.title = "SAVAT.UZ — " + p.name_uz;
}

function renderNotFound() {
  document.getElementById("root").innerHTML =
    '<div class="not-found">'+
      '<div style="font-size:48px;margin-bottom:16px;">😕</div>'+
      '<h2>Mahsulot topilmadi</h2>'+
      '<p>Bu mahsulot mavjud emas yoki o\'chirilgan</p>'+
      '<a href="https://www.savatmarket.uz" style="display:inline-block;margin-top:20px;color:var(--brand);font-weight:700;">← Bosh sahifaga qaytish</a>'+
    '</div>';
}

// Main
var params = new URLSearchParams(window.location.search);
var pid = params.get("p");

if (!pid) {
  renderNotFound();
} else {
  Promise.all([
    fetch(SB+"/rest/v1/products?id=eq."+pid+"&select=*", {
      headers: { "apikey": KEY, "Authorization": "Bearer "+KEY }
    }).then(function(r){ return r.json(); }),
    fetch(SB+"/rest/v1/product_variants?product_id=eq."+pid+"&order=id", {
      headers: { "apikey": KEY, "Authorization": "Bearer "+KEY }
    }).then(function(r){ return r.json(); }).catch(function(){ return []; })
  ]).then(function(res) {
    var rows = res[0];
    var variants = res[1] || [];
    if (!Array.isArray(rows) || rows.length === 0) { renderNotFound(); return; }
    renderProduct(rows[0], variants);
  }).catch(function() { renderNotFound(); });
}
</script>
</body>
</html>
