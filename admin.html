<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SAVAT.UZ — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f5fb;
    --surface: #ffffff;
    --ink: #1b1430;
    --ink-2: #4a4360;
    --ink-3: #8a849c;
    --line: #ece8f4;
    --brand: #6c2bd9;
    --brand-2: #9333ea;
    --r: 14px;
    --r-sm: 10px;
    --font: "Plus Jakarta Sans", system-ui, sans-serif;
    --display: "Sora", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--font); background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h1 { font-family: var(--display); font-weight: 800; letter-spacing: -.02em; }

  /* Login */
  .login-box {
    max-width: 380px; margin: 80px auto; background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--r); padding: 28px;
    box-shadow: 0 8px 30px rgba(27,20,48,.08);
  }
  .login-box h1 { font-size: 22px; margin: 0 0 6px; text-align: center; }
  .login-box p { color: var(--ink-3); font-size: 13.5px; text-align: center; margin: 0 0 22px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; }
  input {
    width: 100%; height: 46px; border-radius: var(--r-sm); border: 1.5px solid var(--line);
    padding: 0 14px; font-size: 15px; font-family: inherit; margin-bottom: 14px; background: var(--bg);
    color: var(--ink);
  }
  input:focus { outline: none; border-color: var(--brand); }
  button {
    width: 100%; height: 46px; border-radius: var(--r-sm); border: none; cursor: pointer;
    font-family: inherit; font-weight: 700; font-size: 15px; color: #fff;
    background: linear-gradient(140deg, #7c3aed 0%, #c026d3 100%);
  }
  button:disabled { opacity: .6; cursor: default; }
  .err { color: #e11d48; font-size: 13.5px; margin: -6px 0 12px; min-height: 1em; }

  /* Header */
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .top h1 { font-size: 24px; margin: 0; }
  .logout { width: auto; padding: 0 18px; height: 38px; font-size: 13.5px; background: var(--surface); color: var(--ink); border: 1.5px solid var(--line); }

  /* Orders */
  .order-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
    padding: 18px; margin-bottom: 14px;
  }
  .order-head {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--line); padding-bottom: 12px; margin-bottom: 12px;
  }
  .order-num { font-family: var(--display); font-weight: 800; font-size: 17px; }
  .order-date { color: var(--ink-3); font-size: 13px; }
  .order-total { font-family: var(--display); font-weight: 800; font-size: 18px; }
  .order-body { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; }
  @media (max-width: 640px) { .order-body { grid-template-columns: 1fr; } }
  .items-list { font-size: 14px; line-height: 1.8; color: var(--ink-2); }
  .items-list b { color: var(--ink); }
  .info-row { font-size: 14px; color: var(--ink-2); margin-bottom: 4px; }
  .info-row b { color: var(--ink); font-weight: 600; }
  select.status {
    height: 40px; border-radius: var(--r-sm); border: 1.5px solid var(--line);
    padding: 0 12px; font-family: inherit; font-weight: 700; font-size: 13.5px; color: #fff; cursor: pointer;
    background-color: var(--brand);
  }
  .status-yangi { background-color: #f59e0b; }
  .status-tasdiqlangan { background-color: #2563eb; }
  .status-yetkazilmoqda { background-color: #7c3aed; }
  .status-yakunlangan { background-color: #12a150; }
  .status-bekor { background-color: #e11d48; }
  .empty { text-align: center; color: var(--ink-3); padding: 60px 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    var SUPABASE_URL = "https://gjsaelqqubmlwnmfyuso.supabase.co";
    var SUPABASE_KEY = "sb_publishable_ckKVB9tWH-dXgHh_dtgapQ_Htl3IACg";

    var REGIONS = {
      "tsh-c": "Toshkent shahri", "tsh-v": "Toshkent viloyati", "sam": "Samarqand",
      "bux": "Buxoro", "and": "Andijon", "far": "Farg'ona", "nam": "Namangan",
      "qash": "Qashqadaryo", "surx": "Surxondaryo", "xor": "Xorazm",
      "nav": "Navoiy", "jiz": "Jizzax", "sir": "Sirdaryo", "qor": "Qoraqalpog'iston"
    };

    var STATUSES = [
      { id: "yangi", label: "Yangi" },
      { id: "tasdiqlangan", label: "Tasdiqlangan" },
      { id: "yetkazilmoqda", label: "Yetkazilmoqda" },
      { id: "yakunlangan", label: "Yakunlangan" },
      { id: "bekor", label: "Bekor qilindi" }
    ];

    var root = document.getElementById("root");
    var token = sessionStorage.getItem("savat_admin_token") || null;

    function fmt(n) {
      return Math.round(n).toLocaleString("ru-RU").replace(/\u00A0/g, " ");
    }

    function renderLogin(errMsg) {
      root.innerHTML =
        '<div class="login-box">' +
          '<h1>SAVAT.UZ — Admin</h1>' +
          '<p>Buyurtmalarni boshqarish paneli</p>' +
          '<label>Email</label>' +
          '<input id="email" type="email" placeholder="email@misol.com" />' +
          '<label>Parol</label>' +
          '<input id="password" type="password" placeholder="••••••••" />' +
          '<div class="err">' + (errMsg || "") + '</div>' +
          '<button id="loginBtn">Kirish</button>' +
        '</div>';

      document.getElementById("loginBtn").onclick = login;
      document.getElementById("password").addEventListener("keydown", function (e) {
        if (e.key === "Enter") login();
      });
    }

    function login() {
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;
      var btn = document.getElementById("loginBtn");
      btn.disabled = true; btn.textContent = "Kirilmoqda...";

      fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
      })
        .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
        .then(function (r) {
          if (!r.ok || !r.data.access_token) {
            renderLogin("Email yoki parol noto'g'ri");
            return;
          }
          token = r.data.access_token;
          sessionStorage.setItem("savat_admin_token", token);
          renderOrders();
        })
        .catch(function () { renderLogin("Xatolik yuz berdi, qayta urinib ko'ring"); });
    }

    function logout() {
      sessionStorage.removeItem("savat_admin_token");
      token = null;
      renderLogin();
    }

    function statusClass(s) {
      if (s === "yangi") return "status-yangi";
      if (s === "tasdiqlangan") return "status-tasdiqlangan";
      if (s === "yetkazilmoqda") return "status-yetkazilmoqda";
      if (s === "yakunlangan") return "status-yakunlangan";
      if (s === "bekor") return "status-bekor";
      return "status-yangi";
    }

    function renderOrders() {
      root.innerHTML =
        '<div class="wrap">' +
          '<div class="top"><h1>Buyurtmalar</h1><button class="logout" id="logoutBtn">Chiqish</button></div>' +
          '<div id="list">Yuklanmoqda...</div>' +
        '</div>';

      document.getElementById("logoutBtn").onclick = logout;

      fetch(SUPABASE_URL + "/rest/v1/orders?select=*&order=created_at.desc", {
        headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + token }
      })
        .then(function (res) {
          if (res.status === 401) { logout(); return Promise.reject("auth"); }
          return res.json();
        })
        .then(function (orders) {
          var list = document.getElementById("list");
          if (!orders.length) {
            list.innerHTML = '<div class="empty">Hozircha buyurtmalar yo\'q</div>';
            return;
          }
          list.innerHTML = orders.map(renderOrderCard).join("");

          orders.forEach(function (o) {
            var sel = document.getElementById("status-" + o.id);
            if (sel) {
              sel.className = "status " + statusClass(o.status);
              sel.onchange = function () { updateStatus(o.id, sel.value, sel); };
            }
          });
        })
        .catch(function (err) {
          if (err !== "auth") document.getElementById("list").innerHTML = '<div class="empty">Xatolik yuz berdi</div>';
        });
    }

    function renderOrderCard(o) {
      var items = (o.items || []).map(function (it) {
        return '<div><b>' + it.qty + '×</b> ' + (it.name_uz || it.name_ru || ("Mahsulot #" + it.id)) +
          ' — ' + fmt(it.price * it.qty) + ' so\'m</div>';
      }).join("");

      var statusOptions = STATUSES.map(function (s) {
        return '<option value="' + s.id + '"' + (s.id === o.status ? ' selected' : '') + '>' + s.label + '</option>';
      }).join("");

      var regionName = REGIONS[o.region] || o.region || "—";
      var date = new Date(o.created_at).toLocaleString("ru-RU");

      return (
        '<div class="order-card">' +
          '<div class="order-head">' +
            '<div><div class="order-num">' + o.order_num + '</div><div class="order-date">' + date + '</div></div>' +
            '<div class="order-total">' + fmt(o.total) + ' so\'m</div>' +
            '<select class="status" id="status-' + o.id + '">' + statusOptions + '</select>' +
          '</div>' +
          '<div class="order-body">' +
            '<div class="items-list">' + items + '</div>' +
            '<div>' +
              '<div class="info-row"><b>Tel:</b> ' + (o.phone || "—") + '</div>' +
              '<div class="info-row"><b>Hudud:</b> ' + regionName + '</div>' +
              '<div class="info-row"><b>Shahar:</b> ' + (o.city || "—") + '</div>' +
              '<div class="info-row"><b>Manzil:</b> ' + (o.address || "—") + '</div>' +
              (o.comment ? '<div class="info-row"><b>Izoh:</b> ' + o.comment + '</div>' : '') +
              '<div class="info-row"><b>To\'lov:</b> ' + (o.pay_method || "—") + '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }

    function updateStatus(id, status, sel) {
      sel.className = "status " + statusClass(status);
      fetch(SUPABASE_URL + "/rest/v1/orders?id=eq." + id, {
        method: "PATCH",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json",
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ status: status })
      });
    }

    if (token) renderOrders(); else renderLogin();
  </script>
</body>
</html>
