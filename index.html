<style>
  /* ===== SAVAT.UZ — Premium Dark Design 2026 ===== */
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    /* Core palette */
    --bg:       #080810;
    --surface:  #111120;
    --surface-2:#16162a;
    --surface-3:#1e1e35;
    --ink:      #f0f0ff;
    --ink-2:    #9898c0;
    --ink-3:    #5a5a80;
    --line:     rgba(255,255,255,.08);
    --line-2:   rgba(255,255,255,.05);

    /* Brand */
    --brand:      #7B4FFF;
    --brand-2:    #9B6FFF;
    --brand-ink:  #5030cc;
    --brand-soft: rgba(123,79,255,.15);
    --brand-glow: 0 0 40px rgba(123,79,255,.35);

    /* Accents */
    --gold:       #F5B638;
    --gold-soft:  rgba(245,182,56,.12);
    --hot:        #FF4545;
    --hot-soft:   rgba(255,69,69,.12);
    --save:       #00D97E;
    --save-soft:  rgba(0,217,126,.12);

    /* Radii */
    --r-lg: 20px;
    --r:    14px;
    --r-sm: 10px;
    --r-pill: 999px;

    /* Shadows */
    --sh-1: 0 1px 0 rgba(255,255,255,.04), 0 4px 20px rgba(0,0,0,.4);
    --sh-2: 0 8px 40px rgba(0,0,0,.6);
    --sh-brand: 0 8px 32px rgba(123,79,255,.4);

    --maxw: 1240px;
    --font: "Inter", system-ui, sans-serif;
    --display: "Space Grotesk", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; max-width: 100%; overflow-x: clip; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--brand); color: #fff; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { max-width: 100%; display: block; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  /* ===== HEADER ===== */
  .hdr {
    position: sticky; top: 0; z-index: 60;
    background: rgba(8,8,16,.85);
    backdrop-filter: saturate(1.5) blur(20px);
    border-bottom: 1px solid var(--line);
  }
  .hdr-row { display: flex; align-items: center; gap: 20px; height: 68px; }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 11px;
    background: linear-gradient(140deg, var(--brand) 0%, #a855f7 100%);
    box-shadow: var(--sh-brand);
    display: grid; place-items: center; flex: none;
  }
  .brand-mark svg { width: 22px; height: 22px; }
  .brand-name { font-family: var(--display); font-weight: 700; font-size: 20px; letter-spacing: -.03em; line-height: 1; color: var(--ink); }
  .brand-name .uz { color: var(--brand); }
  .brand-tag { font-size: 10px; color: var(--ink-3); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; margin-top: 2px; }
  .nav { display: flex; gap: 2px; margin-left: 12px; }
  .nav button {
    padding: 8px 14px; border-radius: var(--r-pill);
    font-weight: 500; font-size: 14px; color: var(--ink-3);
    background: transparent; border: 1px solid transparent;
    transition: .15s;
  }
  .nav button:hover { color: var(--ink); background: var(--surface-2); border-color: var(--line); }
  .burger { display: none; width: 40px; height: 40px; border-radius: 10px; align-items: center; justify-content: center; color: var(--ink-2); border: 1px solid var(--line); background: var(--surface-2); }
  .burger svg { width: 20px; height: 20px; }
  .search { flex: 1; max-width: 420px; position: relative; }
  .search input {
    width: 100%; height: 42px; border-radius: var(--r-pill);
    border: 1px solid var(--line); background: var(--surface-2);
    padding: 0 40px 0 42px; font-size: 14px; font-family: inherit; color: var(--ink) !important;
    -webkit-text-fill-color: var(--ink) !important;
    caret-color: var(--ink); transition: .18s; outline: none;
  }
  .search input::placeholder { color: var(--ink-3); }
  .search input:focus { border-color: var(--brand); background: var(--surface-3); box-shadow: 0 0 0 3px var(--brand-soft); }
  .search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--ink-3); }
  .search .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; border-radius: 50%; background: var(--ink-3); color: #fff; border: none; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
  .hdr-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .acct-btn {
    display: flex; align-items: center; gap: 7px; height: 40px; padding: 0 14px;
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: var(--r-pill); font-weight: 600; font-size: 13.5px; color: var(--ink-2);
    transition: .15s;
  }
  .acct-btn:hover { border-color: var(--brand); color: var(--ink); }
  .acct-label { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lang { display: flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-pill); padding: 3px; gap: 2px; }
  .lang button { padding: 5px 11px; border-radius: var(--r-pill); font-weight: 600; font-size: 12.5px; color: var(--ink-3); transition: .15s; }
  .lang button.on { background: var(--brand); color: #fff; }
  .cart-btn {
    display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px;
    background: var(--brand); color: #fff; border-radius: var(--r-pill);
    font-weight: 700; font-size: 14px; transition: .18s; position: relative;
  }
  .cart-btn:hover { background: var(--brand-2); transform: translateY(-1px); box-shadow: var(--sh-brand); }
  .cart-btn svg { width: 17px; height: 17px; }
  .cart-count {
    position: absolute; top: -5px; right: -5px; min-width: 19px; height: 19px; padding: 0 5px;
    background: var(--hot); color: #fff; border-radius: 999px; font-size: 11px; font-weight: 800;
    display: grid; place-items: center; border: 2px solid var(--bg);
  }

  /* ===== HERO ===== */
  .hero { padding: 48px 0 0; }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: stretch; min-height: 480px; }

  .hero-left {
    background: linear-gradient(135deg, #0f0f2a 0%, #1a0d3d 50%, #0d1a3d 100%);
    border: 1px solid rgba(123,79,255,.25);
    border-radius: var(--r-lg); padding: 44px 44px 40px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .hero-left::before {
    content: ""; position: absolute; top: -80px; right: -80px;
    width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, rgba(123,79,255,.3) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-left::after {
    content: ""; position: absolute; bottom: -60px; left: -60px;

  <script type="text/babel">
/* ============ SAVAT.UZ — components ============ */
const { useState, useEffect, useRef } = React;
const I = window.Icons;
const { breakdown, fmt } = window.SAVAT;

/* ---- placeholder media tile ---- */
function Media({ p, label }) {
  if (p.image_url) {
    return (
      <div className="ph" style={{ background: p.tile, padding: 0, overflow: "hidden" }}>
        <img src={p.image_url} alt={p.name.uz} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
      </div>
    );
  }
  return (
    <div className="ph" style={{ background: p.tile }}>
      <span className="ph-label">{label || p.name.uz.toLowerCase()}</span>
    </div>
  );
}

/* ---- animated count-up ---- */
function useCountUp(target, on) {
  const [v, setV] = useState(target);
  useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!on || document.hidden || reduce) { setV(target); return; }
    let raf, start;
    const dur = 700;
    setV(0);
    const step = (t) => {
      if (!start) start = t;
      const k = Math.min((t - start) / dur, 1);
      const e = 1 - Math.pow(1 - k, 3);
      setV(target * e);
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => setV(target), dur + 200);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, on]);
  return v;
}

/* ---- Header ---- */
function Header({ t, lang, setLang, cartCount, onCart, onHome, user, onAccount, onMenu, onMyOrders, onHelp, onCatalog, query, onSearch, products, onSelect }) {
  return (
    <header className="hdr">
      <div className="wrap hdr-row">
        <button className="burger" onClick={onMenu} aria-label="menu"><I.menu /></button>
        <div className="brand" onClick={onHome}>
          <div className="brand-mark"><I.basket /></div>
          <div>
            <div className="brand-name">SAVAT<span className="uz">.UZ</span></div>
            <div className="brand-tag">{t.tag}</div>
          </div>
        </div>
        <nav className="nav">
          <button onClick={onHome}>{t.nav_home}</button>
          <button onClick={onCatalog}>{t.nav_catalog}</button>
          {user && <button onClick={onMyOrders}>{t.nav_track}</button>}
          <button onClick={onHelp}>{t.nav_help}</button>
        </nav>
        <div className="hdr-actions">
          <div className="lang">
            <button className={lang === "uz" ? "on" : ""} onClick={() => setLang("uz")}>UZ</button>
            <button className={lang === "ru" ? "on" : ""} onClick={() => setLang("ru")}>RU</button>
          </div>
          <button className="acct-btn" onClick={onAccount}>
            <I.user style={{ width: 18, height: 18 }} />
            <span className="acct-label">{user ? user.name.split(" ")[0] : t.login}</span>
          </button>
          <button className="cart-btn" onClick={onCart}>
            <I.cart />
            <span className="cart-word">{t.cart_title}</span>
            {cartCount > 0 && <span className="cart-count">{cartCount}</span>}
          </button>
        </div>
      </div>
    </header>
  );
}


/* ---- Search with Dropdown ---- */
function SearchBox({ t, query, onSearch, products, onSelect, lang, mobile }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const fmt = window.SAVAT.fmt;
  const bd = window.SAVAT.breakdown;

  const suggestions = query.trim().length > 0
    ? products.filter(p => {
        const q = query.trim().toLowerCase();
        return p.name.uz.toLowerCase().includes(q) || p.name.ru.toLowerCase().includes(q);
      }).slice(0, 6)
    : [];

  React.useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
  }, []);

  const inner = (
    <div className="search-wrap" ref={ref}>
      <div className="search">
        <I.search />
        <input
          placeholder={t.search}
          value={query}
          onChange={(e) => { onSearch(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          onKeyDown={(e) => { if(e.key === "Escape") { onSearch(""); setOpen(false); } }}
        />
        {query && <button className="search-clear" onClick={() => { onSearch(""); setOpen(false); }}>×</button>}
      </div>
      {open && query.trim().length > 0 && (
        <div className="search-dropdown">
          {suggestions.length === 0 ? (
            <div className="sd-empty">🔍 {lang === "ru" ? "Ничего не найдено" : "Hech narsa topilmadi"}</div>
          ) : suggestions.map(p => {
            const b = bd(p);
            const imgUrl = (p.image_urls && p.image_urls[0]) || p.image_url;
            return (
              <div className="sd-item" key={p.id} onMouseDown={(e) => { e.preventDefault(); onSelect(p); onSearch(""); setOpen(false); }}>
                <div className="sd-img">
                  {imgUrl ? <img src={imgUrl} alt={p.name[lang||"uz"]} onError={(e)=>{e.target.style.display="none";}} /> : <div style={{width:"100%",height:"100%",background:p.tile||"#ede9ff",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}}>{"🛒"}</div>}
                </div>
                <div className="sd-info">
                  <div className="sd-name">{p.name[lang||"uz"]}</div>
                  <div className="sd-price">{fmt(b.total)} so'm</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  if(mobile) return <div className="mobile-search">{inner}</div>;
  return inner;
}

function MobileSearch({ t, query, onSearch, products, onSelect, lang }) {
  return <SearchBox t={t} query={query} onSearch={onSearch} products={products} onSelect={onSelect} lang={lang} mobile={true} />;
}

/* ---- Hero ---- */
function Hero({ t, lang, product, onView, onAdd }) {
  const b = breakdown(product);
  return (
    <section className="hero">
      <div className="wrap hero-grid">
        <div className="hero-left up">
          <span className="kicker"><span className="dot" />{t.hero_kicker}</span>
          <h1 className="hero-h1">{t.hero_title}</h1>
          <p className="hero-lead">{t.hero_lead}</p>
          <div className="hero-ticker">
            <div className="hero-ticker-num">3–5×</div>
            <div className="hero-ticker-label">
              <strong>{lang === "ru" ? "Дешевле рынка" : "Bozordan arzon"}</strong>
              {lang === "ru" ? "Прямо с заводов Китая" : "To'g'ridan-to'g'ri Xitoy zavodidan"}
            </div>
          </div>
          <div className="hero-cta-row">
            <button className="btn-primary" onClick={() => onView(product)}>
              {t.hero_cta} <I.arrow style={{ width: 18, height: 18 }} />
            </button>
            <button className="btn-ghost" onClick={() => onView(product)}>{t.hero_secondary}</button>
          </div>
        </div>

        <div className="hero-card up">
          <div className="hero-media" style={{ cursor: "pointer" }} onClick={() => onView(product)}>
            <span className="badge-disc" style={{ position: "absolute", top: 14, left: 14, zIndex: 2 }}>−{b.pct}%</span>
            <Media p={product} />
          </div>
          <div className="hero-card-body">
            <h3 className="hero-card-title">{product.name[lang]}</h3>
            <p className="hero-card-sub">{product.sub[lang]}</p>
            <div className="hero-price-row">
              <div>
                <div className="hero-was">{fmt(b.market)} {t.unit}</div>
                <div className="hero-now">{fmt(b.total)} <small>{t.unit}</small></div>

              <span className="save-chip"><I.flame style={{ width: 14, height: 14 }} />{t.hero_save} {fmt(b.save)}</span>

}

/* ---- Category strip ---- */
function Cats({ cats, lang, active, onPick }) {

  return (
    <div className="wrap">
      <div className="cats">
        {cats.map((c) => (
          <button key={c.id} className={"cat" + (active === c.id ? " on" : "")} onClick={() => onPick(c.id)}>
            <span className="cat-emoji">{emojis[c.id] || "📦"}</span>
            {c[lang]}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ---- Product card ---- */
function ProductCard({ p, t, lang, qty, onView, onAdd, onInc, onDec }) {
  const b = breakdown(p);
  const stop = (e) => e.stopPropagation();
  return (
    <div className="card" onClick={() => onView(p)}>
      <div className="card-media">
        <span className="badge-disc">−{b.pct}%</span>

          {qty > 0 ? (
            <div className="stepper" onClick={stop}>

            </div>
          ) : (
            <button className="card-add" onClick={(e) => { stop(e); onAdd(p, e); }} aria-label={t.add}>
              <I.plus />
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---- Grid section ---- */
function Bestsellers({ products, t, lang, qtyFor, onView, onAdd, onInc, onDec, query, onSearch, allProducts, onSelect }) {

          <p className="sec-sub">{query ? (lang==="ru" ? "Результаты поиска: " : "Qidiruv natijalari: ") + products.length + (lang==="ru" ? " товаров" : " ta mahsulot") : t.best_sub}</p>

          </div>
          <div style={{ fontSize:14 }}>"{query}" {lang==="ru" ? "по вашему запросу нет товаров" : "bo'yicha mahsulot yo'q"}</div>
        </div>
      ) : (
        <div className="grid">
          {products.map((p) => (
            <ProductCard key={p.id} p={p} t={t} lang={lang} qty={qtyFor(p.id)}
              onView={onView} onAdd={onAdd} onInc={onInc} onDec={onDec} />

}

/* ---- Why strip ---- */
function Why({ t }) {
  const items = [
    { ic: <I.factory />, tk: "why1_t", dk: "why1_d" },

}

/* ---- Footer ---- */
function Footer({ t }) {

    if (otp.trim().length < 6) { setErr("Kodni to'liq kiriting"); return; }
    setLoading(true); setErr("");
    const { ok, d } = await sb("/auth/v1/verify", { type: "signup", email, token: otp.trim() });
    setLoading(false);
    if (!ok) { 
      setErr("Kod noto'g'ri yoki muddati o'tgan. Agar avval ro'yxatdan o'tgan bo'lsangiz — 'Kirishga qaytish' tugmasini bosib, email va parolingiz bilan kiring."); 
      return; 
    }
    const finalName = d.user?.user_metadata?.name || name || email.split("@")[0];
    onAuth({ name: finalName, email, token: d.access_token });
    setName(""); setEmail(""); setPassword(""); setOtp("");
  };

  // Parolni tiklash
  const doForgot = async () => {
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    setLoading(true); setErr("");
    const res = await fetch(SB_URL + "/auth/v1/recover", {
      method: "POST",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    setLoading(false);
    if (res.status === 429) {
      setErr("Urinishlar soni ko'payib ketdi. 5-10 daqiqadan keyin qayta urinib ko'ring.");
      return;
    }
    setTab("reset-sent");
  };

  const Brand = () => (
    <div className="modal-brand">
      <div className="brand-mark" style={{ width: 44, height: 44 }}><AC_I.basket style={{ width: 25, height: 25 }} /></div>
      <div className="brand-name" style={{ fontSize: 22 }}>SAVAT<span className="uz">.UZ</span></div>
    </div>
  );

  // OTP ekrani
  if (tab === "verify") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📧</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 6 }}>Emailni tasdiqlang</div>
          <div style={{ color: "#8a849c", fontSize: 13.5 }}>{info}</div>
          <div style={{ color: "#8a849c", fontSize: 12.5, marginTop: 8 }}>Agar xat kelmasa — avval ro'yxatdan o'tgan bo'lishingiz mumkin. "Kirishga qaytish" tugmasini bosing.</div>
        </div>
        <div className="auth-fields">
          <label className="field">
            <span>Tasdiqlash kodi</span>
            <div className="field-in">
              <AC_I.lock style={{ width: 18, height: 18 }} />
              <input value={otp} onChange={e => setOtp(e.target.value)} placeholder="123456"
                inputMode="numeric" maxLength={6}
                onKeyDown={e => { if (e.key === "Enter") doVerify(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
        </div>
        <button className="auth-submit" onClick={doVerify} disabled={loading}>
          {loading ? "Tekshirilmoqda..." : "Tasdiqlash"} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}
          onClick={() => { setTab("login"); setErr(""); }}>← Kirishga qaytish</p>
      </div>
    </div>
  );

  // Parol tiklash yuborildi
  if (tab === "reset-sent") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ textAlign: "center", padding: "16px 0" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>✉️</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 8 }}>Xat yuborildi</div>
          <div style={{ color: "#8a849c", fontSize: 13.5 }}><b>{email}</b> manziliga parolni tiklash havolasi yuborildi. Pochtangizni tekshiring.</div>
        </div>
        <button className="auth-submit" onClick={() => { setTab("login"); setErr(""); }}>
          Kirishga qaytish
        </button>
      </div>
    </div>
  );

  // Parolni unutdim
  if (tab === "forgot") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 4 }}>Parolni tiklash</div>
        <div style={{ color: "#8a849c", fontSize: 13.5, marginBottom: 16 }}>Emailingizga tiklash havolasi yuboramiz</div>
        <div className="auth-fields">
          <label className="field">
            <span>Email</span>
            <div className="field-in">
              <AC_I.user style={{ width: 18, height: 18 }} />
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="email@misol.com"
                onKeyDown={e => { if (e.key === "Enter") doForgot(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
        </div>
        <button className="auth-submit" onClick={doForgot} disabled={loading}>
          {loading ? "Yuborilmoqda..." : "Havolani yuborish"} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}
          onClick={() => { setTab("login"); setErr(""); }}>← Kirishga qaytish</p>
      </div>
    </div>
  );

  // Asosiy kirish / ro'yxatdan o'tish
  return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={(e) => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div className="auth-tabs">
          <button className={tab === "login" ? "on" : ""} onClick={() => { setTab("login"); setErr(""); }}>{t.auth_login_tab}</button>
          <button className={tab === "register" ? "on" : ""} onClick={() => { setTab("register"); setErr(""); }}>{t.auth_reg_tab}</button>
        </div>
        <div className="auth-fields">
          {tab === "register" && (
            <label className="field">
              <span>{t.auth_name}</span>
              <div className="field-in">
                <AC_I.user style={{ width: 18, height: 18 }} />
                <input value={name} onChange={(e) => setName(e.target.value)} placeholder={t.auth_name} />
              </div>
            </label>
          )}
          <label className="field">
            <span>Email</span>
            <div className="field-in">
              <AC_I.user style={{ width: 18, height: 18 }} />
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="email@misol.com" autoComplete="off" />
            </div>
          </label>
          <label className="field">
            <span>Parol</span>
            <div className="field-in">
              <AC_I.lock style={{ width: 18, height: 18 }} />
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" autoComplete="new-password"
                onKeyDown={(e) => { if (e.key === "Enter") tab === "login" ? doLogin() : doRegister(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
          {tab === "login" && (
            <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6c2bd9", cursor: "pointer", textAlign: "right" }}
              onClick={() => { setTab("forgot"); setErr(""); }}>Parolni unutdingizmi?</p>
          )}
        </div>
        <button className="auth-submit" onClick={tab === "login" ? doLogin : doRegister} disabled={loading}>
          {loading ? "Yuklanmoqda..." : t.auth_continue} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note">{t.auth_note}</p>
      </div>
    </div>
  );
}

/* ---------- Checkout ---------- */
function PaymentCard({ m, t, selected, onSelect }) {
  const icon = m.id === "cash" ? <AC_I.truck style={{ width: 20, height: 20 }} />
    : m.id === "payme" ? <AC_I.card style={{ width: 20, height: 20 }} />
    : <AC_I.spark style={{ width: 20, height: 20 }} />;
  return (
    <button
      className={"pay" + (m.soon ? " soon" : "") + (selected ? " on" : "")}
      onClick={() => !m.soon && onSelect(m.id)}
      disabled={m.soon}
    >
      <span className="pay-ic" style={{ background: m.tint, color: m.color }}>{icon}</span>
      <span className="pay-text">
        <span className="pay-name">{m.label}</span>
        <span className="pay-sub">{m.sub}</span>
      </span>
      {m.soon
        ? <span className="pay-soon"><AC_I.lock style={{ width: 12, height: 12 }} />{t.soon}</span>
        : <span className={"pay-radio" + (selected ? " on" : "")} />}
    </button>
  );
}

function Checkout({ items, t, lang, user, onBack, onPlace, onRequireAuth }) {
  const Media = window.SC.Media;
  const [region, setRegion] = useState("");
  const [city, setCity] = useState("");
  const [address, setAddress] = useState("");
  const [comment, setComment] = useState("");
  const [phone, setPhone] = useState("+998 ");
  const [pay, setPay] = useState("payme");
  const [err, setErr] = useState(false);

  useEffect(() => {
    if (user && user.phone && phone.replace(/\D/g, "").length <= 3) setPhone(user.phone);
  }, [user]);

  const total = items.reduce((s, it) => s + AC_D.breakdown(it.p).total * it.q, 0);
  const count = items.reduce((s, it) => s + it.q, 0);

  const methods = [
    { id: "payme", label: "Payme", sub: t.pay_payme_d, tint: "#e6f6fb", color: "#00b8d4" },
    { id: "click", label: "Click", sub: t.pay_click_d, tint: "#eef0ff", color: "#3461ff" },
    { id: "cash", label: t.pay_cash, sub: t.pay_cash_d, tint: "#e7f7ee", color: "#12a150", soon: true },
  ];

  if (!user) {
    return (
      <div className="pd wrap up">
        <button className="back-link" onClick={onBack}><AC_I.back style={{ width: 18, height: 18 }} />{t.back}</button>
        <div className="login-req">
          <div className="login-req-ic"><AC_I.lock style={{ width: 30, height: 30 }} /></div>
          <h2>{t.co_login_req_t}</h2>
          <p>{t.co_login_req_d}</p>
          <button className="auth-submit" style={{ maxWidth: 320, margin: "8px auto 0" }} onClick={onRequireAuth}>
            {t.login} / {t.auth_reg_tab}
          </button>
        </div>
      </div>
    );
  }

  const place = () => {
    if (!region || !phoneValid(phone) || city.trim().length < 2 || address.trim().length < 3) { setErr(true); return; }
    const num = "SV-" + Math.floor(100000 + Math.random() * 900000);
    const orderItems = items.map((it) => {
      const b = AC_D.breakdown(it.p);
      const imgs = it.p.image_urls && it.p.image_urls.length ? it.p.image_urls : (it.p.image_url ? [it.p.image_url] : []);
      return { id: it.p.id, name_uz: it.p.name.uz, name_ru: it.p.name.ru, qty: it.q, price: b.total, variant: it.variant || "", image_url: it.selectedImg || imgs[0] || null };
    });
    onPlace({ num, total, count, items: orderItems, region, city, address, phone, comment, pay });
  };

  return (
    <div className="pd wrap up">
      <button className="back-link" onClick={onBack}><AC_I.back style={{ width: 18, height: 18 }} />{t.back}</button>
      <h1 className="pd-title" style={{ marginBottom: 22 }}>{t.checkout}</h1>
      <div className="co-grid">
        <div className="co-main">
          {/* delivery */}
          <section className="co-card">
            <h3 className="co-h"><span className="co-num">1</span>{t.co_delivery}</h3>
            <div className="co-form">
              <label className="field">
                <span>{t.co_region}</span>
                <div className={"field-in" + (err && !region ? " bad" : "")}>
                  <AC_I.pin style={{ width: 18, height: 18 }} />
                  <select value={region} onChange={(e) => setRegion(e.target.value)}>
                    <option value="">{t.co_region_ph}</option>
                    {AC_D.REGIONS.map((r) => <option key={r.id} value={r.id}>{r[lang]}</option>)}
                  </select>
                </div>
              </label>
              <label className="field">
                <span>{t.co_city}</span>
                <div className={"field-in" + (err && city.trim().length < 2 ? " bad" : "")}>
                  <input value={city} onChange={(e) => setCity(e.target.value)} placeholder={t.co_city} />
                </div>
              </label>
              <label className="field span2">
                <span>{t.auth_phone}</span>
                <div className={"field-in" + (err && !phoneValid(phone) ? " bad" : "")}>
                  <AC_I.phone style={{ width: 18, height: 18 }} />
                  <input inputMode="tel" value={phone}
                    onChange={(e) => setPhone(maskPhone(e.target.value))}
                    onKeyDown={(e) => { if ((e.key === "Backspace" || e.key === "Delete") && phone.replace(/\D/g, "").length <= 3) e.preventDefault(); }}
                    placeholder="+998 90 123 45 67" />
                </div>
              </label>
              <label className="field span2">
                <span>{t.co_address}</span>
                <div className={"field-in" + (err && address.trim().length < 3 ? " bad" : "")}>
                  <input value={address} onChange={(e) => setAddress(e.target.value)} placeholder={t.co_address} />
                </div>
              </label>
              <label className="field span2">
                <span>{t.co_comment}</span>
                <div className="field-in">
                  <input value={comment} onChange={(e) => setComment(e.target.value)} placeholder={t.co_comment} />
                </div>
              </label>
            </div>
          </section>

          {/* payment */}
          <section className="co-card">
            <h3 className="co-h"><span className="co-num">2</span>{t.co_payment}</h3>
            <div className="pay-list">
              {methods.map((m) => (
                <PaymentCard key={m.id} m={m} t={t} selected={pay === m.id} onSelect={setPay} />
              ))}
            </div>
          </section>
        </div>

        {/* summary */}
        <aside className="co-side">
          <div className="co-summary">
            <h3 className="co-h" style={{ marginBottom: 14 }}>{t.co_summary}</h3>
            <div className="co-items">
              {items.map((it) => {
                const b = AC_D.breakdown(it.p);
                return (
                  <div className="co-item" key={it.p.id}>
                    <div className="co-item-media"><Media p={it.p} label="" /></div>
                    <div className="co-item-info">
                      <p className="co-item-name">{it.p.name[lang]}</p>
                      <span className="co-item-qty">{it.q} × {AC_D.fmt(b.total)} {t.unit}</span>
                    </div>
                    <span className="co-item-sum">{AC_D.fmt(b.total * it.q)}</span>
                  </div>
                );
              })}
            </div>
            <div className="co-line"><span>{t.co_items} ({count})</span><b>{AC_D.fmt(total)} {t.unit}</b></div>
            <div className="co-line"><span>{t.co_delivery_fee}</span><b className="free">{t.co_free}</b></div>
            <div className="co-total">
              <span>{t.co_total}</span>
              <span className="co-total-v">{AC_D.fmt(total)} <small>{t.unit}</small></span>
            </div>
            {err && <p className="field-err" style={{ textAlign: "center" }}>{t.co_err}</p>}
            <button className="co-place" onClick={place}>{t.co_place} <AC_I.check style={{ width: 18, height: 18 }} /></button>
          </div>
        </aside>
      </div>
    </div>
  );
}

    if (!user) return;
    fetch(SB_URL + "/rest/v1/chats?user_email=eq." + encodeURIComponent(user.email) + "&order=created_at.asc", {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    }).then(r => r.json()).then(data => {
      const msgs = data || [];
      if (!msgs.length) return;
      const maxId = msgs[msgs.length - 1].id;
      if (maxId > lastIdRef.current) {
        const newAdminMsgs = msgs.filter(m => m.id > lastIdRef.current && m.sender === "admin");
        setMessages(msgs);
        lastIdRef.current = maxId;
        if (!chatOpen && newAdminMsgs.length) setUnread(u => u + newAdminMsgs.length);
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
      } else if (lastIdRef.current === 0) {
        setMessages(msgs);
        lastIdRef.current = maxId;
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
      }
    });
  }, [user, chatOpen]);

  useEffect(() => {
    if (!user) return;
    fetchMessages();
    const iv = setInterval(fetchMessages, 1500);
    return () => clearInterval(iv);
  }, [user, fetchMessages]);

  useEffect(() => {
    if (chatOpen) {
      setUnread(0);
      setTimeout(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); inputRef.current?.focus(); }, 100);
    }
  }, [chatOpen]);

  const sendMsg = async () => {
    if (!msg.trim() || sending) return;
    setSending(true);
    const text = msg.trim();
    setMsg("");
    await fetch(SB_URL + "/rest/v1/chats", {
      method: "POST",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify({ user_email: user.email, sender: "user", message: text })
    });
    setSending(false);
    fetchMessages();
  };

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "24px 16px 100px" }}>
      <button onClick={onHome} style={{ background: "none", border: "none", cursor: "pointer", color: "#6c2bd9", fontWeight: 700, fontSize: 14, marginBottom: 20, padding: 0 }}>{t.help_back || "← Bosh sahifa"}</button>
      <h2 style={{ fontFamily: "Sora, sans-serif", fontWeight: 800, fontSize: 24, margin: "0 0 6px" }}>{t.help_title || "Yordam markazi"}</h2>
      <p style={{ color: "#8a849c", fontSize: 14, margin: "0 0 24px" }}>{t.help_sub}</p>

      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 32 }}>
        {faqs.map((f, i) => (
          <div key={i} style={{ background: "#fff", border: "1.5px solid #ece8f4", borderRadius: 14, overflow: "hidden" }}>
            <button onClick={() => setOpenFaq(openFaq === i ? null : i)}
              style={{ width: "100%", background: "none", border: "none", cursor: "pointer", padding: "16px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, textAlign: "left", fontFamily: "inherit", fontWeight: 700, fontSize: 14.5, color: "#1b1430" }}>
              <span>{f.q}</span>
              <span style={{ fontSize: 20, color: "#6c2bd9", flexShrink: 0, display: "inline-block", transform: openFaq === i ? "rotate(45deg)" : "none", transition: ".2s" }}>+</span>
            </button>
            {openFaq === i && <div style={{ padding: "0 18px 16px", fontSize: 14, color: "#4a4360", lineHeight: 1.6 }}>{f.a}</div>}
          </div>
        ))}
      </div>

      {!user && (
        <div style={{ background: "linear-gradient(135deg,#5b21b6,#7c3aed)", borderRadius: 18, padding: "22px 24px", textAlign: "center", color: "#fff" }}>
          <div style={{ fontSize: 28, marginBottom: 10 }}>💬</div>
          <div style={{ fontFamily: "Sora, sans-serif", fontWeight: 800, fontSize: 16, marginBottom: 8 }}>Admin bilan chat</div>
          <div style={{ fontSize: 13.5, opacity: .85, marginBottom: 16 }}>Kirish yoki ro'yxatdan o'tib, bevosita muloqot qiling</div>
          <button onClick={onLogin} style={{ background: "#fff", color: "#6c2bd9", border: "none", borderRadius: 10, padding: "12px 28px", fontFamily: "inherit", fontWeight: 800, fontSize: 14, cursor: "pointer" }}>Kirish / Ro'yxatdan o'tish</button>
        </div>
      )}

      {user && (
        <button onClick={() => setChatOpen(true)}
          style={{ position: "fixed", bottom: 80, right: 20, width: 58, height: 58, borderRadius: "50%", background: "linear-gradient(135deg,#7c3aed,#a855f7)", border: "none", cursor: "pointer", boxShadow: "0 4px 20px rgba(124,58,237,.4)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, zIndex: 90 }}>
          💬
          {unread > 0 && <span style={{ position: "absolute", top: 0, right: 0, background: "#e11d48", color: "#fff", fontSize: 11, fontWeight: 800, width: 20, height: 20, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>{unread}</span>}
        </button>
      )}

      {chatOpen && (
        <div style={{ position: "fixed", bottom: 80, right: 16, width: "calc(100% - 32px)", maxWidth: 420, height: 500, background: "#fff", borderRadius: 20, boxShadow: "0 8px 40px rgba(0,0,0,.18)", display: "flex", flexDirection: "column", overflow: "hidden", zIndex: 100 }}>
          <div style={{ background: "linear-gradient(135deg,#5b21b6,#7c3aed)", padding: "14px 16px", display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
            <div style={{ width: 36, height: 36, background: "rgba(255,255,255,.2)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🛍️</div>
            <div style={{ flex: 1 }}>
              <div style={{ color: "#fff", fontWeight: 800, fontSize: 14, fontFamily: "Sora, sans-serif" }}>SAVAT.UZ Yordam</div>
              <div style={{ color: "rgba(255,255,255,.75)", fontSize: 11.5 }}>🟢 Online</div>
            </div>
            <button onClick={() => setChatOpen(false)} style={{ background: "rgba(255,255,255,.15)", border: "none", borderRadius: 8, width: 32, height: 32, cursor: "pointer", color: "#fff", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "14px", background: "#f7f5fb", display: "flex", flexDirection: "column", gap: 8 }}>
            {messages.length === 0 && (
              <div style={{ textAlign: "center", color: "#8a849c", padding: "20px 0", fontSize: 13.5 }}>
                <div style={{ fontSize: 30, marginBottom: 6 }}>👋</div>Salom! Savolingizni yozing
              </div>
            )}
            {messages.map((m, i) => {
              const isUser = m.sender === "user";
              return (
                <div key={i} style={{ display: "flex", justifyContent: isUser ? "flex-end" : "flex-start", alignItems: "flex-end", gap: 6 }}>
                  {!isUser && <div style={{ width: 26, height: 26, background: "linear-gradient(135deg,#5b21b6,#7c3aed)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, flexShrink: 0 }}>🛍️</div>}
                  <div style={{ maxWidth: "75%", padding: "9px 13px", borderRadius: isUser ? "16px 16px 4px 16px" : "16px 16px 16px 4px", background: isUser ? "linear-gradient(135deg,#7c3aed,#a855f7)" : "#fff", color: isUser ? "#fff" : "#1b1430", fontSize: 14, lineHeight: 1.5, boxShadow: "0 1px 4px rgba(0,0,0,.07)" }}>
                    {m.message}
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef} />
          </div>
          <div style={{ padding: "10px 12px", borderTop: "1px solid #ece8f4", display: "flex", gap: 8, background: "#fff", flexShrink: 0 }}>
            <input ref={inputRef} value={msg} onChange={e => setMsg(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); sendMsg(); } }}
              placeholder="Xabar yozing..." disabled={sending}
              style={{ flex: 1, border: "1.5px solid #ece8f4", borderRadius: 10, padding: "10px 12px", fontSize: 14, fontFamily: "inherit", background: "#f7f5fb", outline: "none" }} />
            <button onClick={sendMsg} disabled={sending || !msg.trim()}
              style={{ width: 40, height: 40, borderRadius: 10, border: "none", background: msg.trim() ? "linear-gradient(135deg,#7c3aed,#a855f7)" : "#ece8f4", color: msg.trim() ? "#fff" : "#8a849c", cursor: msg.trim() ? "pointer" : "default", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>↑</button>
          </div>
        </div>
      )}
    </div>
  );
}
window.AC = { AuthModal, MobileMenu, Checkout, OrderSuccess, MyOrders, HelpPage };

</script>
  <script type="text/babel">
/* ============ SAVAT.UZ — product detail, cart, app ============ */
const { Media, useCountUp, Header, SearchBox, MobileSearch, Hero, Cats, ProductCard, Bestsellers, Why, Footer } = window.SC;
const { AuthModal, MobileMenu, Checkout, OrderSuccess, MyOrders, HelpPage } = window.AC;
const Ico = window.Icons;
const D = window.SAVAT;

/* ---- Image Swiper ---- */
function ImageSwiper({ p, lang, onThumbChange, onImgSelect, selectedImg, imgRequired }) {
  const imgs = (p.image_urls && p.image_urls.length > 0) ? p.image_urls : (p.image_url ? [p.image_url] : []);
  const total = imgs.length;
  const [idx, setIdx] = React.useState(0);
  const wrapRef = React.useRef(null);
  const startX = React.useRef(null);
  const dragXRef = React.useRef(0);
  const [dragX, setDragX] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const idxRef = React.useRef(idx);
  React.useEffect(() => { idxRef.current = idx; }, [idx]);

  const goTo = (i) => { if(i < 0 || i >= total) return; setIdx(i); if(onThumbChange) onThumbChange(i); if(onImgSelect) onImgSelect(imgs[i], i); };
  const prev = (e) => { if(e) e.stopPropagation(); goTo(idxRef.current - 1); };
  const next = (e) => { if(e) e.stopPropagation(); goTo(idxRef.current + 1); };

  const endDragWithDx = (dx) => {
    // dx > 0 = o'ngga surdi = chapga o'tish
    // dx < 0 = chapga surdi = o'ngga o'tish
    const cur = idxRef.current;
    if (Math.abs(dx) > 40) {
      if (dx > 0 && cur > 0) goTo(cur - 1);
      else if (dx < 0 && cur < total - 1) goTo(cur + 1);
    }
    startX.current = null; dragXRef.current = 0; setDragX(0); setDragging(false);
  };

  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; dragXRef.current = 0; setDragX(0); setDragging(true); };
  const onTouchMove  = (e) => {
    if (startX.current === null) return;
    const dx = e.touches[0].clientX - startX.current;
    dragXRef.current = dx; setDragX(dx);
  };
  const onTouchEnd = () => { endDragWithDx(dragXRef.current); };

  const onMouseDown = (e) => {
    if(total <= 1) return;
    e.preventDefault();
    startX.current = e.clientX; dragXRef.current = 0; setDragX(0); setDragging(true);
    const onMove = (ev) => {
      const dx = ev.clientX - startX.current;
      dragXRef.current = dx; setDragX(dx);
    };
    const onUp = () => {
      endDragWithDx(dragXRef.current);
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };
  const onMouseMove  = () => {};
  const onMouseUp    = () => {};
  const onMouseLeave = () => {};

  const pxOffset = dragging ? dragX : 0;
  const pctBase = -(idx * 100);

  const ChevL = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>;
  const ChevR = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;

  return (
    <div>
      <div
        className="swiper-wrap"
        ref={wrapRef}
        style={{ cursor: total > 1 ? (dragging ? "grabbing" : "grab") : "default" }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseLeave}
      >
        <div
          className={"swiper-track" + (dragging ? " no-anim" : "")}
          style={{ transform: `translateX(calc(${pctBase}% + ${pxOffset}px))` }}
        >
          {total === 0 ? (
            <div className="swiper-slide">
              <div className="ph" style={{ background: p.tile }}>
                <span className="ph-label">{p.name[lang || "uz"].toLowerCase()}</span>
              </div>
            </div>
          ) : imgs.map((url, i) => (
            <div className="swiper-slide" key={i}>
              <img src={url} alt={p.name[lang || "uz"]} draggable="false" />
            </div>
          ))}
        </div>

        <div className="swiper-badge">
          <span className="badge-disc" style={{ fontSize: 15, padding: "7px 14px" }}>−{window.SAVAT.breakdown(p).pct}%</span>
        </div>

        {total > 1 && (
          <>
            {idx > 0 && <button className="swiper-btn swiper-prev" onClick={prev} aria-label="Oldingi"><ChevL /></button>}
            {idx < total - 1 && <button className="swiper-btn swiper-next" onClick={next} aria-label="Keyingi"><ChevR /></button>}
          </>
        )}
      </div>

      {total > 1 && (
        <>
          <div className="swiper-dots">
            {imgs.map((_, i) => <button key={i} className={"swiper-dot" + (i === idx ? " on" : "")} onClick={() => goTo(i)} />)}
          </div>
          <div className="swiper-thumbs">
            {imgs.map((url, i) => {
              const isSelected = selectedImg === url;
              return (
                <div key={i}
                  className={"swiper-thumb" + (i === idx ? " on" : "")}
                  onClick={() => goTo(i)}
                  style={{ border: isSelected ? "2.5px solid #12a150" : undefined, borderRadius: 10 }}
                >
                  <img src={url} alt={"" + (i+1)} draggable="false" />
                  {isSelected && (
                    <div style={{ position:"absolute", inset:0, background:"rgba(18,161,80,.18)", display:"flex", alignItems:"center", justifyContent:"center", borderRadius:8 }}>
                      <span style={{ color:"#12a150", fontSize:18, fontWeight:800 }}>✓</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

/* ---- Variant Picker ---- */
function VariantPicker({ variants, selected, onSelect, productImages }) {
  if (!variants || variants.length === 0) return null;

  const groups = {};
  variants.forEach(v => {
    if (!groups[v.type]) groups[v.type] = [];
    groups[v.type].push(v);
  });

  const typeLabels = { color: "Rang", size: "Razmer", model: "Model" };

  return (
    <div style={{ margin: "16px 0" }}>
      {Object.entries(groups).map(([type, items]) => {
        const sel = selected[type];
        return (
          <div key={type} style={{ marginBottom: 16 }}>
            <div className="var-label">
              {typeLabels[type] || type}
              {sel && <span style={{ fontWeight: 800, color: "var(--ink)", textTransform: "none", letterSpacing: 0 }}> — {sel.value}</span>}
            </div>

            {type === "color" ? (
              /* Rang: kichik rasm kartochkalar (Taobao uslubi) */
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {items.map((v, i) => {
                  const isOn = sel && sel.id === v.id;
                  /* Rang uchun: agar image_url bo'lsa — rasm, bo'lmasa color_hex doira */
                  const imgSrc = v.image_url || (productImages && productImages[i]) || null;
                  return (
                    <button
                      key={v.id}
                      onClick={() => onSelect(type, v)}
                      style={{
                        position: "relative", padding: 0, border: "2px solid " + (isOn ? "var(--brand)" : "var(--line-2)"),
                        borderRadius: 10, overflow: "hidden", cursor: "pointer", background: "var(--surface-2)",
                        boxShadow: isOn ? "0 0 0 3px var(--brand-soft)" : "none",
                        transition: ".15s", flexShrink: 0,
                        width: imgSrc ? 56 : 40, height: imgSrc ? 56 : 40,
                      }}
                      title={v.value}
                    >
                      {imgSrc ? (
                        <img src={imgSrc} alt={v.value} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                      ) : (
                        <div style={{ width: "100%", height: "100%", background: v.color_hex || "#ccc",
                          display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {isOn && <span style={{ color: "#fff", fontSize: 16, fontWeight: 800, textShadow: "0 1px 3px rgba(0,0,0,.4)" }}>✓</span>}
                        </div>
                      )}
                      {isOn && imgSrc && (
                        <div style={{ position: "absolute", inset: 0, background: "rgba(108,43,217,.15)",
                          display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <span style={{ color: "var(--brand)", fontSize: 16, fontWeight: 800 }}>✓</span>
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            ) : (
              /* Razmer / Model: chip tugmalar */
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {items.map(v => {
                  const isOn = sel && sel.id === v.id;
                  return (
                    <button
                      key={v.id}
                      className={"var-chip" + (isOn ? " on" : "")}
                      onClick={() => onSelect(type, v)}
                    >
                      {v.value}
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- Product Detail ---------- */
function ProductDetail({ p, t, lang, qty, onBack, onAdd, onOrder, onInc, onDec }) {
  const b = D.breakdown(p);
  const [thumb, setThumb] = useState(0);
  const [selImg, setSelImg] = useState(null);
  const [open, setOpen] = useState(false);
  const total = useCountUp(b.total, true);
  const [variants, setVariants] = useState([]);
  const [selVars, setSelVars] = useState({});

  useEffect(() => {
    if(!p || !p.id) return;
    const SB = "https://gjsaelqqubmlwnmfyuso.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqc2FlbHFxdWJtbHdubWZ5dXNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDY5MzAsImV4cCI6MjA5NzAyMjkzMH0.zLx1yBAUdMqtTW61zibbhQts3zVk-aRQTmTjn0L1U9Y";
    fetch(SB + "/rest/v1/product_variants?product_id=eq." + p.id + "&order=id", {
      headers: { apikey: KEY }
    }).then(r => r.json()).then(rows => setVariants(rows || [])).catch(() => {});
  }, [p && p.id]);

  const types = [...new Set(variants.map(v => v.type))];
  const allSelected = types.length === 0 || types.every(tp => selVars[tp]);
  const varLabel = Object.values(selVars).map(v => v.value).join(", ");
  const pdImgs = (p.image_urls && p.image_urls.length > 0) ? p.image_urls : (p.image_url ? [p.image_url] : []);
  const imgRequired = pdImgs.length > 1;
  const canOrder = allSelected && (!imgRequired || selImg !== null);
  const under = p.weight < 1;

  const wLabel = p.weight < 1 ? Math.round(p.weight * 1000) + " g" : p.weight + " kg";
  const rows = [
    { ic: <Ico.factory />, lbl: t.pc_china, val: b.china },
    { ic: <Ico.plane />, lbl: t.pc_cargo, val: b.cargo },
    { ic: <Ico.shield />, lbl: t.pc_service, val: b.service },
  ];

  return (
    <div className="pd wrap up">
      <button className="back-link" onClick={onBack}><Ico.back style={{ width: 18, height: 18 }} />{t.back}</button>
      <div className="pd-grid">
        {/* gallery */}
        <div className="pd-gallery">
          <ImageSwiper p={p} lang={lang} onThumbChange={(i) => setThumb(i)} selectedImg={selImg} onImgSelect={(url, i) => { setSelImg(url); setThumb(i); }} imgRequired={imgRequired} />
        </div>

        {/* info */}
        <div>
          <span className="pd-src"><Ico.globe style={{ width: 15, height: 15 }} /> Pinduoduo · 拼多多</span>
          <h1 className="pd-title">{p.name[lang]}</h1>
          <p className="pd-sub">{p.sub[lang]}</p>
          <div className="pd-meta">
            <span className="stars" style={{ fontSize: 15 }}>{"★".repeat(5)}</span>
            <b>{p.rating}</b>
            <span className="sep" />
            <span>{D.fmt(p.sold)} {t.sold}</span>
            <span className="sep" />
            <span><b>{p.days}</b> {t.delivery_days}</span>
            <span className="sep" />
            <span>{t.weight}: <b>{wLabel}</b></span>
          </div>

          {/* price calculator */}
          <div className="calc">
            <div className="calc-h"><h3>{t.pc_title}</h3></div>
            {rows.map((r, i) => (
              <div className="calc-row" key={i}>
                <span className="lbl"><span className="ic" style={{ color: p.accent }}>{r.ic}</span>{r.lbl}</span>
                <span className="val">{D.fmt(r.val)} {t.unit}</span>
              </div>
            ))}
            <div className="calc-total">
              <div className="was">{t.pc_market}: <s>{D.fmt(b.market)} {t.unit}</s></div>
              <div className="now-row">
                <span className="now-lbl">{t.pc_total}</span>
                <span className="now">{D.fmt(total)} <small>{t.unit}</small></span>
              </div>
              <div className="calc-save"><Ico.flame style={{ width: 15, height: 15 }} />{t.pc_save} {D.fmt(b.save)} {t.unit}</div>
            </div>

            {/* service explainer */}
            <div className="svc">
              <button className={"svc-q" + (open ? " open" : "")} onClick={() => setOpen(!open)}>
                <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <Ico.shield style={{ width: 18, height: 18, color: "var(--brand)" }} />{t.service_q}
                </span>
                <Ico.chevron className="chev" style={{ width: 18, height: 18 }} />
              </button>
              {open && (
                <div className="svc-body pop">
                  <div className={"svc-rule" + (under ? " svc-active" : "")}>
                    <span className="k"><span className="badge">≤1</span>{t.service_r1}</span>
                    <span className="v">{t.service_r1v}</span>
                  </div>
                  <div className={"svc-rule" + (!under ? " svc-active" : "")}>
                    <span className="k"><span className="badge">1+</span>{t.service_r2}</span>
                    <span className="v">{t.service_r2v}</span>
                  </div>
                  <p className="svc-note">
                    {t.service_note} <b style={{ color: "var(--ink)" }}>{wLabel} → {D.fmt(b.service)} {t.unit}</b>
                  </p>
                </div>
              )}
            </div>
          </div>

          <VariantPicker
            variants={variants}
            selected={selVars}
            onSelect={(type, v) => setSelVars(prev => ({...prev, [type]: v}))}
            productImages={p.image_urls || (p.image_url ? [p.image_url] : [])}
          />
          {variants.length > 0 && !allSelected && (
            <div style={{fontSize:13,color:"#e05c00",fontWeight:700,marginBottom:10}}>
              ⚠️ Variantni tanlang
            </div>
          )}
          {imgRequired && selImg === null && (
            <div style={{fontSize:13,color:"#e05c00",fontWeight:700,marginBottom:10}}>
              ⚠️ Rasmni tanlang
            </div>
          )}
          <div className="pd-cta">
            <button className="order" onClick={() => { if(!canOrder) return; onOrder(p, varLabel, selImg || pdImgs[0] || null); }} style={!canOrder ? {opacity:.5} : {}}>{t.detail_order} <Ico.arrow style={{ width: 18, height: 18 }} /></button>
            {qty > 0 ? (
              <div className="stepper stepper-lg">
                <button onClick={() => onDec(p.id)} aria-label="-"><Ico.minus /></button>
                <span>{qty}</span>
                <button onClick={() => onInc(p)} aria-label="+"><Ico.plus /></button>
              </div>
            ) : (
              <button className="addc" onClick={(e) => { if(!canOrder) return; onAdd(p, e, varLabel, selImg || pdImgs[0] || null); }} style={!canOrder ? {opacity:.5} : {}} aria-label={t.detail_add}><Ico.cart style={{ width: 22, height: 22 }} /></button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Cart Drawer ---------- */
function CartDrawer({ open, items, t, lang, onClose, onQty, onRemove, onCheckout }) {
  const total = items.reduce((s, it) => s + D.breakdown(it.p).total * it.q, 0);
  const count = items.reduce((s, it) => s + it.q, 0);
  return (
    <>
      <div className={"scrim" + (open ? " on" : "")} onClick={onClose} />
      <aside className={"drawer" + (open ? " on" : "")}>
        <div className="drawer-h">
          <h3>{t.cart_title}{count > 0 ? ` · ${count}` : ""}</h3>
          <button className="x-btn" onClick={onClose}><Ico.x style={{ width: 20, height: 20 }} /></button>
        </div>
        <div className="drawer-body">
          {items.length === 0 ? (
            <div className="cart-empty">
              <div className="big"><Ico.cart style={{ width: 30, height: 30 }} /></div>
              <p>{t.cart_empty}</p>
            </div>
          ) : items.map((it) => {
            const b = D.breakdown(it.p);
            return (
              <div className="ci" key={it.p.id}>
                <div className="ci-media"><Media p={it.p} label="" /></div>
                <div className="ci-info">
                  <p className="ci-name">{it.p.name[lang]}</p>
                  <span className="ci-price">{D.fmt(b.total * it.q)} <small style={{ fontSize: 12, color: "var(--ink-3)" }}>{t.unit}</small></span>
                  <div>
                    <div className="ci-qty">
                      <button onClick={() => onQty(it.p.id, -1)}><Ico.minus style={{ width: 14, height: 14 }} /></button>
                      <span>{it.q}</span>
                      <button onClick={() => onQty(it.p.id, 1)}><Ico.plus style={{ width: 14, height: 14 }} /></button>
                    </div>
                  </div>
                </div>
                <button className="ci-rm" onClick={() => onRemove(it.p.id)}><Ico.x style={{ width: 16, height: 16 }} /></button>
              </div>
            );
          })}
        </div>
        {items.length > 0 && (
          <div className="drawer-foot">
            <div className="drawer-total">
              <span className="t-l">{t.cart_total}</span>
              <span className="t-v">{D.fmt(total)} <small style={{ fontSize: 16 }}>{t.unit}</small></span>
            </div>
            <button className="checkout" onClick={onCheckout}>{t.cart_checkout} →</button>
          </div>
        )}
      </aside>
    </>
  );
}

/* ---------- App ---------- */
function App() {
  const [lang, setLang] = useState(() => localStorage.getItem("savat_lang") || "uz");
  const [view, setView] = useState("home"); // home | product | checkout | success
  const [current, setCurrent] = useState(null);
  const [cat, setCat] = useState("all");
  const [cart, setCart] = useState(() => {
    try { return JSON.parse(localStorage.getItem("savat_cart") || "[]"); } catch(e) { return []; }
  });
  const [cartOpen, setCartOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [products, setProducts] = useState([]);
  const [productsLoading, setProductsLoading] = useState(true);
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem("savat_user") || "null"); } catch (e) { return null; }
  });
  const [authOpen, setAuthOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [order, setOrder] = useState(null);
  const [query, setQuery] = useState("");
  const toastTimer = useRef(null);

  const t = D.I18N[lang];
  useEffect(() => { localStorage.setItem("savat_lang", lang); }, [lang]);
  useEffect(() => { localStorage.setItem("savat_cart", JSON.stringify(cart)); }, [cart]);
  useEffect(() => { document.documentElement.lang = lang; }, [lang]);
  useEffect(() => {
    if (user) localStorage.setItem("savat_user", JSON.stringify(user));
    else localStorage.removeItem("savat_user");
  }, [user]);
  useEffect(() => {
    D.fetchProducts()
      .then((rows) => {
        if (rows && rows.length) {
          setProducts(rows);
          // URL ?p= ni global variable ga saqla
          var params = new URLSearchParams(window.location.search);
          var pid = params.get("p");
          if (pid) {
            var found = rows.find(function(r){ return String(r.id) === String(pid); });
            if (found) window.__savatOpenProduct = found;
          }

        }
      })
      .catch((err) => { console.error("Mahsulotlarni yuklashda xato:", err); })
      .finally(() => setProductsLoading(false));
  }, []);

  const featured = products.find((p) => p.id === 1) || products[0];
  const list = products.filter((p) => {
    const matchCat = cat === "all" || p.cat === cat;
    const q = query.trim().toLowerCase();
    const matchQ = !q || p.name.uz.toLowerCase().includes(q) || p.name.ru.toLowerCase().includes(q) || (p.sub && (p.sub.uz.toLowerCase().includes(q) || p.sub.ru.toLowerCase().includes(q)));
    return matchCat && matchQ;
  });

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2000);
  };
  const addToCart = (p, e, varLabel, selectedImgUrl) => {
    const imgs = p.image_urls && p.image_urls.length ? p.image_urls : (p.image_url ? [p.image_url] : []);
    const selectedImg = selectedImgUrl || imgs[0] || null;
    setCart((c) => {
      const f = c.find((it) => it.p.id === p.id);
      if (f) return c.map((it) => it.p.id === p.id ? { ...it, q: it.q + 1, variant: varLabel || it.variant, selectedImg: selectedImg || it.selectedImg } : it);
      return [...c, { p, q: 1, variant: varLabel || "", selectedImg }];
    });
    showToast(t.added);
  };
  const changeQty = (id, d) => setCart((c) => c.map((it) => it.p.id === id ? { ...it, q: Math.max(1, it.q + d) } : it));
  const removeItem = (id) => setCart((c) => c.filter((it) => it.p.id !== id));
  const decItem = (id) => setCart((c) => c.flatMap((it) => it.p.id === id ? (it.q > 1 ? [{ ...it, q: it.q - 1 }] : []) : [it]));
  const cartQty = (id) => { const it = cart.find((i) => i.p.id === id); return it ? it.q : 0; };
  const openProduct = (p) => { setCurrent(p); setView("product"); window.scrollTo({ top: 0 }); window.history.pushState({}, "", "?p="+p.id); };

  useEffect(() => {
    if (!productsLoading && window.__savatOpenProduct) {
      var p = window.__savatOpenProduct;
      window.__savatOpenProduct = null;
      setCurrent(p);
      setView("product");
      window.scrollTo({ top: 0 });
    }
  }, [productsLoading]);

  const goHome = () => { setView("home"); window.scrollTo({ top: 0 }); window.history.pushState({}, "", window.location.pathname); };

  // Browser back tugmasi bosilganda
  useEffect(() => {
    var handler = function() {
      var params = new URLSearchParams(window.location.search);
      if (!params.get("p")) {
        setView("home");
        window.scrollTo({ top: 0 });
      }
    };
    window.addEventListener("popstate", handler);
    return function() { window.removeEventListener("popstate", handler); };
  }, []);
  const goCheckout = () => {
    if (cart.length === 0) return;
    setCartOpen(false);
    setView("checkout");
    window.scrollTo({ top: 0 });
  };
  const onAccount = () => { if (user) setMenuOpen(true); else setAuthOpen(true); };
  const onAuth = (u) => { setUser(u); setAuthOpen(false); };
  const onLogout = () => { setUser(null); };
  const placeOrder = (o) => {
    D.saveOrder({ ...o, user_email: user ? user.email : null }).catch((err) => console.error("Buyurtmani saqlashda xato:", err));
    setOrder(o);
    setCart([]);
    setView("success");
    window.scrollTo({ top: 0 });
  };

  const cartCount = cart.reduce((s, it) => s + it.q, 0);

  return (
    <>
      <Header t={t} lang={lang} setLang={setLang} cartCount={cartCount}
        onCart={() => setCartOpen(true)} onHome={goHome}
        user={user} onAccount={onAccount} onMenu={() => setMenuOpen(true)}
        onMyOrders={() => setView("myorders")} onHelp={() => setView("help")} onCatalog={() => { goHome(); document.querySelector(".cats")?.scrollIntoView({behavior:"smooth"}); }}
        query={query} onSearch={(v) => { setQuery(v); if(view !== "home") setView("home"); }}
        products={products} onSelect={(p) => { setQuery(""); openProduct(p); }} />
      <MobileSearch t={t} query={query} lang={lang}
        onSearch={(v) => { setQuery(v); if(view !== "home") setView("home"); }}
        products={products} onSelect={(p) => { setQuery(""); openProduct(p); }} />

      {view === "home" && (
        <main>
          {featured ? <Hero t={t} lang={lang} product={featured} onView={openProduct} onAdd={addToCart} /> : (
            <div style={{ minHeight: 320, padding: "32px 0" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, alignItems: "stretch", minHeight: 240 }}>
                <div>
                  <div className="skeleton" style={{ height: 16, width: "30%", marginBottom: 16, borderRadius: 6 }} />
                  <div className="skeleton" style={{ height: 40, width: "80%", marginBottom: 12, borderRadius: 8 }} />
                  <div className="skeleton" style={{ height: 40, width: "60%", marginBottom: 24, borderRadius: 8 }} />
                  <div className="skeleton" style={{ height: 18, width: "90%", marginBottom: 8, borderRadius: 6 }} />
                  <div className="skeleton" style={{ height: 18, width: "70%", marginBottom: 32, borderRadius: 6 }} />
                  <div style={{ display: "flex", gap: 12 }}>
                    <div className="skeleton" style={{ height: 50, width: 160, borderRadius: 25 }} />
                    <div className="skeleton" style={{ height: 50, width: 130, borderRadius: 25 }} />
                  </div>
                </div>
                <div className="skeleton" style={{ borderRadius: 20, minHeight: 240 }} />
              </div>
            </div>
          )}
          <Cats cats={D.CATS} lang={lang} active={cat} onPick={setCat} />
          {productsLoading ? (
            <div style={{ padding: "40px 0" }}>
              <div className="skeleton" style={{ height: 22, width: 180, marginBottom: 8, borderRadius: 8 }} />
              <div className="skeleton" style={{ height: 14, width: 260, marginBottom: 24, borderRadius: 6 }} />
              <div className="grid">
                {[1,2,3,4].map(i => (
                  <div key={i} className="sk-card">
                    <div className="skeleton sk-img" />
                    <div className="sk-body">
                      <div className="skeleton sk-line" />
                      <div className="skeleton sk-line short" />
                      <div className="skeleton sk-line xshort" />
                      <div className="sk-foot">
                        <div className="skeleton sk-price" />
                        <div className="skeleton sk-btn" />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <Bestsellers products={list} t={t} lang={lang} qtyFor={cartQty} query={query} onSearch={setQuery} allProducts={products} onSelect={openProduct}
              onView={openProduct}
              onAdd={(p) => {
                if (p._hasVariants) { openProduct(p); }
                else { addToCart(p); }
              }}
              onInc={(p) => addToCart(p)} onDec={decItem} />
          )}
          <Why t={t} />
          <Footer t={t} />
        </main>
      )}
      {view === "product" && (
        <main>
          <ProductDetail p={current} t={t} lang={lang} qty={cartQty(current.id)} onBack={goHome}
            onAdd={(p, e, v, imgUrl) => addToCart(p, e, v, imgUrl)} onOrder={(p, v, imgUrl) => { addToCart(p, null, v, imgUrl); goCheckout(); }}
            onInc={(p) => addToCart(p)} onDec={decItem} />
          <Footer t={t} />
        </main>
      )}
      {view === "checkout" && (
        <main>
          <Checkout items={cart} t={t} lang={lang} user={user}
            onBack={() => (current ? openProduct(current) : goHome())}
            onPlace={placeOrder} onRequireAuth={() => setAuthOpen(true)} />
          <Footer t={t} />
        </main>
      )}
      {view === "success" && order && (
        <main>
          <OrderSuccess order={order} t={t} onHome={goHome} />
          <Footer t={t} />
        </main>
      )}
      {view === "myorders" && (
        <main>
          <MyOrders user={user} t={t} onHome={goHome} />
        </main>
      )}
      {view === "help" && (
        <main>
          <HelpPage t={t} onHome={goHome} user={user} onLogin={() => setAuthOpen(true)} />
        </main>
      )}

      <CartDrawer open={cartOpen} items={cart} t={t} lang={lang}
        onClose={() => setCartOpen(false)} onQty={changeQty} onRemove={removeItem}
        onCheckout={goCheckout} />

      <AuthModal open={authOpen} t={t} onClose={() => setAuthOpen(false)} onAuth={onAuth} />
      <MobileMenu open={menuOpen} t={t} lang={lang} setLang={setLang}
        onClose={() => setMenuOpen(false)} onHome={goHome}
        user={user} onAccount={() => setAuthOpen(true)} onLogout={onLogout}
        onMyOrders={() => setView("myorders")}
        onHelp={() => { setMenuOpen(false); setView("help"); }}
        onCatalog={() => { setMenuOpen(false); goHome(); }} />

      {/* Bottom Navigation — faqat mobile */}
      <nav className="bottom-nav">
        <button className={view === "home" ? "active" : ""} onClick={goHome}>
          <Ico.home style={{ width: 22, height: 22 }} />
          <span>Bosh</span>
        </button>
        <button onClick={() => { goHome(); setTimeout(() => document.querySelector(".cats")?.scrollIntoView({behavior:"smooth"}), 100); }}>
          <Ico.grid style={{ width: 22, height: 22 }} />
          <span>Katalog</span>
        </button>
        {user ? (
          <button className={view === "myorders" ? "active" : ""} onClick={() => setView("myorders")}>
            <Ico.box style={{ width: 22, height: 22 }} />
            <span>Buyurtmalar</span>
          </button>
        ) : (
          <button className={view === "help" ? "active" : ""} onClick={() => setView("help")}>
            <Ico.help style={{ width: 22, height: 22 }} />
            <span>Yordam</span>
          </button>
        )}
        <button className="bn-cart" onClick={() => setCartOpen(true)}>
          <Ico.cart style={{ width: 22, height: 22 }} />
          {cartCount > 0 && <span className="bn-badge">{cartCount}</span>}
          <span>Savat</span>
        </button>
      </nav>

      <div className={"toast" + (toast ? " on" : "")}>
        <span className="ok"><Ico.check style={{ width: 13, height: 13, color: "#fff" }} /></span>
        {toast}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
