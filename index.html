<style>
  /* ===== SAVAT.UZ — Premium Dark Design 2026 ===== */
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    /* Core palette */
    --bg:       #080810;
    --surface:  #111120;
    --surface-2:#16162a;
    --surface-3:#1e1e35;
    --ink:      #f0f0ff;
    --ink-2:    #9898c0;
    --ink-3:    #5a5a80;
    --line:     rgba(255,255,255,.08);
    --line-2:   rgba(255,255,255,.05);

    --brand:      #7B4FFF;
    --brand-2:    #9B6FFF;
    --brand-ink:  #5030cc;
    --brand-soft: rgba(123,79,255,.15);
    --brand-glow: 0 0 40px rgba(123,79,255,.35);

    --gold:       #F5B638;
    --gold-soft:  rgba(245,182,56,.12);
    --hot:        #FF4545;
    --hot-soft:   rgba(255,69,69,.12);
    --save:       #00D97E;
    --save-soft:  rgba(0,217,126,.12);

    --r-lg: 20px;
    --r:    14px;

    --sh-1: 0 1px 0 rgba(255,255,255,.04), 0 4px 20px rgba(0,0,0,.4);

    --sh-brand: 0 8px 32px rgba(123,79,255,.4);

    --maxw: 1240px;
    --font: "Inter", system-ui, sans-serif;

  .cart-btn {

  /* ===== HERO ===== */
  .hero { padding: 48px 0 0; }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: stretch; min-height: 480px; }

  .hero-left {

  }
  .hero-left::before {

  }

  .kicker {

  .hero-h1 {

  .btn-primary {

  /* Hero product card */
  .hero-card {

  /* ===== PLACEHOLDER ===== */

  /* ===== BIG SEARCH ===== */
  .big-search-wrap { margin-bottom: 32px; }
  .big-search-inner { max-width: 640px; margin: 0 auto; position: relative; }
  .big-search-inner .search-wrap,
  .big-search-inner .search { max-width: 100% !important; width: 100% !important; }
  .big-search-inner .search input {

    transition: border-color .18s, box-shadow .18s !important;

  /* Search dropdown */
  .search-wrap { position: relative; flex: 1; max-width: 420px; }
  .search-dropdown {

    .mobile-search .search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--ink-3); pointer-events: none; }
    .mobile-search .search .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; border-radius: 50%; background: var(--ink-3); color: #fff; border: none; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; padding: 0; }
  }

  /* ===== VARIANTS ===== */
  .var-section { margin: 16px 0; }
  .var-label { font-size: 11.5px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .var-label span { font-weight: 700; color: var(--ink); text-transform: none; letter-spacing: 0; }
  .var-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .var-chip { padding: 7px 15px; border-radius: var(--r-pill); border: 1px solid var(--line); background: var(--surface-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: .15s; color: var(--ink-2); }
  .var-chip:hover { border-color: var(--brand); color: var(--ink); }
  .var-chip.on { border-color: var(--brand); background: var(--brand-soft); color: var(--brand); }
  .var-chip.color-chip { width: 34px; height: 34px; padding: 0; border-radius: 50%; position: relative; }
  .var-chip.color-chip.on::after { content: "✓"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 800; text-shadow: 0 1px 3px rgba(0,0,0,.6); }

  /* ===== CATEGORY STRIP ===== */
  .cats { display: flex; gap: 8px; padding: 32px 0 8px; flex-wrap: wrap; }
  .cat {
    display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px;
    border-radius: var(--r-pill); background: var(--surface-2);
    border: 1px solid var(--line); font-weight: 500; font-size: 13.5px;
    color: var(--ink-3); transition: .15s;
  }
  .cat:hover { border-color: var(--brand); color: var(--ink); }
  .cat.on { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: var(--sh-brand); }
  .cat-emoji { font-size: 15px; line-height: 1; }

  /* ===== SECTION HEADER ===== */
  .sec-head { display: flex; align-items: flex-end; justify-content: space-between; margin: 36px 0 20px; }
  .sec-title { font-family: var(--display); font-weight: 700; font-size: 26px; letter-spacing: -.03em; margin: 0; color: var(--ink); }
  .sec-sub { color: var(--ink-3); font-size: 14px; margin: 5px 0 0; }
  .sec-flame { color: var(--hot); }

  /* ===== PRODUCT GRID ===== */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); overflow: hidden; cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-4px); border-color: rgba(123,79,255,.4); box-shadow: 0 12px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(123,79,255,.2); }
  .card-media { position: relative; aspect-ratio: 1/1; overflow: hidden; background: var(--surface-2); }
  .card-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
  .card:hover .card-media img { transform: scale(1.04); }

  .badge-disc {
    position: absolute; top: 10px; left: 10px;

  }

    border: 1px solid rgba(245,182,56,.3);
    font-weight: 700; font-size: 11px; padding: 4px 9px;
    border-radius: var(--r-pill); z-index: 2;

  }
  .badge-incart {
    position: absolute; top: 10px; right: 10px;

  .card-body { padding: 14px 14px 16px; display: flex; flex-direction: column; flex: 1; }
  .card-name { font-weight: 600; font-size: 14.5px; line-height: 1.3; margin: 0 0 3px; letter-spacing: -.01em; color: var(--ink); }
  .card-sub { color: var(--ink-3); font-size: 12px; margin: 0 0 9px; }
  .card-rate { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--ink-3); margin-bottom: 10px; }
  .stars { color: var(--gold); letter-spacing: -1px; font-size: 12px; }
  .card-foot { margin-top: auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; }
  .card-price { font-family: var(--display); font-weight: 700; font-size: 18px; letter-spacing: -.03em; color: var(--ink); }
  .card-price small { font-size: 11.5px; font-weight: 500; color: var(--ink-3); }
  .card-was { font-size: 11.5px; color: var(--ink-3); text-decoration: line-through; display: block; }
  .card-add {

  .card-add svg { width: 18px; height: 18px; }

  /* Skeleton loading */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);

    border-radius: 8px;

  .sk-card {

  /* Stepper */
  .stepper {
    display: inline-flex; align-items: center; gap: 2px;
    background: var(--surface); border: 1px solid var(--brand);
    border-radius: var(--r-pill); height: 38px; padding: 0 4px;
    box-shadow: 0 0 12px rgba(123,79,255,.15);
  }
  .stepper button { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: var(--brand); transition: .14s; }
  .stepper button:hover { background: var(--brand); color: #fff; }
  .stepper button:active { transform: scale(.9); }
  .stepper button svg { width: 15px; height: 15px; }
  .stepper span { min-width: 22px; text-align: center; font-weight: 700; color: var(--ink); font-size: 14px; }
  .stepper.stepper-lg { height: 54px; padding: 0 6px; border-radius: var(--r); }

  .why { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 56px 0 16px; }
  .why-card {

  }
  .why-card::before {

  }

  .why-ic svg { width: 21px; height: 21px; }
  .why-t { font-family: var(--display); font-weight: 700; font-size: 16px; margin: 0 0 6px; color: var(--ink); }
  .why-d { color: var(--ink-3); font-size: 13.5px; line-height: 1.55; margin: 0; }

  /* ===== FOOTER ===== */

  .ftr small { color: var(--ink-3); font-size: 13px; }

  /* ===== PRODUCT DETAIL ===== */
  .pd { padding: 24px 0 16px; }
  .back-link { display: inline-flex; align-items: center; gap: 7px; color: var(--ink-3); font-weight: 500; font-size: 14px; padding: 8px 0; margin-bottom: 8px; transition: .15s; }
  .back-link:hover { color: var(--ink); }
  .pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
  .pd-gallery { position: sticky; top: 88px; }
  .pd-title { font-family: var(--display); font-weight: 700; font-size: 32px; line-height: 1.1; letter-spacing: -.03em; margin: 0 0 6px; color: var(--ink); }
  .pd-sub { color: var(--ink-3); font-size: 14.5px; margin: 0 0 14px; }
  .pd-meta { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--ink-3); margin-bottom: 22px; flex-wrap: wrap; }
  .pd-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-3); }
  .pd-src { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,69,69,.08); color: var(--hot); border: 1px solid rgba(255,69,69,.2); font-weight: 600; font-size: 12.5px; padding: 6px 12px; border-radius: var(--r-pill); margin-bottom: 14px; }

  /* Image Swiper */
  .swiper-btn {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 4;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(8,8,16,.7); backdrop-filter: blur(8px);
    border: 1px solid var(--line); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink); transition: .15s;
  }
  .swiper-btn:hover { background: var(--brand); border-color: var(--brand); transform: translateY(-50%) scale(1.08); }
  .swiper-btn svg { width: 16px; height: 16px; }
  .swiper-prev { left: 10px; }
  .swiper-next { right: 10px; }
  .swiper-wrap {
    position: relative; aspect-ratio: 4/3; border-radius: var(--r-lg);
    overflow: hidden; border: 1px solid var(--line); background: var(--surface-2);
    touch-action: pan-y; user-select: none;
  }
  .swiper-track { display: flex; height: 100%; transition: transform .32s cubic-bezier(.4,0,.2,1); will-change: transform; }
  .swiper-track.no-anim { transition: none; }
  .swiper-slide { flex: none; width: 100%; height: 100%; position: relative; }
  .swiper-slide img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .swiper-slide .ph { position: absolute; inset: 0; }
  .swiper-dots { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
  .swiper-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--line); transition: .2s; border: none; padding: 0; cursor: pointer; }
  .swiper-dot.on { background: var(--brand); width: 18px; }
  .swiper-thumbs { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; scrollbar-width: none; }
  .swiper-thumbs::-webkit-scrollbar { display: none; }
  .swiper-thumb { flex: none; width: 64px; height: 64px; border-radius: 10px; overflow: hidden; border: 2px solid var(--line); cursor: pointer; position: relative; background: var(--surface-2); transition: border-color .15s; }
  .swiper-thumb.on { border-color: var(--brand); }
  .swiper-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .swiper-badge { position: absolute; top: 12px; left: 12px; z-index: 3; }

  /* Calculator */
  .calc {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 24px; box-shadow: var(--sh-1);
  }
  .calc-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .calc-h h3 { font-family: var(--display); font-weight: 700; font-size: 15px; margin: 0; color: var(--ink); }
  .calc-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; font-size: 14px; border-bottom: 1px solid var(--line); }
  .calc-row .lbl { display: flex; align-items: center; gap: 9px; color: var(--ink-3); }
  .calc-row .lbl .ic { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: var(--surface-2); flex: none; }
  .calc-row .lbl .ic svg { width: 15px; height: 15px; }
  .calc-row .val { font-weight: 600; color: var(--ink); }
  .calc-total {
    background: linear-gradient(135deg, rgba(123,79,255,.08), rgba(123,79,255,.04));
    border: 1px solid rgba(123,79,255,.2);
    border-radius: 12px; padding: 18px 20px; margin-top: 14px;
  }
  .calc-total .was { font-size: 13px; color: var(--ink-3); }
  .calc-total .was s { opacity: .7; }
  .calc-total .now-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 6px; }
  .calc-total .now-lbl { font-weight: 600; font-size: 14.5px; color: var(--ink-3); white-space: nowrap; }
  .calc-total .now { font-family: var(--display); font-weight: 700; font-size: 30px; letter-spacing: -.04em; line-height: 1; white-space: nowrap; color: var(--ink); }
  .calc-total .now small { font-size: 14px; color: var(--ink-3); }
  .calc-save { display: flex; align-items: center; gap: 7px; background: var(--save-soft); color: var(--save); font-weight: 700; font-size: 13px; padding: 9px 14px; border-radius: 10px; margin-top: 12px; border: 1px solid rgba(0,217,126,.2); }

  /* Service explainer */
  .svc { margin-top: 14px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .svc-q { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; font-weight: 600; font-size: 13.5px; text-align: left; background: var(--surface-2); color: var(--ink-2); }
  .svc-q .chev { transition: .2s; color: var(--ink-3); }
  .svc-q.open .chev { transform: rotate(180deg); }
  .svc-body { padding: 4px 16px 16px; background: var(--surface); }
  .svc-rule { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .svc-rule:last-child { border-bottom: none; }
  .svc-rule .k { display: flex; align-items: center; gap: 9px; font-weight: 500; color: var(--ink-3); font-size: 13.5px; }
  .svc-rule .badge { width: 28px; height: 28px; border-radius: 8px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; font-weight: 700; font-size: 11.5px; }
  .svc-rule .v { font-weight: 700; color: var(--brand); font-size: 14px; }
  .svc-note { font-size: 12.5px; color: var(--ink-3); margin: 10px 0 0; }
  .svc-active .k { color: var(--ink); }
  .svc-active .v { color: var(--save); }

  /* CTA */
  .pd-cta { display: flex; gap: 10px; margin-top: 20px; }
  .pd-cta .order {
    flex: 1; height: 52px; background: var(--brand); color: #fff;
    border-radius: var(--r); font-weight: 700; font-size: 15px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: .18s; box-shadow: var(--sh-brand);
  }
  .pd-cta .order:hover { background: var(--brand-2); transform: translateY(-2px); }
  .pd-cta .addc {
    width: 52px; height: 52px; background: var(--brand-soft); color: var(--brand);
    border-radius: var(--r); display: grid; place-items: center; transition: .15s;
    border: 1px solid rgba(123,79,255,.2);
  }
  .pd-cta .addc:hover { background: var(--brand); color: #fff; }

  /* ===== CART DRAWER ===== */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 90; opacity: 0; pointer-events: none; transition: .25s; }
  .scrim.on { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 400px; max-width: 92vw;
    background: var(--surface); z-index: 100; transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    border-left: 1px solid var(--line);
    box-shadow: -20px 0 60px rgba(0,0,0,.5);
  }
  .drawer.on { transform: translateX(0); }
  .drawer-h { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px; border-bottom: 1px solid var(--line); }
  .drawer-h h3 { font-family: var(--display); font-weight: 700; font-size: 19px; margin: 0; color: var(--ink); }
  .x-btn { width: 36px; height: 36px; border-radius: 9px; display: grid; place-items: center; color: var(--ink-3); transition: .15s; }
  .x-btn:hover { background: var(--surface-2); color: var(--ink); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 22px; }
  .ci { display: flex; gap: 13px; padding: 13px 0; border-bottom: 1px solid var(--line); }
  .ci-media { width: 68px; height: 68px; border-radius: 10px; overflow: hidden; position: relative; flex: none; background: var(--surface-2); }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-weight: 600; font-size: 14px; margin: 0 0 3px; color: var(--ink); }
  .ci-price { font-family: var(--display); font-weight: 700; font-size: 15px; color: var(--ink); }
  .ci-qty { display: inline-flex; align-items: center; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-pill); margin-top: 8px; }
  .ci-qty button { width: 28px; height: 28px; display: grid; place-items: center; color: var(--ink-3); font-weight: 800; }
  .ci-qty span { min-width: 24px; text-align: center; font-weight: 700; font-size: 13.5px; color: var(--ink); }
  .ci-rm { color: var(--ink-3); font-size: 12px; font-weight: 500; margin-top: 5px; }
  .ci-rm:hover { color: var(--hot); }
  .cart-empty { text-align: center; padding: 60px 20px; color: var(--ink-3); }
  .cart-empty .big { width: 60px; height: 60px; margin: 0 auto 14px; border-radius: 16px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; }
  .drawer-foot { padding: 18px 22px 22px; border-top: 1px solid var(--line); }
  .drawer-total { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .drawer-total .t-l { font-weight: 500; color: var(--ink-3); font-size: 14px; }
  .drawer-total .t-v { font-family: var(--display); font-weight: 700; font-size: 24px; letter-spacing: -.03em; color: var(--ink); }
  .checkout { width: 100%; height: 50px; background: var(--brand); color: #fff; border-radius: var(--r); font-weight: 700; font-size: 15px; transition: .18s; box-shadow: var(--sh-brand); }
  .checkout:hover { background: var(--brand-2); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface-2); color: var(--ink);
    border: 1px solid var(--line);
    padding: 12px 20px; border-radius: var(--r-pill);
    font-weight: 600; font-size: 14px;
    box-shadow: var(--sh-2); z-index: 120; opacity: 0; transition: .3s;
    display: flex; align-items: center; gap: 9px;
  }
  .toast.on { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast .ok { width: 20px; height: 20px; border-radius: 50%; background: var(--save); display: grid; place-items: center; }

  /* Animations */
  @keyframes pop { 0%{transform:scale(.96)} 100%{transform:scale(1)} }
  .pop { animation: pop .3s cubic-bezier(.34,1.4,.64,1); }
  @keyframes up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .up { animation: up .5s cubic-bezier(.22,1,.36,1); }
  @media (prefers-reduced-motion: reduce) { .up, .pop { animation: none; } }

  /* ===== AUTH MODAL ===== */
  .modal-scrim { position: fixed; inset: 0; background: rgba(0,0,0,.8); backdrop-filter: blur(6px); z-index: 130; display: grid; place-items: center; padding: 20px; }
  .modal { position: relative; width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 30px 28px 24px; box-shadow: var(--sh-2); }
  .modal-x { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 9px; display: grid; place-items: center; color: var(--ink-3); }
  .modal-x:hover { background: var(--surface-2); color: var(--ink); }
  .modal-brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .auth-tabs { display: flex; gap: 3px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-pill); padding: 3px; margin-bottom: 20px; }
  .auth-tabs button { flex: 1; padding: 10px; border-radius: var(--r-pill); font-weight: 600; font-size: 14px; color: var(--ink-3); transition: .15s; }
  .auth-tabs button.on { background: var(--brand); color: #fff; }
  .auth-fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field > span { font-weight: 600; font-size: 12.5px; color: var(--ink-3); }
  .field-in { display: flex; align-items: center; gap: 9px; height: 48px; padding: 0 13px; border: 1px solid var(--line); border-radius: var(--r); background: var(--surface-2); transition: .15s; color: var(--ink-3); }
  .field-in:focus-within { border-color: var(--brand); background: var(--surface-3); box-shadow: 0 0 0 3px var(--brand-soft); color: var(--brand); }
  .field-in.bad { border-color: var(--hot); background: rgba(255,69,69,.05); }
  .field-in input, .field-in select { flex: 1; border: none; background: none; outline: none; font-family: inherit; font-size: 14.5px; font-weight: 500; color: var(--ink); min-width: 0; }
  .field-in input::placeholder { color: var(--ink-3); }
  .field-in select { cursor: pointer; color: var(--ink); background: var(--surface-2); }
  .field-in select option { background: var(--surface-2); color: var(--ink); }
  .field-err { color: var(--hot); font-size: 12.5px; font-weight: 600; margin: 0; }
  .auth-submit { width: 100%; height: 50px; background: var(--brand); color: #fff; border-radius: var(--r); font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: .18s; box-shadow: var(--sh-brand); }
  .auth-submit:hover { background: var(--brand-2); transform: translateY(-1px); }
  .auth-note { text-align: center; color: var(--ink-3); font-size: 12px; line-height: 1.5; margin: 12px 0 0; }

  /* ===== MOBILE MENU ===== */
  .mm-scrim { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 110; opacity: 0; pointer-events: none; transition: .25s; }
  .mm-scrim.on { opacity: 1; pointer-events: auto; }
  .mm { position: fixed; top: 0; left: 0; bottom: 0; width: 300px; max-width: 86vw; background: var(--surface); z-index: 115; transform: translateX(-100%); transition: transform .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; border-right: 1px solid var(--line); box-shadow: 20px 0 60px rgba(0,0,0,.5); }
  .mm.on { transform: translateX(0); }
  .mm-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--line); }
  .mm-acct { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; border-bottom: 1px solid var(--line); transition: .15s; }
  .mm-acct:hover { background: var(--surface-2); }
  .mm-acct-ic { width: 42px; height: 42px; border-radius: 12px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; flex: none; }
  .mm-acct-name { font-weight: 600; font-size: 14.5px; color: var(--ink); }
  .mm-acct-sub { color: var(--ink-3); font-size: 12.5px; }
  .mm-nav { display: flex; flex-direction: column; padding: 10px; gap: 2px; flex: 1; }
  .mm-nav button { text-align: left; padding: 13px 14px; border-radius: 10px; font-weight: 500; font-size: 15px; color: var(--ink-3); transition: .15s; }
  .mm-nav button:hover { background: var(--surface-2); color: var(--ink); }
  .mm-foot { padding: 16px 20px; border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .mm-logout { color: var(--hot); font-weight: 600; font-size: 13.5px; padding: 7px 12px; border-radius: 8px; }
  .mm-logout:hover { background: var(--hot-soft); }

  /* ===== CHECKOUT ===== */
  .co-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px; align-items: start; }
  .co-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 22px; margin-bottom: 16px; }
  .co-h { display: flex; align-items: center; gap: 10px; font-family: var(--display); font-weight: 700; font-size: 17px; margin: 0 0 18px; color: var(--ink); }
  .co-num { width: 26px; height: 26px; border-radius: 7px; background: var(--brand); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 700; flex: none; }
  .co-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .co-form .span2 { grid-column: 1 / -1; }
  .pay-list { display: flex; flex-direction: column; gap: 10px; }
  .pay { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px; border: 1px solid var(--line); border-radius: var(--r); background: var(--surface-2); transition: .15s; text-align: left; cursor: pointer; }
  .pay:hover:not(.soon) { border-color: var(--brand); }
  .pay.on { border-color: var(--brand); background: var(--brand-soft); }
  .pay.soon { opacity: .5; cursor: not-allowed; }
  .pay-ic { width: 42px; height: 42px; border-radius: 11px; display: grid; place-items: center; flex: none; }
  .pay-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .pay-name { font-weight: 600; font-size: 14.5px; color: var(--ink); }
  .pay-sub { color: var(--ink-3); font-size: 12px; }
  .pay-radio { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--line); flex: none; transition: .15s; }
  .pay-radio.on { border-color: var(--brand); background: radial-gradient(circle, var(--brand) 0 4px, transparent 5px); }
  .pay-soon { display: inline-flex; align-items: center; gap: 4px; background: var(--surface-3); color: var(--ink-3); font-weight: 600; font-size: 11.5px; padding: 4px 9px; border-radius: var(--r-pill); flex: none; }

  .co-summary { position: sticky; top: 88px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 20px; }
  .co-items { display: flex; flex-direction: column; gap: 10px; max-height: 260px; overflow-y: auto; margin-bottom: 14px; }
  .co-item { display: flex; align-items: center; gap: 10px; }
  .co-item-media { width: 48px; height: 48px; border-radius: 9px; overflow: hidden; position: relative; flex: none; background: var(--surface-2); }
  .co-item-info { flex: 1; min-width: 0; }
  .co-item-name { font-weight: 500; font-size: 13px; margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
  .co-item-qty { color: var(--ink-3); font-size: 12px; }
  .co-item-sum { font-family: var(--display); font-weight: 700; font-size: 14px; white-space: nowrap; color: var(--ink); }
  .co-line { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--ink-3); border-top: 1px solid var(--line); }
  .co-line b { color: var(--ink); font-weight: 600; }
  .co-line .free { color: var(--save); }
  .co-total { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 4px; margin-top: 4px; border-top: 1px solid var(--line-2); font-weight: 600; font-size: 15px; color: var(--ink); }
  .co-total-v { font-family: var(--display); font-weight: 700; font-size: 22px; letter-spacing: -.03em; color: var(--ink); }
  .co-total-v small { font-size: 13px; color: var(--ink-3); font-weight: 500; }
  .co-place { width: 100%; height: 50px; background: var(--brand); color: #fff; border-radius: var(--r); font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px; transition: .18s; box-shadow: var(--sh-brand); }
  .co-place:hover { background: var(--brand-2); transform: translateY(-2px); }

  .login-req { max-width: 440px; margin: 40px auto; text-align: center; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 40px 28px; }
  .login-req-ic { width: 68px; height: 68px; margin: 0 auto 16px; border-radius: 18px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; }
  .login-req h2 { font-family: var(--display); font-weight: 700; font-size: 22px; margin: 0 0 8px; color: var(--ink); }
  .login-req p { color: var(--ink-3); font-size: 14.5px; line-height: 1.55; margin: 0 0 20px; }

  /* ===== SUCCESS ===== */
  .success { padding: 40px 0; }
  .success-card { max-width: 480px; margin: 0 auto; text-align: center; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 44px 32px 36px; }
  .success-ic { width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 50%; background: var(--save); color: #fff; display: grid; place-items: center; box-shadow: 0 12px 32px rgba(0,217,126,.3); }
  .success-card h1 { font-family: var(--display); font-weight: 700; font-size: 28px; margin: 0 0 10px; color: var(--ink); }
  .success-card > p { color: var(--ink-3); font-size: 15px; line-height: 1.55; margin: 0 0 24px; }
  .success-order { display: flex; justify-content: space-between; gap: 16px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r); padding: 18px 20px; margin-bottom: 22px; }
  .success-order .lbl { display: block; color: var(--ink-3); font-size: 12px; font-weight: 500; margin-bottom: 4px; }
  .success-order .num { font-family: var(--display); font-weight: 700; font-size: 17px; color: var(--ink); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; }
    .pd-grid { grid-template-columns: 1fr; }
    .pd-gallery { position: static; }
    .grid { grid-template-columns: repeat(3, 1fr); }
    .why { grid-template-columns: 1fr; }
    .nav, .search { display: none; }
    .burger { display: flex; }
    .hero-h1 { font-size: 38px; }
    .co-grid { grid-template-columns: 1fr; }
    .co-summary { position: static; }
    .search-wrap { max-width: 100%; }
    .search-dropdown { border-radius: 12px; }
  }

  @media (max-width: 560px) {
    .hdr { position: sticky; top: 0; z-index: 80; }
    .hdr-row { height: 58px; gap: 8px; }
    .brand-tag, .acct-label, .cart-word { display: none; }
    .acct-btn { padding: 0; width: 40px; height: 40px; justify-content: center; border-radius: 50%; flex: none; }

  <script type="text/babel">
/* ============ SAVAT.UZ — components ============ */
const { useState, useEffect, useRef } = React;
const I = window.Icons;
const { breakdown, fmt } = window.SAVAT;

/* ---- placeholder media tile ---- */
function Media({ p, label }) {
  if (p.image_url) {
    return (
      <div className="ph" style={{ background: p.tile, padding: 0, overflow: "hidden" }}>
        <img src={p.image_url} alt={p.name.uz} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
      </div>
    );
  }
  return (
    <div className="ph" style={{ background: p.tile }}>
      <span className="ph-label">{label || p.name.uz.toLowerCase()}</span>
    </div>
  );
}

/* ---- animated count-up ---- */
function useCountUp(target, on) {
  const [v, setV] = useState(target);
  useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!on || document.hidden || reduce) { setV(target); return; }
    let raf, start;
    const dur = 700;
    setV(0);
    const step = (t) => {
      if (!start) start = t;
      const k = Math.min((t - start) / dur, 1);
      const e = 1 - Math.pow(1 - k, 3);
      setV(target * e);
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => setV(target), dur + 200);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, on]);
  return v;
}

/* ---- Header ---- */
function Header({ t, lang, setLang, cartCount, onCart, onHome, user, onAccount, onMenu, onMyOrders, onHelp, onCatalog, query, onSearch, products, onSelect }) {
  return (
    <header className="hdr">
      <div className="wrap hdr-row">
        <button className="burger" onClick={onMenu} aria-label="menu"><I.menu /></button>
        <div className="brand" onClick={onHome}>
          <div className="brand-mark"><I.basket /></div>
          <div>
            <div className="brand-name">SAVAT<span className="uz">.UZ</span></div>
            <div className="brand-tag">{t.tag}</div>
          </div>
        </div>
        <nav className="nav">
          <button onClick={onHome}>{t.nav_home}</button>
          <button onClick={onCatalog}>{t.nav_catalog}</button>
          {user && <button onClick={onMyOrders}>{t.nav_track}</button>}
          <button onClick={onHelp}>{t.nav_help}</button>
        </nav>
        <div className="hdr-actions">
          <div className="lang">
            <button className={lang === "uz" ? "on" : ""} onClick={() => setLang("uz")}>UZ</button>
            <button className={lang === "ru" ? "on" : ""} onClick={() => setLang("ru")}>RU</button>
          </div>
          <button className="acct-btn" onClick={onAccount}>
            <I.user style={{ width: 18, height: 18 }} />
            <span className="acct-label">{user ? user.name.split(" ")[0] : t.login}</span>
          </button>
          <button className="cart-btn" onClick={onCart}>
            <I.cart />
            <span className="cart-word">{t.cart_title}</span>
            {cartCount > 0 && <span className="cart-count">{cartCount}</span>}
          </button>
        </div>
      </div>
    </header>
  );
}


/* ---- Search with Dropdown ---- */
function SearchBox({ t, query, onSearch, products, onSelect, lang, mobile }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const fmt = window.SAVAT.fmt;
  const bd = window.SAVAT.breakdown;

  const suggestions = query.trim().length > 0
    ? products.filter(p => {
        const q = query.trim().toLowerCase();
        return p.name.uz.toLowerCase().includes(q) || p.name.ru.toLowerCase().includes(q);
      }).slice(0, 6)
    : [];

  React.useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
  }, []);

  const inner = (
    <div className="search-wrap" ref={ref}>
      <div className="search">
        <I.search />
        <input
          placeholder={t.search}
          value={query}
          onChange={(e) => { onSearch(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          onKeyDown={(e) => { if(e.key === "Escape") { onSearch(""); setOpen(false); } }}
        />
        {query && <button className="search-clear" onClick={() => { onSearch(""); setOpen(false); }}>×</button>}
      </div>
      {open && query.trim().length > 0 && (
        <div className="search-dropdown">
          {suggestions.length === 0 ? (
            <div className="sd-empty">🔍 {lang === "ru" ? "Ничего не найдено" : "Hech narsa topilmadi"}</div>
          ) : suggestions.map(p => {
            const b = bd(p);
            const imgUrl = (p.image_urls && p.image_urls[0]) || p.image_url;
            return (
              <div className="sd-item" key={p.id} onMouseDown={(e) => { e.preventDefault(); onSelect(p); onSearch(""); setOpen(false); }}>
                <div className="sd-img">
                  {imgUrl ? <img src={imgUrl} alt={p.name[lang||"uz"]} onError={(e)=>{e.target.style.display="none";}} /> : <div style={{width:"100%",height:"100%",background:p.tile||"#ede9ff",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}}>{"🛒"}</div>}
                </div>
                <div className="sd-info">
                  <div className="sd-name">{p.name[lang||"uz"]}</div>
                  <div className="sd-price">{fmt(b.total)} so'm</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  if(mobile) return <div className="mobile-search">{inner}</div>;
  return inner;
}

function MobileSearch({ t, query, onSearch, products, onSelect, lang }) {
  return <SearchBox t={t} query={query} onSearch={onSearch} products={products} onSelect={onSelect} lang={lang} mobile={true} />;
}

/* ---- Hero ---- */
function Hero({ t, lang, product, onView, onAdd }) {
  const b = breakdown(product);
  return (
    <section className="hero">
      <div className="wrap hero-grid">
        <div className="hero-left up">
          <span className="kicker"><span className="dot" />{t.hero_kicker}</span>
          <h1 className="hero-h1">{t.hero_title}</h1>
          <p className="hero-lead">{t.hero_lead}</p>
          <div className="hero-ticker">
            <div className="hero-ticker-num">3–5×</div>
            <div className="hero-ticker-label">
              <strong>{lang === "ru" ? "Дешевле рынка" : "Bozordan arzon"}</strong>
              {lang === "ru" ? "Прямо с заводов Китая" : "To'g'ridan-to'g'ri Xitoy zavodidan"}
            </div>
          </div>
          <div className="hero-cta-row">
            <button className="btn-primary" onClick={() => onView(product)}>
              {t.hero_cta} <I.arrow style={{ width: 18, height: 18 }} />
            </button>
            <button className="btn-ghost" onClick={() => onView(product)}>{t.hero_secondary}</button>
          </div>
        </div>

        <div className="hero-card up">
          <div className="hero-media" style={{ cursor: "pointer" }} onClick={() => onView(product)}>
            <span className="badge-disc" style={{ position: "absolute", top: 14, left: 14, zIndex: 2 }}>−{b.pct}%</span>
            <Media p={product} />
          </div>
          <div className="hero-card-body">
            <h3 className="hero-card-title">{product.name[lang]}</h3>
            <p className="hero-card-sub">{product.sub[lang]}</p>
            <div className="hero-price-row">
              <div>
                <div className="hero-was">{fmt(b.market)} {t.unit}</div>
                <div className="hero-now">{fmt(b.total)} <small>{t.unit}</small></div>
              </div>
              <span className="save-chip"><I.flame style={{ width: 14, height: 14 }} />{t.hero_save} {fmt(b.save)}</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ---- Category strip ---- */
function Cats({ cats, lang, active, onPick }) {
  const emojis = { all: "🛍️", tech: "📱", shoes: "👟", fashion: "👗", home: "🏠" };
  return (
    <div className="wrap">
      <div className="cats">
        {cats.map((c) => (
          <button key={c.id} className={"cat" + (active === c.id ? " on" : "")} onClick={() => onPick(c.id)}>
            <span className="cat-emoji">{emojis[c.id] || "📦"}</span>
            {c[lang]}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ---- Product card ---- */
function ProductCard({ p, t, lang, qty, onView, onAdd, onInc, onDec }) {
  const b = breakdown(p);
  const stop = (e) => e.stopPropagation();
  return (
    <div className="card" onClick={() => onView(p)}>
      <div className="card-media">
        <span className="badge-disc">−{b.pct}%</span>
        {qty > 0 && <span className="badge-incart"><I.check style={{ width: 12, height: 12, strokeWidth: 2.6 }} />{qty} {t.qty}</span>}
        {p.hit && qty === 0 && <span className="badge-hit"><I.flame style={{ width: 12, height: 12 }} />HIT</span>}
        <Media p={p} />
      </div>
      <div className="card-body">
        <h4 className="card-name">{p.name[lang]}</h4>
        <p className="card-sub">{p.sub[lang]}</p>
        <div className="card-rate">
          <span className="stars">{"★".repeat(5)}</span>
          <span>{p.rating}</span>
          <span style={{ color: "var(--ink-3)" }}>· {fmt(p.sold)} {t.sold}</span>
        </div>
        <div className="card-foot">
          <div>
            <span className="card-was">{fmt(b.market)}</span>
            <span className="card-price">{fmt(b.total)} <small>{t.unit}</small></span>
          </div>
          {qty > 0 ? (
            <div className="stepper" onClick={stop}>
              <button onClick={(e) => { stop(e); onDec(p.id); }} aria-label="-"><I.minus /></button>
              <span>{qty}</span>
              <button onClick={(e) => { stop(e); onInc(p); }} aria-label="+"><I.plus /></button>
            </div>
          ) : (
            <button className="card-add" onClick={(e) => { stop(e); onAdd(p, e); }} aria-label={t.add}>
              <I.plus />
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---- Grid section ---- */
function Bestsellers({ products, t, lang, qtyFor, onView, onAdd, onInc, onDec, query, onSearch, allProducts, onSelect }) {
  return (
    <section className="wrap">
      <div className="big-search-wrap">
        <div className="big-search-inner">
          <SearchBox t={t} query={query} onSearch={onSearch} products={allProducts} onSelect={onSelect} lang={lang} bigMode={true} />
        </div>
      </div>
      <div className="sec-head">
        <div>
          <h2 className="sec-title">
            {query ? <><span style={{fontSize:22}}>🔍</span> "{query}"</> : <><span className="sec-flame">🔥</span> {t.best_title}</>}
          </h2>
          <p className="sec-sub">{query ? (lang==="ru" ? "Результаты поиска: " : "Qidiruv natijalari: ") + products.length + (lang==="ru" ? " товаров" : " ta mahsulot") : t.best_sub}</p>
        </div>
      </div>
      {products.length === 0 ? (
        <div style={{ textAlign:"center", padding:"60px 0", color:"var(--ink-3)" }}>
          <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
          <div style={{ fontFamily:"Sora,sans-serif", fontWeight:800, fontSize:18, color:"var(--ink)", marginBottom:8 }}>
            {lang==="ru" ? "Ничего не найдено" : "Hech narsa topilmadi"}
          </div>
          <div style={{ fontSize:14 }}>"{query}" {lang==="ru" ? "по вашему запросу нет товаров" : "bo'yicha mahsulot yo'q"}</div>
        </div>
      ) : (
        <div className="grid">
          {products.map((p) => (
            <ProductCard key={p.id} p={p} t={t} lang={lang} qty={qtyFor(p.id)}
              onView={onView} onAdd={onAdd} onInc={onInc} onDec={onDec} />
          ))}
        </div>
      )}
    </section>
  );
}

/* ---- Why strip ---- */
function Why({ t }) {
  const items = [
    { ic: <I.factory />, tk: "why1_t", dk: "why1_d" },
    { ic: <I.tag />, tk: "why2_t", dk: "why2_d" },

  return (
    <section className="wrap">
      <div className="why">
        {items.map((it, i) => (
          <div className="why-card" key={i}>
            <div className="why-ic">{it.ic}</div>
            <h3 className="why-t">{t[it.tk]}</h3>
            <p className="why-d">{t[it.dk]}</p>
          </div>
        ))}
      </div>

}

/* ---- Footer ---- */
function Footer({ t }) {
  return (
    <footer className="ftr">
      <div className="wrap ftr-row">
        <div className="brand">
          <div className="brand-mark" style={{ width: 34, height: 34, borderRadius: 10 }}><I.basket style={{ width: 20, height: 20 }} /></div>
          <div className="brand-name" style={{ fontSize: 18 }}>SAVAT<span className="uz">.UZ</span></div>
        </div>
        <small>© 2026 SAVAT.UZ — {t.tag}</small>
      </div>
    </footer>
  );
}

window.SC = { Media, useCountUp, Header, SearchBox, MobileSearch, Hero, Cats, ProductCard, Bestsellers, Why, Footer };

</script>
  <script type="text/babel">
/* ============ SAVAT.UZ — auth, checkout, mobile menu ============ */
const AC_D = window.SAVAT;
const AC_I = window.Icons;
const ACMedia = () => window.SC.Media;

/* phone mask: +998 90 123 45 67 */
function maskPhone(raw) {
  let d = raw.replace(/\D/g, "");
  if (d.startsWith("998")) d = d.slice(3);
  d = d.slice(0, 9);
  let out = "+998";
  if (d.length) out += " " + d.slice(0, 2);
  if (d.length > 2) out += " " + d.slice(2, 5);
  if (d.length > 5) out += " " + d.slice(5, 7);
  if (d.length > 7) out += " " + d.slice(7, 9);
  return out;
}
function phoneValid(p) { return p.replace(/\D/g, "").length === 12; }

/* ---------- Auth modal ---------- */
function AuthModal({ open, t, onClose, onAuth }) {
  const [tab, setTab] = useState("login"); // login | register | verify | forgot | reset-sent
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [otp, setOtp] = useState("");
  const [err, setErr] = useState("");
  const [info, setInfo] = useState("");
  const [loading, setLoading] = useState(false);

  const SB_URL = "https://gjsaelqqubmlwnmfyuso.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqc2FlbHFxdWJtbHdubWZ5dXNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDY5MzAsImV4cCI6MjA5NzAyMjkzMH0.zLx1yBAUdMqtTW61zibbhQts3zVk-aRQTmTjn0L1U9Y";

  useEffect(() => { if (open) { setErr(""); setInfo(""); setLoading(false); } }, [open, tab]);
  if (!open) return null;

  const sb = (path, body) => fetch(SB_URL + path, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(r => r.json().then(d => ({ ok: r.ok, d })));

  // Kirish
  const doLogin = async () => {
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    if (password.length < 6) { setErr("Parol kamida 6 ta belgi"); return; }
    setLoading(true); setErr("");
    const { ok, d } = await sb("/auth/v1/token?grant_type=password", { email, password });
    setLoading(false);
    if (!ok) {
      if (d.error_description === "Invalid login credentials") setErr("Email yoki parol noto'g'ri");
      else if (d.error_description?.includes("Email not confirmed")) setErr("Email tasdiqlanmagan — pochtangizni tekshiring");
      else setErr(d.error_description || "Xatolik yuz berdi");
      return;
    }
    const finalName = d.user?.user_metadata?.name || email.split("@")[0];
    onAuth({ name: finalName, email, token: d.access_token });
    setName(""); setEmail(""); setPassword("");
  };

  // Ro'yxatdan o'tish
  const doRegister = async () => {
    if (name.trim().length < 2) { setErr("Ismingizni kiriting"); return; }
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    if (password.length < 6) { setErr("Parol kamida 6 ta belgi"); return; }
    setLoading(true); setErr("");

    // Email mavjudligini tekshirish
    const check = await sb("/auth/v1/token?grant_type=password", { email, password: "___check___x9z" });
    if (!check.ok) {
      const desc = check.d.error_description || "";
      if (desc === "Invalid login credentials") {
        // Email bor, faqat parol noto'g'ri = allaqachon ro'yxatdan o'tgan
        setErr("Bu email allaqachon ro'yxatdan o'tgan");
        setLoading(false); return;
      }
      // "Email not confirmed" ham email borligini bildiradi
      if (desc.includes("not confirmed") || desc.includes("Email")) {
        setErr("Bu email allaqachon ro'yxatdan o'tgan");
        setLoading(false); return;
      }
    }

    const { ok, d } = await sb("/auth/v1/signup", { email, password, data: { name: name.trim() } });
    setLoading(false);
    if (!ok) {
      setErr(d.error_description || d.msg || d.message || "Xatolik yuz berdi");
      return;
    }
    setTab("verify");
    setInfo(email + " manziliga tasdiqlash kodi yuborildi");
  };

  // OTP tasdiqlash
  const doVerify = async () => {
    if (otp.trim().length < 6) { setErr("Kodni to'liq kiriting"); return; }
    setLoading(true); setErr("");
    const { ok, d } = await sb("/auth/v1/verify", { type: "signup", email, token: otp.trim() });
    setLoading(false);
    if (!ok) { 
      setErr("Kod noto'g'ri yoki muddati o'tgan. Agar avval ro'yxatdan o'tgan bo'lsangiz — 'Kirishga qaytish' tugmasini bosib, email va parolingiz bilan kiring."); 
      return; 
    }
    const finalName = d.user?.user_metadata?.name || name || email.split("@")[0];
    onAuth({ name: finalName, email, token: d.access_token });
    setName(""); setEmail(""); setPassword(""); setOtp("");
  };

  // Parolni tiklash
  const doForgot = async () => {
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    setLoading(true); setErr("");
    const res = await fetch(SB_URL + "/auth/v1/recover", {
      method: "POST",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    setLoading(false);
    if (res.status === 429) {
      setErr("Urinishlar soni ko'payib ketdi. 5-10 daqiqadan keyin qayta urinib ko'ring.");
      return;
    }
    setTab("reset-sent");
  };

  const Brand = () => (
    <div className="modal-brand">
      <div className="brand-mark" style={{ width: 44, height: 44 }}><AC_I.basket style={{ width: 25, height: 25 }} /></div>
      <div className="brand-name" style={{ fontSize: 22 }}>SAVAT<span className="uz">.UZ</span></div>
    </div>
  );

  // OTP ekrani
  if (tab === "verify") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📧</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 6 }}>Emailni tasdiqlang</div>
          <div style={{ color: "#8a849c", fontSize: 13.5 }}>{info}</div>
          <div style={{ color: "#8a849c", fontSize: 12.5, marginTop: 8 }}>Agar xat kelmasa — avval ro'yxatdan o'tgan bo'lishingiz mumkin. "Kirishga qaytish" tugmasini bosing.</div>
        </div>
        <div className="auth-fields">
          <label className="field">
            <span>Tasdiqlash kodi</span>
            <div className="field-in">
              <AC_I.lock style={{ width: 18, height: 18 }} />
              <input value={otp} onChange={e => setOtp(e.target.value)} placeholder="123456"
                inputMode="numeric" maxLength={6}
                onKeyDown={e => { if (e.key === "Enter") doVerify(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
        </div>
        <button className="auth-submit" onClick={doVerify} disabled={loading}>
          {loading ? "Tekshirilmoqda..." : "Tasdiqlash"} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}
          onClick={() => { setTab("login"); setErr(""); }}>← Kirishga qaytish</p>
      </div>
    </div>
  );

  // Parol tiklash yuborildi
  if (tab === "reset-sent") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ textAlign: "center", padding: "16px 0" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>✉️</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 8 }}>Xat yuborildi</div>
          <div style={{ color: "#8a849c", fontSize: 13.5 }}><b>{email}</b> manziliga parolni tiklash havolasi yuborildi. Pochtangizni tekshiring.</div>
        </div>
        <button className="auth-submit" onClick={() => { setTab("login"); setErr(""); }}>
          Kirishga qaytish
        </button>
      </div>
    </div>
  );

  // Parolni unutdim
  if (tab === "forgot") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 4 }}>Parolni tiklash</div>
        <div style={{ color: "#8a849c", fontSize: 13.5, marginBottom: 16 }}>Emailingizga tiklash havolasi yuboramiz</div>
        <div className="auth-fields">
          <label className="field">
            <span>Email</span>
            <div className="field-in">
              <AC_I.user style={{ width: 18, height: 18 }} />
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="email@misol.com"
                onKeyDown={e => { if (e.key === "Enter") doForgot(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
        </div>
        <button className="auth-submit" onClick={doForgot} disabled={loading}>
          {loading ? "Yuborilmoqda..." : "Havolani yuborish"} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}
          onClick={() => { setTab("login"); setErr(""); }}>← Kirishga qaytish</p>
      </div>
    </div>
  );

  // Asosiy kirish / ro'yxatdan o'tish
  return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={(e) => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div className="auth-tabs">
          <button className={tab === "login" ? "on" : ""} onClick={() => { setTab("login"); setErr(""); }}>{t.auth_login_tab}</button>
          <button className={tab === "register" ? "on" : ""} onClick={() => { setTab("register"); setErr(""); }}>{t.auth_reg_tab}</button>
        </div>
        <div className="auth-fields">
          {tab === "register" && (
            <label className="field">
              <span>{t.auth_name}</span>
              <div className="field-in">
                <AC_I.user style={{ width: 18, height: 18 }} />
                <input value={name} onChange={(e) => setName(e.target.value)} placeholder={t.auth_name} />
              </div>
            </label>
          )}
          <label className="field">
            <span>Email</span>
            <div className="field-in">
              <AC_I.user style={{ width: 18, height: 18 }} />
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="email@misol.com" autoComplete="off" />
            </div>
          </label>
          <label className="field">
            <span>Parol</span>
            <div className="field-in">
              <AC_I.lock style={{ width: 18, height: 18 }} />
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" autoComplete="new-password"
                onKeyDown={(e) => { if (e.key === "Enter") tab === "login" ? doLogin() : doRegister(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
          {tab === "login" && (
            <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6c2bd9", cursor: "pointer", textAlign: "right" }}
              onClick={() => { setTab("forgot"); setErr(""); }}>Parolni unutdingizmi?</p>
          )}
        </div>
        <button className="auth-submit" onClick={tab === "login" ? doLogin : doRegister} disabled={loading}>
          {loading ? "Yuklanmoqda..." : t.auth_continue} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note">{t.auth_note}</p>
      </div>
    </div>
  );
}

/* ---------- Mobile menu ---------- */
function MobileMenu({ open, t, lang, setLang, onClose, onHome, user, onAccount, onLogout, onMyOrders, onHelp, onCatalog }) {
  return (
    <>
      <div className={"mm-scrim" + (open ? " on" : "")} onClick={onClose} />
      <aside className={"mm" + (open ? " on" : "")}>
        <div className="mm-head">
          <div className="brand-name" style={{ fontSize: 20 }}>SAVAT<span className="uz">.UZ</span></div>
          <button className="x-btn" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        </div>
        <div className="mm-acct" onClick={() => { onClose(); onAccount(); }}>
          <div className="mm-acct-ic"><AC_I.user style={{ width: 20, height: 20 }} /></div>
          <div>
            <div className="mm-acct-name">{user ? `${t.auth_hello}, ${user.name.split(" ")[0]}` : t.login}</div>
            <div className="mm-acct-sub">{user ? user.email : t.auth_reg_tab}</div>
          </div>
        </div>
        <nav className="mm-nav">
          <button onClick={() => { onClose(); onHome(); }}>{t.nav_home}</button>
          <button onClick={() => { onClose(); onCatalog && onCatalog(); onHome(); }}>{t.nav_catalog}</button>
          {user && <button onClick={() => { onClose(); onMyOrders(); }}>{t.nav_track}</button>}
          <button onClick={() => { onClose(); onHelp(); }}>{t.nav_help}</button>
        </nav>
        <div className="mm-foot">
          <div className="lang" style={{ width: "fit-content" }}>
            <button className={lang === "uz" ? "on" : ""} onClick={() => setLang("uz")}>UZ</button>
            <button className={lang === "ru" ? "on" : ""} onClick={() => setLang("ru")}>RU</button>
          </div>
          {user && <button className="mm-logout" style={{ background: "#f0e8ff", color: "#6c2bd9", marginBottom: 8 }} onClick={() => { onClose(); onMyOrders(); }}>Mening buyurtmalarim</button>}
          {user && <button className="mm-logout" onClick={() => { onClose(); onLogout(); }}>{t.auth_logout}</button>}
        </div>
      </aside>
    </>
  );
}

/* ---------- Checkout ---------- */
function PaymentCard({ m, t, selected, onSelect }) {
  const icon = m.id === "cash" ? <AC_I.truck style={{ width: 20, height: 20 }} />
    : m.id === "payme" ? <AC_I.card style={{ width: 20, height: 20 }} />
    : <AC_I.spark style={{ width: 20, height: 20 }} />;
  return (
    <button
      className={"pay" + (m.soon ? " soon" : "") + (selected ? " on" : "")}
      onClick={() => !m.soon && onSelect(m.id)}
      disabled={m.soon}
    >
      <span className="pay-ic" style={{ background: m.tint, color: m.color }}>{icon}</span>
      <span className="pay-text">
        <span className="pay-name">{m.label}</span>
        <span className="pay-sub">{m.sub}</span>
      </span>
      {m.soon
        ? <span className="pay-soon"><AC_I.lock style={{ width: 12, height: 12 }} />{t.soon}</span>
        : <span className={"pay-radio" + (selected ? " on" : "")} />}
    </button>
  );
}

function Checkout({ items, t, lang, user, onBack, onPlace, onRequireAuth }) {
  const Media = window.SC.Media;
  const [region, setRegion] = useState("");
  const [city, setCity] = useState("");
  const [address, setAddress] = useState("");
  const [comment, setComment] = useState("");
  const [phone, setPhone] = useState("+998 ");
  const [pay, setPay] = useState("payme");
  const [err, setErr] = useState(false);

  useEffect(() => {
    if (user && user.phone && phone.replace(/\D/g, "").length <= 3) setPhone(user.phone);
  }, [user]);

  const total = items.reduce((s, it) => s + AC_D.breakdown(it.p).total * it.q, 0);
  const count = items.reduce((s, it) => s + it.q, 0);

  const methods = [
    { id: "payme", label: "Payme", sub: t.pay_payme_d, tint: "#e6f6fb", color: "#00b8d4" },
    { id: "click", label: "Click", sub: t.pay_click_d, tint: "#eef0ff", color: "#3461ff" },
    { id: "cash", label: t.pay_cash, sub: t.pay_cash_d, tint: "#e7f7ee", color: "#12a150", soon: true },
  ];

  if (!user) {
    return (
      <div className="pd wrap up">
        <button className="back-link" onClick={onBack}><AC_I.back style={{ width: 18, height: 18 }} />{t.back}</button>
        <div className="login-req">
          <div className="login-req-ic"><AC_I.lock style={{ width: 30, height: 30 }} /></div>
          <h2>{t.co_login_req_t}</h2>
          <p>{t.co_login_req_d}</p>
          <button className="auth-submit" style={{ maxWidth: 320, margin: "8px auto 0" }} onClick={onRequireAuth}>
            {t.login} / {t.auth_reg_tab}
          </button>
        </div>
      </div>
    );
  }

  const place = () => {
    if (!region || !phoneValid(phone) || city.trim().length < 2 || address.trim().length < 3) { setErr(true); return; }
    const num = "SV-" + Math.floor(100000 + Math.random() * 900000);
    const orderItems = items.map((it) => {
      const b = AC_D.breakdown(it.p);
      const imgs = it.p.image_urls && it.p.image_urls.length ? it.p.image_urls : (it.p.image_url ? [it.p.image_url] : []);
      return { id: it.p.id, name_uz: it.p.name.uz, name_ru: it.p.name.ru, qty: it.q, price: b.total, variant: it.variant || "", image_url: it.selectedImg || imgs[0] || null };
    });
    onPlace({ num, total, count, items: orderItems, region, city, address, phone, comment, pay });
  };

  return (
    <div className="pd wrap up">
      <button className="back-link" onClick={onBack}><AC_I.back style={{ width: 18, height: 18 }} />{t.back}</button>
      <h1 className="pd-title" style={{ marginBottom: 22 }}>{t.checkout}</h1>
      <div className="co-grid">
        <div className="co-main">
          {/* delivery */}
          <section className="co-card">
            <h3 className="co-h"><span className="co-num">1</span>{t.co_delivery}</h3>
            <div className="co-form">
              <label className="field">
                <span>{t.co_region}</span>
                <div className={"field-in" + (err && !region ? " bad" : "")}>
                  <AC_I.pin style={{ width: 18, height: 18 }} />
                  <select value={region} onChange={(e) => setRegion(e.target.value)}>
                    <option value="">{t.co_region_ph}</option>
                    {AC_D.REGIONS.map((r) => <option key={r.id} value={r.id}>{r[lang]}</option>)}
                  </select>
                </div>
              </label>
              <label className="field">
                <span>{t.co_city}</span>
                <div className={"field-in" + (err && city.trim().length < 2 ? " bad" : "")}>
                  <input value={city} onChange={(e) => setCity(e.target.value)} placeholder={t.co_city} />
                </div>
              </label>
              <label className="field span2">
                <span>{t.auth_phone}</span>
                <div className={"field-in" + (err && !phoneValid(phone) ? " bad" : "")}>
                  <AC_I.phone style={{ width: 18, height: 18 }} />
                  <input inputMode="tel" value={phone}
                    onChange={(e) => setPhone(maskPhone(e.target.value))}
                    onKeyDown={(e) => { if ((e.key === "Backspace" || e.key === "Delete") && phone.replace(/\D/g, "").length <= 3) e.preventDefault(); }}
                    placeholder="+998 90 123 45 67" />
                </div>
              </label>
              <label className="field span2">
                <span>{t.co_address}</span>
                <div className={"field-in" + (err && address.trim().length < 3 ? " bad" : "")}>
                  <input value={address} onChange={(e) => setAddress(e.target.value)} placeholder={t.co_address} />
                </div>
              </label>
              <label className="field span2">
                <span>{t.co_comment}</span>
                <div className="field-in">
                  <input value={comment} onChange={(e) => setComment(e.target.value)} placeholder={t.co_comment} />
                </div>
              </label>
            </div>
          </section>

          {/* payment */}
          <section className="co-card">
            <h3 className="co-h"><span className="co-num">2</span>{t.co_payment}</h3>
            <div className="pay-list">
              {methods.map((m) => (
                <PaymentCard key={m.id} m={m} t={t} selected={pay === m.id} onSelect={setPay} />
              ))}
            </div>
          </section>
        </div>

        {/* summary */}
        <aside className="co-side">
          <div className="co-summary">
            <h3 className="co-h" style={{ marginBottom: 14 }}>{t.co_summary}</h3>
            <div className="co-items">
              {items.map((it) => {
                const b = AC_D.breakdown(it.p);
                return (
                  <div className="co-item" key={it.p.id}>
                    <div className="co-item-media"><Media p={it.p} label="" /></div>
                    <div className="co-item-info">
                      <p className="co-item-name">{it.p.name[lang]}</p>
                      <span className="co-item-qty">{it.q} × {AC_D.fmt(b.total)} {t.unit}</span>
                    </div>
                    <span className="co-item-sum">{AC_D.fmt(b.total * it.q)}</span>
                  </div>
                );
              })}
            </div>
            <div className="co-line"><span>{t.co_items} ({count})</span><b>{AC_D.fmt(total)} {t.unit}</b></div>
            <div className="co-line"><span>{t.co_delivery_fee}</span><b className="free">{t.co_free}</b></div>
            <div className="co-total">
              <span>{t.co_total}</span>
              <span className="co-total-v">{AC_D.fmt(total)} <small>{t.unit}</small></span>
            </div>
            {err && <p className="field-err" style={{ textAlign: "center" }}>{t.co_err}</p>}
            <button className="co-place" onClick={place}>{t.co_place} <AC_I.check style={{ width: 18, height: 18 }} /></button>
          </div>
        </aside>
      </div>
    </div>
  );
}

/* ---------- Order success ---------- */
function OrderSuccess({ order, t, onHome }) {
  return (
    <div className="wrap success up">
      <div className="success-card pop">
        <div className="success-ic"><AC_I.check style={{ width: 38, height: 38, strokeWidth: 2.6 }} /></div>
        <h1>{t.ok_t}</h1>
        <p>{t.ok_d}</p>
        <div className="success-order">
          <div>
            <span className="lbl">{t.ok_num}</span>
            <span className="num">{order.num}</span>
          </div>

  <script type="text/babel">
/* ============ SAVAT.UZ — product detail, cart, app ============ */
const { Media, useCountUp, Header, SearchBox, MobileSearch, Hero, Cats, ProductCard, Bestsellers, Why, Footer } = window.SC;
const { AuthModal, MobileMenu, Checkout, OrderSuccess, MyOrders, HelpPage } = window.AC;

const D = window.SAVAT;

/* ---- Image Swiper ---- */
function ImageSwiper({ p, lang, onThumbChange, onImgSelect, selectedImg, imgRequired }) {
  const imgs = (p.image_urls && p.image_urls.length > 0) ? p.image_urls : (p.image_url ? [p.image_url] : []);
  const total = imgs.length;
  const [idx, setIdx] = React.useState(0);
  const wrapRef = React.useRef(null);
  const startX = React.useRef(null);
  const dragXRef = React.useRef(0);
  const [dragX, setDragX] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const idxRef = React.useRef(idx);
  React.useEffect(() => { idxRef.current = idx; }, [idx]);

  const goTo = (i) => { if(i < 0 || i >= total) return; setIdx(i); if(onThumbChange) onThumbChange(i); if(onImgSelect) onImgSelect(imgs[i], i); };
  const prev = (e) => { if(e) e.stopPropagation(); goTo(idxRef.current - 1); };
  const next = (e) => { if(e) e.stopPropagation(); goTo(idxRef.current + 1); };

  const endDragWithDx = (dx) => {
    // dx > 0 = o'ngga surdi = chapga o'tish
    // dx < 0 = chapga surdi = o'ngga o'tish
    const cur = idxRef.current;
    if (Math.abs(dx) > 40) {
      if (dx > 0 && cur > 0) goTo(cur - 1);
      else if (dx < 0 && cur < total - 1) goTo(cur + 1);
    }
    startX.current = null; dragXRef.current = 0; setDragX(0); setDragging(false);
  };

  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; dragXRef.current = 0; setDragX(0); setDragging(true); };
  const onTouchMove  = (e) => {
    if (startX.current === null) return;
    const dx = e.touches[0].clientX - startX.current;
    dragXRef.current = dx; setDragX(dx);
  };
  const onTouchEnd = () => { endDragWithDx(dragXRef.current); };

  const onMouseDown = (e) => {
    if(total <= 1) return;
    e.preventDefault();
    startX.current = e.clientX; dragXRef.current = 0; setDragX(0); setDragging(true);
    const onMove = (ev) => {
      const dx = ev.clientX - startX.current;
      dragXRef.current = dx; setDragX(dx);
    };
    const onUp = () => {
      endDragWithDx(dragXRef.current);
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };
  const onMouseMove  = () => {};
  const onMouseUp    = () => {};
  const onMouseLeave = () => {};

  const pxOffset = dragging ? dragX : 0;
  const pctBase = -(idx * 100);

  const ChevL = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>;
  const ChevR = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;

  return (
    <div>
      <div
        className="swiper-wrap"
        ref={wrapRef}
        style={{ cursor: total > 1 ? (dragging ? "grabbing" : "grab") : "default" }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseLeave}
      >
        <div
          className={"swiper-track" + (dragging ? " no-anim" : "")}
          style={{ transform: `translateX(calc(${pctBase}% + ${pxOffset}px))` }}
        >
          {total === 0 ? (
            <div className="swiper-slide">
              <div className="ph" style={{ background: p.tile }}>
                <span className="ph-label">{p.name[lang || "uz"].toLowerCase()}</span>
              </div>
            </div>
          ) : imgs.map((url, i) => (
            <div className="swiper-slide" key={i}>
              <img src={url} alt={p.name[lang || "uz"]} draggable="false" />
            </div>
          ))}
        </div>

        <div className="swiper-badge">
          <span className="badge-disc" style={{ fontSize: 15, padding: "7px 14px" }}>−{window.SAVAT.breakdown(p).pct}%</span>
        </div>

        {total > 1 && (
          <>
            {idx > 0 && <button className="swiper-btn swiper-prev" onClick={prev} aria-label="Oldingi"><ChevL /></button>}
            {idx < total - 1 && <button className="swiper-btn swiper-next" onClick={next} aria-label="Keyingi"><ChevR /></button>}
          </>
        )}
      </div>

      {total > 1 && (
        <>
          <div className="swiper-dots">
            {imgs.map((_, i) => <button key={i} className={"swiper-dot" + (i === idx ? " on" : "")} onClick={() => goTo(i)} />)}
          </div>
          <div className="swiper-thumbs">
            {imgs.map((url, i) => {
              const isSelected = selectedImg === url;
              return (
                <div key={i}
                  className={"swiper-thumb" + (i === idx ? " on" : "")}
                  onClick={() => goTo(i)}
                  style={{ border: isSelected ? "2.5px solid #12a150" : undefined, borderRadius: 10 }}
                >
                  <img src={url} alt={"" + (i+1)} draggable="false" />
                  {isSelected && (
                    <div style={{ position:"absolute", inset:0, background:"rgba(18,161,80,.18)", display:"flex", alignItems:"center", justifyContent:"center", borderRadius:8 }}>
                      <span style={{ color:"#12a150", fontSize:18, fontWeight:800 }}>✓</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

/* ---- Variant Picker ---- */
function VariantPicker({ variants, selected, onSelect, productImages }) {
  if (!variants || variants.length === 0) return null;

  const groups = {};
  variants.forEach(v => {
    if (!groups[v.type]) groups[v.type] = [];
    groups[v.type].push(v);
  });

  const typeLabels = { color: "Rang", size: "Razmer", model: "Model" };

  return (
    <div style={{ margin: "16px 0" }}>
      {Object.entries(groups).map(([type, items]) => {
        const sel = selected[type];
        return (
          <div key={type} style={{ marginBottom: 16 }}>
            <div className="var-label">
              {typeLabels[type] || type}
              {sel && <span style={{ fontWeight: 800, color: "var(--ink)", textTransform: "none", letterSpacing: 0 }}> — {sel.value}</span>}
            </div>

            {type === "color" ? (
              /* Rang: kichik rasm kartochkalar (Taobao uslubi) */
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {items.map((v, i) => {
                  const isOn = sel && sel.id === v.id;
                  /* Rang uchun: agar image_url bo'lsa — rasm, bo'lmasa color_hex doira */
                  const imgSrc = v.image_url || (productImages && productImages[i]) || null;
                  return (
                    <button
                      key={v.id}
                      onClick={() => onSelect(type, v)}
                      style={{
                        position: "relative", padding: 0, border: "2px solid " + (isOn ? "var(--brand)" : "var(--line-2)"),
                        borderRadius: 10, overflow: "hidden", cursor: "pointer", background: "var(--surface-2)",
                        boxShadow: isOn ? "0 0 0 3px var(--brand-soft)" : "none",
                        transition: ".15s", flexShrink: 0,
                        width: imgSrc ? 56 : 40, height: imgSrc ? 56 : 40,
                      }}
                      title={v.value}
                    >
                      {imgSrc ? (
                        <img src={imgSrc} alt={v.value} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                      ) : (
                        <div style={{ width: "100%", height: "100%", background: v.color_hex || "#ccc",
                          display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {isOn && <span style={{ color: "#fff", fontSize: 16, fontWeight: 800, textShadow: "0 1px 3px rgba(0,0,0,.4)" }}>✓</span>}
                        </div>
                      )}
                      {isOn && imgSrc && (
                        <div style={{ position: "absolute", inset: 0, background: "rgba(108,43,217,.15)",
                          display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <span style={{ color: "var(--brand)", fontSize: 16, fontWeight: 800 }}>✓</span>
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            ) : (
              /* Razmer / Model: chip tugmalar */
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {items.map(v => {
                  const isOn = sel && sel.id === v.id;
                  return (
                    <button
                      key={v.id}
                      className={"var-chip" + (isOn ? " on" : "")}
                      onClick={() => onSelect(type, v)}
                    >
                      {v.value}
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
