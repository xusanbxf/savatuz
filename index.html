  /* ---------- Image Swiper ---------- */

  .swiper-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 4; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.92); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,.18); color: var(--ink); transition: .15s; backdrop-filter: blur(4px); }

  .swiper-wrap { position: relative; aspect-ratio: 4/3; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--line); background: var(--surface-2); touch-action: pan-y; user-select: none; }

  .swiper-thumbs { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; scrollbar-width: none; }
  .swiper-thumbs::-webkit-scrollbar { display: none; }
  .swiper-thumb { flex: none; width: 70px; height: 70px; border-radius: 12px; overflow: hidden; border: 2px solid var(--line); cursor: pointer; position: relative; background: var(--surface-2); transition: border-color .15s; }
  .swiper-thumb.on { border-color: var(--brand); }

  .swiper-thumb .ph { position: absolute; inset: 0; }

  .pd-src { display: inline-flex; align-items: center; gap: 8px; background: var(--hot-soft); color: var(--hot); font-weight: 700; font-size: 13px; padding: 7px 13px; border-radius: var(--r-pill); margin-bottom: 14px; }

  .calc { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 24px; box-shadow: var(--sh-1); }

  .calc-row .lbl .ic { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; background: var(--surface-2); flex: none; }

  .calc-total .now small { font-size: 16px; }
  .calc-save { display: flex; align-items: center; gap: 7px; background: var(--save); color: #fff; font-weight: 800; font-size: 13.5px; padding: 9px 14px; border-radius: var(--r); margin-top: 14px; }

  /* service explainer */
  .svc { margin-top: 16px; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
  .svc-q { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; font-weight: 700; font-size: 14.5px; text-align: left; background: var(--surface-2); }

  .pd-cta { display: flex; gap: 12px; margin-top: 20px; }

  .pd-cta .order:hover { background: var(--brand); transform: translateY(-2px); box-shadow: var(--sh-brand); }
  .pd-cta .addc { width: 56px; height: 56px; background: var(--brand-soft); color: var(--brand); border-radius: var(--r); display: grid; place-items: center; transition: .15s; }

  /* ---------- Cart drawer ---------- */
  .scrim { position: fixed; inset: 0; background: rgba(27,20,48,.42); backdrop-filter: blur(3px); z-index: 90; opacity: 0; pointer-events: none; transition: .25s; }
  .scrim.on { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 92vw; background: var(--bg); z-index: 100; transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,.18); }

  .drawer-h h3 { font-family: var(--display); font-weight: 800; font-size: 20px; margin: 0; white-space: nowrap; }
  .x-btn { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; color: var(--ink-2); transition: .15s; }

  .ci-qty span { min-width: 26px; text-align: center; font-weight: 700; font-size: 14px; }

  .drawer-foot { padding: 20px 24px 24px; border-top: 1px solid var(--line); background: var(--surface); }
  .drawer-total { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
  .drawer-total .t-l { font-weight: 700; color: var(--ink-2); font-size: 15px; }
  .drawer-total .t-v { font-family: var(--display); font-weight: 800; font-size: 26px; letter-spacing: -.02em; }
  .checkout { width: 100%; height: 54px; background: var(--ink); color: #fff; border-radius: var(--r); font-weight: 800; font-size: 16px; transition: .18s; }
  .checkout:hover { background: var(--brand); }

  /* toast */
  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: #fff; padding: 14px 22px; border-radius: var(--r-pill); font-weight: 700; font-size: 14.5px; box-shadow: var(--sh-2); z-index: 120; opacity: 0; transition: .3s; display: flex; align-items: center; gap: 10px; }
  .toast.on { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast .ok { width: 22px; height: 22px; border-radius: 50%; background: var(--save); display: grid; place-items: center; }

  /* anim */
  @keyframes pop { 0%{transform:scale(.97)} 100%{transform:scale(1)} }
  .pop { animation: pop .3s cubic-bezier(.34,1.4,.64,1); }
  @keyframes up { from{transform:translateY(16px)} to{transform:translateY(0)} }
  .up { animation: up .5s cubic-bezier(.22,1,.36,1); }
  @media (prefers-reduced-motion: reduce) { .up, .pop { animation: none; } }

  /* ---------- Auth modal ---------- */
  .modal-scrim { position: fixed; inset: 0; background: rgba(27,20,48,.5); backdrop-filter: blur(4px); z-index: 130; display: grid; place-items: center; padding: 20px; }
  .modal { position: relative; width: 100%; max-width: 420px; background: var(--surface); border-radius: var(--r-lg); padding: 32px 30px 26px; box-shadow: var(--sh-2); }
  .modal-x { position: absolute; top: 16px; right: 16px; width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; color: var(--ink-3); }
  .modal-x:hover { background: var(--line); color: var(--ink); }
  .modal-brand { display: flex; align-items: center; gap: 11px; justify-content: center; margin-bottom: 20px; }
  .auth-tabs { display: flex; gap: 4px; background: var(--surface-2); border: 1.5px solid var(--line-2); border-radius: var(--r-pill); padding: 4px; margin-bottom: 22px; }
  .auth-tabs button { flex: 1; padding: 11px; border-radius: var(--r-pill); font-weight: 700; font-size: 14.5px; color: var(--ink-3); transition: .15s; }
  .auth-tabs button.on { background: var(--ink); color: #fff; }
  .auth-fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field > span { font-weight: 600; font-size: 13px; color: var(--ink-2); }
  .field-in { display: flex; align-items: center; gap: 10px; height: 50px; padding: 0 14px; border: 1.5px solid var(--line-2); border-radius: var(--r); background: var(--surface-2); transition: .15s; color: var(--ink-3); }
  .field-in:focus-within { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 4px var(--brand-soft); color: var(--brand); }
  .field-in.bad { border-color: var(--hot); background: var(--hot-soft); }
  .field-in input, .field-in select { flex: 1; border: none; background: none; outline: none; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--ink); min-width: 0; }
  .field-in select { cursor: pointer; }
  .field-err { color: var(--hot); font-size: 13px; font-weight: 600; margin: 0; }
  .auth-submit { width: 100%; height: 52px; background: var(--brand); color: #fff; border-radius: var(--r); font-weight: 800; font-size: 15.5px; display: flex; align-items: center; justify-content: center; gap: 9px; transition: .18s; }
  .auth-submit:hover { background: var(--brand-ink); transform: translateY(-1px); box-shadow: var(--sh-brand); }
  .auth-note { text-align: center; color: var(--ink-3); font-size: 12px; line-height: 1.5; margin: 14px 0 0; }

  /* ---------- Mobile menu ---------- */
  .mm-scrim { position: fixed; inset: 0; background: rgba(27,20,48,.42); backdrop-filter: blur(3px); z-index: 110; opacity: 0; pointer-events: none; transition: .25s; }
  .mm-scrim.on { opacity: 1; pointer-events: auto; }
  .mm { position: fixed; top: 0; left: 0; bottom: 0; width: 320px; max-width: 86vw; background: var(--bg); z-index: 115; transform: translateX(-100%); transition: transform .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; box-shadow: 10px 0 40px rgba(0,0,0,.16); }

  .mm-acct:hover { background: var(--surface-2); }

  .mm-nav button:hover { background: var(--brand-soft); color: var(--brand-ink); }
  .mm-foot { padding: 18px 22px; border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .mm-logout { color: var(--hot); font-weight: 700; font-size: 14px; padding: 8px 14px; border-radius: 10px; }
  .mm-logout:hover { background: var(--hot-soft); }

  /* ---------- Checkout ---------- */
  .co-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 26px; align-items: start; }
  .co-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 24px; margin-bottom: 20px; box-shadow: var(--sh-1); }
  .co-h { display: flex; align-items: center; gap: 12px; font-family: var(--display); font-weight: 700; font-size: 18px; margin: 0 0 18px; }
  .co-num { width: 28px; height: 28px; border-radius: 8px; background: var(--brand); color: #fff; display: grid; place-items: center; font-size: 14px; font-weight: 800; flex: none; }
  .co-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .co-form .span2 { grid-column: 1 / -1; }
  .pay-list { display: flex; flex-direction: column; gap: 12px; }
  .pay { display: flex; align-items: center; gap: 14px; width: 100%; padding: 16px; border: 1.5px solid var(--line-2); border-radius: var(--r); background: var(--surface); transition: .15s; text-align: left; cursor: pointer; }
  .pay:hover:not(.soon) { border-color: var(--brand); }
  .pay.on { border-color: var(--brand); background: var(--brand-soft); }
  .pay.soon { opacity: .62; cursor: not-allowed; }
  .pay-ic { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; flex: none; }
  .pay-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }

  .pay-sub { color: var(--ink-3); font-size: 12.5px; }

  .co-summary { position: sticky; top: 92px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 22px; box-shadow: var(--sh-1); }

  .co-item-qty { color: var(--ink-3); font-size: 12.5px; }
  .co-item-sum { font-family: var(--display); font-weight: 800; font-size: 14.5px; white-space: nowrap; }
  .co-line { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; font-size: 14.5px; color: var(--ink-2); border-top: 1px solid var(--line); white-space: nowrap; }
  .co-line b { color: var(--ink); font-weight: 700; }
  .co-line .free { color: var(--save); }
  .co-total { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 6px; margin-top: 6px; border-top: 2px solid var(--line-2); font-weight: 700; font-size: 16px; }
  .co-total-v { font-family: var(--display); font-weight: 800; font-size: 24px; letter-spacing: -.02em; }
  .co-total-v small { font-size: 14px; }
  .co-place { width: 100%; height: 54px; background: var(--ink); color: #fff; border-radius: var(--r); font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 9px; margin-top: 14px; transition: .18s; }
  .co-place:hover { background: var(--brand); transform: translateY(-2px); box-shadow: var(--sh-brand); }

  .login-req { max-width: 460px; margin: 40px auto; text-align: center; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 44px 32px; box-shadow: var(--sh-1); }
  .login-req-ic { width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 20px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; }
  .login-req h2 { font-family: var(--display); font-weight: 800; font-size: 24px; margin: 0 0 8px; }
  .login-req p { color: var(--ink-2); font-size: 15px; line-height: 1.55; margin: 0 0 22px; }

  /* ---------- Success ---------- */
  .success { padding: 40px 0; }
  .success-card { max-width: 500px; margin: 0 auto; text-align: center; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 48px 36px 40px; box-shadow: var(--sh-2); }
  .success-ic { width: 88px; height: 88px; margin: 0 auto 22px; border-radius: 50%; background: var(--save); color: #fff; display: grid; place-items: center; box-shadow: 0 12px 30px rgba(18,161,80,.32); }
  .success-card h1 { font-family: var(--display); font-weight: 800; font-size: 30px; margin: 0 0 10px; }
  .success-card > p { color: var(--ink-2); font-size: 15.5px; line-height: 1.55; margin: 0 0 26px; }
  .success-order { display: flex; justify-content: space-between; gap: 16px; background: var(--surface-2); border: 1px solid var(--line-2); border-radius: var(--r); padding: 20px 22px; margin-bottom: 26px; }

  /* responsive */
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; }
    .pd-grid { grid-template-columns: 1fr; }
    .pd-gallery { position: static; }
    .grid { grid-template-columns: repeat(3, 1fr); }
    .why { grid-template-columns: 1fr; }
    .nav, .search { display: none; }
    .burger { display: flex; }
    .hero-h1 { font-size: 36px; }
    .co-grid { grid-template-columns: 1fr; }
    .co-summary { position: static; }
  }

  @media (max-width: 560px) {

    .hdr { position: sticky; top: 0; z-index: 80; backdrop-filter: blur(12px); background: rgba(247,245,251,.92); border-bottom: 1px solid var(--line); }
    .hdr-row { height: 60px; gap: 10px; }
    .brand-tag, .acct-label, .cart-word { display: none; }
    .acct-btn { padding: 0; width: 42px; height: 42px; justify-content: center; border-radius: 50%; flex: none; }
    .cart-btn { padding: 0; width: 42px; height: 42px; border-radius: 14px; justify-content: center; flex: none; overflow: visible; }
    .cart-btn svg { width: 20px; height: 20px; }
    .cart-count { top: -6px; right: -6px; min-width: 18px; height: 18px; font-size: 10px; }
    .hdr-actions { gap: 6px; flex: none; }
    .brand-name { font-size: 17px; }
    .wrap { padding: 0 14px; }

/* ---- animated count-up ---- */
function useCountUp(target, on) {
  const [v, setV] = useState(target);
  useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!on || document.hidden || reduce) { setV(target); return; }
    let raf, start;
    const dur = 700;
    setV(0);
    const step = (t) => {
      if (!start) start = t;
      const k = Math.min((t - start) / dur, 1);
      const e = 1 - Math.pow(1 - k, 3);
      setV(target * e);
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => setV(target), dur + 200);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, on]);
  return v;
}

/* ---- Header ---- */

  React.useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };

    onAuth({ name: finalName, email, token: d.access_token });
    setName(""); setEmail(""); setPassword("");
  };

  // Ro'yxatdan o'tish
  const doRegister = async () => {
    if (name.trim().length < 2) { setErr("Ismingizni kiriting"); return; }
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    if (password.length < 6) { setErr("Parol kamida 6 ta belgi"); return; }
    setLoading(true); setErr("");

    // Email mavjudligini tekshirish
    const check = await sb("/auth/v1/token?grant_type=password", { email, password: "___check___x9z" });
    if (!check.ok) {
      const desc = check.d.error_description || "";
      if (desc === "Invalid login credentials") {
        // Email bor, faqat parol noto'g'ri = allaqachon ro'yxatdan o'tgan
        setErr("Bu email allaqachon ro'yxatdan o'tgan");
        setLoading(false); return;
      }
      // "Email not confirmed" ham email borligini bildiradi
      if (desc.includes("not confirmed") || desc.includes("Email")) {
        setErr("Bu email allaqachon ro'yxatdan o'tgan");
        setLoading(false); return;
      }
    }

    const { ok, d } = await sb("/auth/v1/signup", { email, password, data: { name: name.trim() } });
    setLoading(false);
    if (!ok) {
      setErr(d.error_description || d.msg || d.message || "Xatolik yuz berdi");
      return;
    }
    setTab("verify");
    setInfo(email + " manziliga tasdiqlash kodi yuborildi");
  };

  // OTP tasdiqlash
  const doVerify = async () => {
    if (otp.trim().length < 6) { setErr("Kodni to'liq kiriting"); return; }
    setLoading(true); setErr("");
    const { ok, d } = await sb("/auth/v1/verify", { type: "signup", email, token: otp.trim() });
    setLoading(false);
    if (!ok) { 
      setErr("Kod noto'g'ri yoki muddati o'tgan. Agar avval ro'yxatdan o'tgan bo'lsangiz — 'Kirishga qaytish' tugmasini bosib, email va parolingiz bilan kiring."); 
      return; 
    }
    const finalName = d.user?.user_metadata?.name || name || email.split("@")[0];
    onAuth({ name: finalName, email, token: d.access_token });
    setName(""); setEmail(""); setPassword(""); setOtp("");
  };

  // Parolni tiklash
  const doForgot = async () => {
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    setLoading(true); setErr("");
    const res = await fetch(SB_URL + "/auth/v1/recover", {
      method: "POST",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    setLoading(false);
    if (res.status === 429) {
      setErr("Urinishlar soni ko'payib ketdi. 5-10 daqiqadan keyin qayta urinib ko'ring.");
      return;
    }
    setTab("reset-sent");
  };

  const Brand = () => (
    <div className="modal-brand">
      <div className="brand-mark" style={{ width: 44, height: 44 }}><AC_I.basket style={{ width: 25, height: 25 }} /></div>
      <div className="brand-name" style={{ fontSize: 22 }}>SAVAT<span className="uz">.UZ</span></div>
    </div>
  );

  // OTP ekrani
  if (tab === "verify") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📧</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 6 }}>Emailni tasdiqlang</div>
          <div style={{ color: "#8a849c", fontSize: 13.5 }}>{info}</div>
          <div style={{ color: "#8a849c", fontSize: 12.5, marginTop: 8 }}>Agar xat kelmasa — avval ro'yxatdan o'tgan bo'lishingiz mumkin. "Kirishga qaytish" tugmasini bosing.</div>
        </div>
        <div className="auth-fields">
          <label className="field">
            <span>Tasdiqlash kodi</span>
            <div className="field-in">
              <AC_I.lock style={{ width: 18, height: 18 }} />
              <input value={otp} onChange={e => setOtp(e.target.value)} placeholder="123456"
                inputMode="numeric" maxLength={6}
                onKeyDown={e => { if (e.key === "Enter") doVerify(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
        </div>
        <button className="auth-submit" onClick={doVerify} disabled={loading}>
          {loading ? "Tekshirilmoqda..." : "Tasdiqlash"} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}
          onClick={() => { setTab("login"); setErr(""); }}>← Kirishga qaytish</p>
      </div>
    </div>
  );

  // Parol tiklash yuborildi
  if (tab === "reset-sent") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ textAlign: "center", padding: "16px 0" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>✉️</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 8 }}>Xat yuborildi</div>
          <div style={{ color: "#8a849c", fontSize: 13.5 }}><b>{email}</b> manziliga parolni tiklash havolasi yuborildi. Pochtangizni tekshiring.</div>
        </div>
        <button className="auth-submit" onClick={() => { setTab("login"); setErr(""); }}>
          Kirishga qaytish
        </button>
      </div>
    </div>
  );

  // Parolni unutdim
  if (tab === "forgot") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 4 }}>Parolni tiklash</div>
        <div style={{ color: "#8a849c", fontSize: 13.5, marginBottom: 16 }}>Emailingizga tiklash havolasi yuboramiz</div>
        <div className="auth-fields">
          <label className="field">
            <span>Email</span>
            <div className="field-in">
              <AC_I.user style={{ width: 18, height: 18 }} />
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="email@misol.com"
                onKeyDown={e => { if (e.key === "Enter") doForgot(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
        </div>
        <button className="auth-submit" onClick={doForgot} disabled={loading}>
          {loading ? "Yuborilmoqda..." : "Havolani yuborish"} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}
          onClick={() => { setTab("login"); setErr(""); }}>← Kirishga qaytish</p>
      </div>
    </div>
  );

  // Asosiy kirish / ro'yxatdan o'tish
  return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={(e) => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div className="auth-tabs">
          <button className={tab === "login" ? "on" : ""} onClick={() => { setTab("login"); setErr(""); }}>{t.auth_login_tab}</button>
          <button className={tab === "register" ? "on" : ""} onClick={() => { setTab("register"); setErr(""); }}>{t.auth_reg_tab}</button>
        </div>
        <div className="auth-fields">
          {tab === "register" && (
            <label className="field">
              <span>{t.auth_name}</span>
              <div className="field-in">
                <AC_I.user style={{ width: 18, height: 18 }} />
                <input value={name} onChange={(e) => setName(e.target.value)} placeholder={t.auth_name} />
              </div>
            </label>
          )}
          <label className="field">
            <span>Email</span>
            <div className="field-in">
              <AC_I.user style={{ width: 18, height: 18 }} />
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="email@misol.com" autoComplete="off" />
            </div>
          </label>
          <label className="field">
            <span>Parol</span>
            <div className="field-in">
              <AC_I.lock style={{ width: 18, height: 18 }} />
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" autoComplete="new-password"
                onKeyDown={(e) => { if (e.key === "Enter") tab === "login" ? doLogin() : doRegister(); }} />
            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
          {tab === "login" && (
            <p style={{ margin: "4px 0 0", fontSize: 13, color: "#6c2bd9", cursor: "pointer", textAlign: "right" }}
              onClick={() => { setTab("forgot"); setErr(""); }}>Parolni unutdingizmi?</p>
          )}
        </div>
        <button className="auth-submit" onClick={tab === "login" ? doLogin : doRegister} disabled={loading}>
          {loading ? "Yuklanmoqda..." : t.auth_continue} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note">{t.auth_note}</p>
      </div>
    </div>
  );
}

/* ---------- Checkout ---------- */
function PaymentCard({ m, t, selected, onSelect }) {
  const icon = m.id === "cash" ? <AC_I.truck style={{ width: 20, height: 20 }} />
    : m.id === "payme" ? <AC_I.card style={{ width: 20, height: 20 }} />
    : <AC_I.spark style={{ width: 20, height: 20 }} />;
  return (
    <button
      className={"pay" + (m.soon ? " soon" : "") + (selected ? " on" : "")}
      onClick={() => !m.soon && onSelect(m.id)}
      disabled={m.soon}
    >
      <span className="pay-ic" style={{ background: m.tint, color: m.color }}>{icon}</span>
      <span className="pay-text">
        <span className="pay-name">{m.label}</span>
        <span className="pay-sub">{m.sub}</span>
      </span>
      {m.soon
        ? <span className="pay-soon"><AC_I.lock style={{ width: 12, height: 12 }} />{t.soon}</span>
        : <span className={"pay-radio" + (selected ? " on" : "")} />}
    </button>
  );
}

function Checkout({ items, t, lang, user, onBack, onPlace, onRequireAuth }) {
  const Media = window.SC.Media;
  const [region, setRegion] = useState("");
  const [city, setCity] = useState("");
  const [address, setAddress] = useState("");
  const [comment, setComment] = useState("");
  const [phone, setPhone] = useState("+998 ");
  const [pay, setPay] = useState("payme");
  const [err, setErr] = useState(false);

  useEffect(() => {
    if (user && user.phone && phone.replace(/\D/g, "").length <= 3) setPhone(user.phone);
  }, [user]);

  const total = items.reduce((s, it) => s + AC_D.breakdown(it.p).total * it.q, 0);
  const count = items.reduce((s, it) => s + it.q, 0);

  const methods = [
    { id: "payme", label: "Payme", sub: t.pay_payme_d, tint: "#e6f6fb", color: "#00b8d4" },
    { id: "click", label: "Click", sub: t.pay_click_d, tint: "#eef0ff", color: "#3461ff" },
    { id: "cash", label: t.pay_cash, sub: t.pay_cash_d, tint: "#e7f7ee", color: "#12a150", soon: true },
  ];

  if (!user) {
    return (
      <div className="pd wrap up">
        <button className="back-link" onClick={onBack}><AC_I.back style={{ width: 18, height: 18 }} />{t.back}</button>
        <div className="login-req">
          <div className="login-req-ic"><AC_I.lock style={{ width: 30, height: 30 }} /></div>
          <h2>{t.co_login_req_t}</h2>
          <p>{t.co_login_req_d}</p>
          <button className="auth-submit" style={{ maxWidth: 320, margin: "8px auto 0" }} onClick={onRequireAuth}>
            {t.login} / {t.auth_reg_tab}
          </button>
        </div>
      </div>
    );
  }

  const place = () => {
    if (!region || !phoneValid(phone) || city.trim().length < 2 || address.trim().length < 3) { setErr(true); return; }
    const num = "SV-" + Math.floor(100000 + Math.random() * 900000);
    const orderItems = items.map((it) => {
      const b = AC_D.breakdown(it.p);
      return { id: it.p.id, name_uz: it.p.name.uz, name_ru: it.p.name.ru, qty: it.q, price: b.total };
    });
    onPlace({ num, total, count, items: orderItems, region, city, address, phone, comment, pay });
  };

  return (
    <div className="pd wrap up">
      <button className="back-link" onClick={onBack}><AC_I.back style={{ width: 18, height: 18 }} />{t.back}</button>
      <h1 className="pd-title" style={{ marginBottom: 22 }}>{t.checkout}</h1>
      <div className="co-grid">
        <div className="co-main">
          {/* delivery */}
          <section className="co-card">
            <h3 className="co-h"><span className="co-num">1</span>{t.co_delivery}</h3>
            <div className="co-form">
              <label className="field">
                <span>{t.co_region}</span>
                <div className={"field-in" + (err && !region ? " bad" : "")}>
                  <AC_I.pin style={{ width: 18, height: 18 }} />
                  <select value={region} onChange={(e) => setRegion(e.target.value)}>
                    <option value="">{t.co_region_ph}</option>
                    {AC_D.REGIONS.map((r) => <option key={r.id} value={r.id}>{r[lang]}</option>)}
                  </select>
                </div>
              </label>
              <label className="field">
                <span>{t.co_city}</span>
                <div className={"field-in" + (err && city.trim().length < 2 ? " bad" : "")}>
                  <input value={city} onChange={(e) => setCity(e.target.value)} placeholder={t.co_city} />
                </div>
              </label>
              <label className="field span2">
                <span>{t.auth_phone}</span>
                <div className={"field-in" + (err && !phoneValid(phone) ? " bad" : "")}>
                  <AC_I.phone style={{ width: 18, height: 18 }} />
                  <input inputMode="tel" value={phone}
                    onChange={(e) => setPhone(maskPhone(e.target.value))}
                    onKeyDown={(e) => { if ((e.key === "Backspace" || e.key === "Delete") && phone.replace(/\D/g, "").length <= 3) e.preventDefault(); }}
                    placeholder="+998 90 123 45 67" />
                </div>
              </label>
              <label className="field span2">
                <span>{t.co_address}</span>
                <div className={"field-in" + (err && address.trim().length < 3 ? " bad" : "")}>
                  <input value={address} onChange={(e) => setAddress(e.target.value)} placeholder={t.co_address} />
                </div>
              </label>
              <label className="field span2">
                <span>{t.co_comment}</span>
                <div className="field-in">
                  <input value={comment} onChange={(e) => setComment(e.target.value)} placeholder={t.co_comment} />
                </div>
              </label>
            </div>
          </section>

          {/* payment */}
          <section className="co-card">
            <h3 className="co-h"><span className="co-num">2</span>{t.co_payment}</h3>
            <div className="pay-list">
              {methods.map((m) => (
                <PaymentCard key={m.id} m={m} t={t} selected={pay === m.id} onSelect={setPay} />
              ))}
            </div>
          </section>
        </div>

        {/* summary */}
        <aside className="co-side">
          <div className="co-summary">
            <h3 className="co-h" style={{ marginBottom: 14 }}>{t.co_summary}</h3>
            <div className="co-items">
              {items.map((it) => {
                const b = AC_D.breakdown(it.p);
                return (
                  <div className="co-item" key={it.p.id}>
                    <div className="co-item-media"><Media p={it.p} label="" /></div>
                    <div className="co-item-info">
                      <p className="co-item-name">{it.p.name[lang]}</p>
                      <span className="co-item-qty">{it.q} × {AC_D.fmt(b.total)} {t.unit}</span>
                    </div>
                    <span className="co-item-sum">{AC_D.fmt(b.total * it.q)}</span>
                  </div>
                );
              })}
            </div>
            <div className="co-line"><span>{t.co_items} ({count})</span><b>{AC_D.fmt(total)} {t.unit}</b></div>
            <div className="co-line"><span>{t.co_delivery_fee}</span><b className="free">{t.co_free}</b></div>
            <div className="co-total">
              <span>{t.co_total}</span>
              <span className="co-total-v">{AC_D.fmt(total)} <small>{t.unit}</small></span>
            </div>
            {err && <p className="field-err" style={{ textAlign: "center" }}>{t.co_err}</p>}
            <button className="co-place" onClick={place}>{t.co_place} <AC_I.check style={{ width: 18, height: 18 }} /></button>
          </div>
        </aside>
      </div>
    </div>
  );
}

/* ---- Image Swiper ---- */
function ImageSwiper({ p, lang }) {
  const imgs = (p.image_urls && p.image_urls.length > 0) ? p.image_urls : (p.image_url ? [p.image_url] : []);
  const total = imgs.length;
  const [idx, setIdx] = React.useState(0);
  const wrapRef = React.useRef(null);
  const startX = React.useRef(null);
  const dragXRef = React.useRef(0);
  const [dragX, setDragX] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const idxRef = React.useRef(idx);
  React.useEffect(() => { idxRef.current = idx; }, [idx]);

  const goTo = (i) => { if(i < 0 || i >= total) return; setIdx(i); };
  const prev = (e) => { if(e) e.stopPropagation(); goTo(idxRef.current - 1); };
  const next = (e) => { if(e) e.stopPropagation(); goTo(idxRef.current + 1); };

  const endDragWithDx = (dx) => {
    // dx > 0 = o'ngga surdi = chapga o'tish
    // dx < 0 = chapga surdi = o'ngga o'tish
    const cur = idxRef.current;
    if (Math.abs(dx) > 40) {
      if (dx > 0 && cur > 0) goTo(cur - 1);
      else if (dx < 0 && cur < total - 1) goTo(cur + 1);
    }
    startX.current = null; dragXRef.current = 0; setDragX(0); setDragging(false);
  };

  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; dragXRef.current = 0; setDragX(0); setDragging(true); };
  const onTouchMove  = (e) => {
    if (startX.current === null) return;
    const dx = e.touches[0].clientX - startX.current;
    dragXRef.current = dx; setDragX(dx);
  };
  const onTouchEnd = () => { endDragWithDx(dragXRef.current); };

  const onMouseDown = (e) => {
    if(total <= 1) return;
    e.preventDefault();
    startX.current = e.clientX; dragXRef.current = 0; setDragX(0); setDragging(true);
    const onMove = (ev) => {
      const dx = ev.clientX - startX.current;
      dragXRef.current = dx; setDragX(dx);
    };
    const onUp = () => {
      endDragWithDx(dragXRef.current);
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };
  const onMouseMove  = () => {};
  const onMouseUp    = () => {};
  const onMouseLeave = () => {};

  const pxOffset = dragging ? dragX : 0;
  const pctBase = -(idx * 100);

  const ChevL = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>;
  const ChevR = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;

  return (
    <div>
      <div
        className="swiper-wrap"
        ref={wrapRef}
        style={{ cursor: total > 1 ? (dragging ? "grabbing" : "grab") : "default" }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseLeave}
      >
        <div
          className={"swiper-track" + (dragging ? " no-anim" : "")}
          style={{ transform: `translateX(calc(${pctBase}% + ${pxOffset}px))` }}
        >
          {total === 0 ? (
            <div className="swiper-slide">
              <div className="ph" style={{ background: p.tile }}>
                <span className="ph-label">{p.name[lang || "uz"].toLowerCase()}</span>
              </div>
            </div>
          ) : imgs.map((url, i) => (
            <div className="swiper-slide" key={i}>
              <img src={url} alt={p.name[lang || "uz"]} draggable="false" />
            </div>
          ))}
        </div>

        <div className="swiper-badge">
          <span className="badge-disc" style={{ fontSize: 15, padding: "7px 14px" }}>−{window.SAVAT.breakdown(p).pct}%</span>
        </div>

        {total > 1 && (
          <>
            {idx > 0 && <button className="swiper-btn swiper-prev" onClick={prev} aria-label="Oldingi"><ChevL /></button>}
            {idx < total - 1 && <button className="swiper-btn swiper-next" onClick={next} aria-label="Keyingi"><ChevR /></button>}
          </>
        )}
      </div>

      {total > 1 && (
        <>
          <div className="swiper-dots">
            {imgs.map((_, i) => <button key={i} className={"swiper-dot" + (i === idx ? " on" : "")} onClick={() => goTo(i)} />)}
          </div>
          <div className="swiper-thumbs">
            {imgs.map((url, i) => (
              <div key={i} className={"swiper-thumb" + (i === idx ? " on" : "")} onClick={() => goTo(i)}>
                <img src={url} alt={"" + (i+1)} draggable="false" />
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ---- Variant Picker ---- */
function VariantPicker({ variants, selected, onSelect, productImages }) {
  if (!variants || variants.length === 0) return null;

  const groups = {};

                    >
                      {v.value}
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );

              <div className="was">{t.pc_market}: <s>{D.fmt(b.market)} {t.unit}</s></div>
              <div className="now-row">
                <span className="now-lbl">{t.pc_total}</span>
                <span className="now">{D.fmt(total)} <small>{t.unit}</small></span>
              </div>
              <div className="calc-save"><Ico.flame style={{ width: 15, height: 15 }} />{t.pc_save} {D.fmt(b.save)} {t.unit}</div>
            </div>

            {/* service explainer */}
            <div className="svc">
              <button className={"svc-q" + (open ? " open" : "")} onClick={() => setOpen(!open)}>
                <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <Ico.shield style={{ width: 18, height: 18, color: "var(--brand)" }} />{t.service_q}
                </span>
                <Ico.chevron className="chev" style={{ width: 18, height: 18 }} />
              </button>
              {open && (
                <div className="svc-body pop">
                  <div className={"svc-rule" + (under ? " svc-active" : "")}>
                    <span className="k"><span className="badge">≤1</span>{t.service_r1}</span>
                    <span className="v">{t.service_r1v}</span>
                  </div>
                  <div className={"svc-rule" + (!under ? " svc-active" : "")}>
                    <span className="k"><span className="badge">1+</span>{t.service_r2}</span>
                    <span className="v">{t.service_r2v}</span>
                  </div>
                  <p className="svc-note">
                    {t.service_note} <b style={{ color: "var(--ink)" }}>{wLabel} → {D.fmt(b.service)} {t.unit}</b>
                  </p>
                </div>
              )}
            </div>
          </div>

          <VariantPicker
            variants={variants}
            selected={selVars}
            onSelect={(type, v) => setSelVars(prev => ({...prev, [type]: v}))}
            productImages={p.image_urls || (p.image_url ? [p.image_url] : [])}
          />
          {variants.length > 0 && !allSelected && (
            <div style={{fontSize:13,color:"#e05c00",fontWeight:700,marginBottom:10}}>
              ⚠️ Variantni tanlang
            </div>
          )}
          <div className="pd-cta">
            <button className="order" onClick={() => { if(variants.length > 0 && !allSelected) return; onOrder(p, varLabel); }} style={variants.length > 0 && !allSelected ? {opacity:.5} : {}}>{t.detail_order} <Ico.arrow style={{ width: 18, height: 18 }} /></button>
            {qty > 0 ? (
              <div className="stepper stepper-lg">
                <button onClick={() => onDec(p.id)} aria-label="-"><Ico.minus /></button>
                <span>{qty}</span>
                <button onClick={() => onInc(p)} aria-label="+"><Ico.plus /></button>
              </div>
            ) : (
              <button className="addc" onClick={(e) => { if(variants.length > 0 && !allSelected) return; onAdd(p, e, varLabel); }} style={variants.length > 0 && !allSelected ? {opacity:.5} : {}} aria-label={t.detail_add}><Ico.cart style={{ width: 22, height: 22 }} /></button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Cart Drawer ---------- */
function CartDrawer({ open, items, t, lang, onClose, onQty, onRemove, onCheckout }) {
  const total = items.reduce((s, it) => s + D.breakdown(it.p).total * it.q, 0);
  const count = items.reduce((s, it) => s + it.q, 0);
  return (
    <>
      <div className={"scrim" + (open ? " on" : "")} onClick={onClose} />
      <aside className={"drawer" + (open ? " on" : "")}>
        <div className="drawer-h">
          <h3>{t.cart_title}{count > 0 ? ` · ${count}` : ""}</h3>
          <button className="x-btn" onClick={onClose}><Ico.x style={{ width: 20, height: 20 }} /></button>
        </div>
        <div className="drawer-body">
          {items.length === 0 ? (
            <div className="cart-empty">
              <div className="big"><Ico.cart style={{ width: 30, height: 30 }} /></div>
              <p>{t.cart_empty}</p>
            </div>
          ) : items.map((it) => {
            const b = D.breakdown(it.p);
            return (
              <div className="ci" key={it.p.id}>
                <div className="ci-media"><Media p={it.p} label="" /></div>
                <div className="ci-info">
                  <p className="ci-name">{it.p.name[lang]}</p>
                  <span className="ci-price">{D.fmt(b.total * it.q)} <small style={{ fontSize: 12, color: "var(--ink-3)" }}>{t.unit}</small></span>
                  <div>
                    <div className="ci-qty">
                      <button onClick={() => onQty(it.p.id, -1)}><Ico.minus style={{ width: 14, height: 14 }} /></button>
                      <span>{it.q}</span>
                      <button onClick={() => onQty(it.p.id, 1)}><Ico.plus style={{ width: 14, height: 14 }} /></button>
                    </div>
                  </div>
                </div>
                <button className="ci-rm" onClick={() => onRemove(it.p.id)}><Ico.x style={{ width: 16, height: 16 }} /></button>
              </div>
            );
          })}
        </div>
        {items.length > 0 && (
          <div className="drawer-foot">
            <div className="drawer-total">
              <span className="t-l">{t.cart_total}</span>
              <span className="t-v">{D.fmt(total)} <small style={{ fontSize: 16 }}>{t.unit}</small></span>
            </div>
            <button className="checkout" onClick={onCheckout}>{t.cart_checkout} →</button>
          </div>
        )}
      </aside>
    </>
  );
}

/* ---------- App ---------- */
function App() {
  const [lang, setLang] = useState(() => localStorage.getItem("savat_lang") || "uz");
  const [view, setView] = useState("home"); // home | product | checkout | success
  const [current, setCurrent] = useState(null);
  const [cat, setCat] = useState("all");
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [products, setProducts] = useState(D.PRODUCTS);
  const [productsLoading, setProductsLoading] = useState(true);
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem("savat_user") || "null"); } catch (e) { return null; }
  });
  const [authOpen, setAuthOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [order, setOrder] = useState(null);
  const [query, setQuery] = useState("");
  const toastTimer = useRef(null);

  const t = D.I18N[lang];
  useEffect(() => { localStorage.setItem("savat_lang", lang); }, [lang]);
  useEffect(() => { document.documentElement.lang = lang; }, [lang]);
  useEffect(() => {
    if (user) localStorage.setItem("savat_user", JSON.stringify(user));
    else localStorage.removeItem("savat_user");
  }, [user]);
  useEffect(() => {
    D.fetchProducts()
      .then((rows) => { if (rows && rows.length) setProducts(rows); })
      .catch((err) => { console.error("Mahsulotlarni yuklashda xato:", err); })
      .finally(() => setProductsLoading(false));
  }, []);

  const featured = products.find((p) => p.id === 1) || products[0];
  const list = products.filter((p) => {
    const matchCat = cat === "all" || p.cat === cat;
    const q = query.trim().toLowerCase();
    const matchQ = !q || p.name.uz.toLowerCase().includes(q) || p.name.ru.toLowerCase().includes(q) || (p.sub && (p.sub.uz.toLowerCase().includes(q) || p.sub.ru.toLowerCase().includes(q)));
    return matchCat && matchQ;
  });

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2000);
  };
  const addToCart = (p) => {
    setCart((c) => {
      const f = c.find((it) => it.p.id === p.id);
      if (f) return c.map((it) => it.p.id === p.id ? { ...it, q: it.q + 1 } : it);
      return [...c, { p, q: 1 }];
    });
    showToast(t.added);
  };
  const changeQty = (id, d) => setCart((c) => c.map((it) => it.p.id === id ? { ...it, q: Math.max(1, it.q + d) } : it));
  const removeItem = (id) => setCart((c) => c.filter((it) => it.p.id !== id));
  const decItem = (id) => setCart((c) => c.flatMap((it) => it.p.id === id ? (it.q > 1 ? [{ ...it, q: it.q - 1 }] : []) : [it]));
  const cartQty = (id) => { const it = cart.find((i) => i.p.id === id); return it ? it.q : 0; };
  const openProduct = (p) => { setCurrent(p); setView("product"); window.scrollTo({ top: 0 }); };
  const goHome = () => { setView("home"); window.scrollTo({ top: 0 }); };
  const goCheckout = () => {
    if (cart.length === 0) return;
    setCartOpen(false);
    setView("checkout");
    window.scrollTo({ top: 0 });
  };
  const onAccount = () => { if (user) setMenuOpen(true); else setAuthOpen(true); };
  const onAuth = (u) => { setUser(u); setAuthOpen(false); };
  const onLogout = () => { setUser(null); };
  const placeOrder = (o) => {
    D.saveOrder({ ...o, user_email: user ? user.email : null }).catch((err) => console.error("Buyurtmani saqlashda xato:", err));
    setOrder(o);
    setCart([]);
    setView("success");
    window.scrollTo({ top: 0 });
  };

  const cartCount = cart.reduce((s, it) => s + it.q, 0);

  return (
    <>
      <Header t={t} lang={lang} setLang={setLang} cartCount={cartCount}
        onCart={() => setCartOpen(true)} onHome={goHome}
        user={user} onAccount={onAccount} onMenu={() => setMenuOpen(true)}
        onMyOrders={() => setView("myorders")} onHelp={() => setView("help")} onCatalog={() => { goHome(); document.querySelector(".cats")?.scrollIntoView({behavior:"smooth"}); }}
        query={query} onSearch={(v) => { setQuery(v); if(view !== "home") setView("home"); }}
        products={products} onSelect={(p) => { setQuery(""); openProduct(p); }} />
      <MobileSearch t={t} query={query} lang={lang}
        onSearch={(v) => { setQuery(v); if(view !== "home") setView("home"); }}
        products={products} onSelect={(p) => { setQuery(""); openProduct(p); }} />

      {view === "home" && (
        <main>
          <Hero t={t} lang={lang} product={featured} onView={openProduct} onAdd={addToCart} />
          <Cats cats={D.CATS} lang={lang} active={cat} onPick={setCat} />
          <Bestsellers products={list} t={t} lang={lang} qtyFor={cartQty} query={query}
            onView={openProduct}
            onAdd={(p) => {
              if (p._hasVariants) { openProduct(p); }
              else { addToCart(p); }
            }}
            onInc={(p) => addToCart(p)} onDec={decItem} />
          <Why t={t} />
          <Footer t={t} />
        </main>
      )}
      {view === "product" && (
        <main>
          <ProductDetail p={current} t={t} lang={lang} qty={cartQty(current.id)} onBack={goHome}
            onAdd={(p) => addToCart(p)} onOrder={(p) => { addToCart(p); goCheckout(); }}
            onInc={(p) => addToCart(p)} onDec={decItem} />
          <Footer t={t} />
        </main>
      )}
      {view === "checkout" && (
        <main>
          <Checkout items={cart} t={t} lang={lang} user={user}
            onBack={() => (current ? openProduct(current) : goHome())}
            onPlace={placeOrder} onRequireAuth={() => setAuthOpen(true)} />
          <Footer t={t} />
        </main>
      )}
      {view === "success" && order && (
        <main>
          <OrderSuccess order={order} t={t} onHome={goHome} />
          <Footer t={t} />
        </main>
      )}
      {view === "myorders" && (
        <main>
          <MyOrders user={user} t={t} onHome={goHome} />
        </main>
      )}
      {view === "help" && (
        <main>
          <HelpPage t={t} onHome={goHome} user={user} onLogin={() => setAuthOpen(true)} />
        </main>
      )}

      <CartDrawer open={cartOpen} items={cart} t={t} lang={lang}
        onClose={() => setCartOpen(false)} onQty={changeQty} onRemove={removeItem}
        onCheckout={goCheckout} />

      <AuthModal open={authOpen} t={t} onClose={() => setAuthOpen(false)} onAuth={onAuth} />
      <MobileMenu open={menuOpen} t={t} lang={lang} setLang={setLang}
        onClose={() => setMenuOpen(false)} onHome={goHome}
        user={user} onAccount={() => setAuthOpen(true)} onLogout={onLogout}
        onMyOrders={() => setView("myorders")}
        onHelp={() => { setMenuOpen(false); setView("help"); }}
        onCatalog={() => { setMenuOpen(false); goHome(); }} />

      {/* Bottom Navigation — faqat mobile */}
      <nav className="bottom-nav">
        <button className={view === "home" ? "active" : ""} onClick={goHome}>
          <Ico.home style={{ width: 22, height: 22 }} />
          <span>Bosh</span>
        </button>
        <button onClick={() => { goHome(); setTimeout(() => document.querySelector(".cats")?.scrollIntoView({behavior:"smooth"}), 100); }}>
          <Ico.grid style={{ width: 22, height: 22 }} />
          <span>Katalog</span>
        </button>
        {user ? (
          <button className={view === "myorders" ? "active" : ""} onClick={() => setView("myorders")}>
            <Ico.box style={{ width: 22, height: 22 }} />
            <span>Buyurtmalar</span>
          </button>
        ) : (
          <button className={view === "help" ? "active" : ""} onClick={() => setView("help")}>
            <Ico.help style={{ width: 22, height: 22 }} />
            <span>Yordam</span>
          </button>
        )}
        <button className="bn-cart" onClick={() => setCartOpen(true)}>
          <Ico.cart style={{ width: 22, height: 22 }} />
          {cartCount > 0 && <span className="bn-badge">{cartCount}</span>}
          <span>Savat</span>
        </button>
      </nav>

      <div className={"toast" + (toast ? " on" : "")}>
        <span className="ok"><Ico.check style={{ width: 13, height: 13, color: "#fff" }} /></span>
        {toast}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>

<style>
  :root {
    --bg: #f7f5fb;
    --surface: #ffffff;
    --surface-2: #faf8fe;
    --ink: #1b1430;
    --ink-2: #4a4360;
    --ink-3: #8a849c;
    --line: #ece8f4;
    --line-2: #e0dbee;
    --brand: #6c2bd9;
    --brand-2: #9333ea;
    --brand-ink: #4a1a9e;
    --brand-soft: #f1ebff;
    --hot: #f0432e;
    --hot-soft: #ffece8;
    --gold: #f5a623;
    --save: #12a150;
    --save-soft: #e7f7ee;
    --r-lg: 24px;
    --r: 18px;
    --r-sm: 12px;
    --r-pill: 999px;
    --sh-1: 0 1px 2px rgba(27,20,48,.05), 0 4px 16px rgba(27,20,48,.04);
    --sh-2: 0 8px 30px rgba(27,20,48,.10);
    --sh-brand: 0 10px 30px rgba(108,43,217,.28);
    --maxw: 1200px;
    --font: "Plus Jakarta Sans", system-ui, sans-serif;
    --display: "Sora", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--brand); color: #fff; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { max-width: 100%; display: block; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

  /* ---------- Header ---------- */
  .hdr {
    position: sticky; top: 0; z-index: 60;
    background: rgba(255,255,255,.82);
    backdrop-filter: saturate(1.4) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .hdr-row { display: flex; align-items: center; gap: 22px; height: 72px; }
  .brand { display: flex; align-items: center; gap: 11px; cursor: pointer; user-select: none; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(140deg, #7c3aed 0%, #c026d3 100%);
    box-shadow: var(--sh-brand);
    display: grid; place-items: center; position: relative; flex: none;
  }
  .brand-mark svg { width: 23px; height: 23px; }
  .brand-name { font-family: var(--display); font-weight: 800; font-size: 21px; letter-spacing: -.02em; line-height: 1; }
  .brand-name .uz { color: var(--brand); }
  .brand-tag { font-size: 10.5px; color: var(--ink-3); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; margin-top: 3px; }
  .nav { display: flex; gap: 4px; margin-left: 8px; }
  .nav button { padding: 9px 15px; border-radius: var(--r-pill); font-weight: 600; font-size: 14.5px; color: var(--ink-2); background: transparent; border: 1.5px solid transparent; cursor: pointer; transition: .15s; font-family: inherit; }
  .nav button:hover { background: var(--brand-soft); color: var(--brand-ink); border-color: var(--line-2); transform: translateY(-1px); }
  .nav button:active { transform: translateY(0); }
  .burger { display: none; width: 42px; height: 42px; border-radius: 12px; align-items: center; justify-content: center; color: var(--ink); border: 1.5px solid var(--line-2); background: var(--surface-2); }
  .burger svg { width: 22px; height: 22px; }
  .search { flex: 1; max-width: 460px; position: relative; }
  .search input {
    width: 100%; height: 44px; border-radius: var(--r-pill);
    border: 1.5px solid var(--line-2); background: var(--surface-2);
    padding: 0 18px 0 44px; font-size: 14.5px; font-family: inherit; color: var(--ink);
    transition: .18s; outline: none;
  }
  .search input:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 4px var(--brand-soft); }
  .search svg { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--ink-3); }
  .hdr-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .acct-btn { display: flex; align-items: center; gap: 8px; height: 44px; padding: 0 15px; background: var(--surface-2); border: 1.5px solid var(--line-2); border-radius: var(--r-pill); font-weight: 700; font-size: 14px; color: var(--ink); transition: .18s; cursor: pointer; }
  .acct-btn:hover { border-color: var(--brand); color: var(--brand-ink); }
  .acct-label { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lang { display: flex; background: var(--surface-2); border: 1.5px solid var(--line-2); border-radius: var(--r-pill); padding: 3px; }
  .lang button { padding: 6px 12px; border-radius: var(--r-pill); font-weight: 700; font-size: 13px; color: var(--ink-3); transition: .15s; }
  .lang button.on { background: var(--ink); color: #fff; }
  .cart-btn {
    display: flex; align-items: center; gap: 9px; height: 44px; padding: 0 18px;
    background: var(--ink); color: #fff; border-radius: var(--r-pill); font-weight: 700; font-size: 14.5px;
    transition: .18s; position: relative;
  }
  .cart-btn:hover { background: var(--brand); transform: translateY(-1px); }
  .cart-btn svg { width: 18px; height: 18px; }
  .cart-count {
    position: absolute; top: -5px; right: -5px; min-width: 20px; height: 20px; padding: 0 5px;
    background: var(--hot); color: #fff; border-radius: 999px; font-size: 11.5px; font-weight: 800;
    display: grid; place-items: center; border: 2px solid #fff;
  }

  /* ---------- Hero ---------- */
  .hero { padding: 30px 0 8px; }
  .hero-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 28px; align-items: stretch; }
  .hero-left {
    background: linear-gradient(160deg, #2a1257 0%, #6c2bd9 78%, #8b2fd6 100%);
    color: #fff; border-radius: var(--r-lg); padding: 40px 40px 34px; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .hero-left::after {
    content: ""; position: absolute; right: -60px; top: -60px; width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(255,255,255,.16), transparent 70%); pointer-events: none;
  }
  .kicker {
    display: inline-flex; align-items: center; gap: 7px; align-self: flex-start;
    background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22);
    padding: 7px 13px; border-radius: var(--r-pill); font-weight: 700; font-size: 12px; letter-spacing: .06em;

  <script type="text/babel">
/* ============ SAVAT.UZ — components ============ */
const { useState, useEffect, useRef } = React;
const I = window.Icons;
const { breakdown, fmt } = window.SAVAT;

/* ---- placeholder media tile ---- */
function Media({ p, label }) {
  if (p.image_url) {
    return (
      <div className="ph" style={{ background: p.tile, padding: 0, overflow: "hidden" }}>
        <img src={p.image_url} alt={p.name.uz} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
      </div>
    );
  }
  return (
    <div className="ph" style={{ background: p.tile }}>
      <span className="ph-label">{label || p.name.uz.toLowerCase()}</span>
    </div>
  );
}

/* ---- animated count-up ---- */
function useCountUp(target, on) {
  const [v, setV] = useState(target);
  useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!on || document.hidden || reduce) { setV(target); return; }
    let raf, start;
    const dur = 700;
    setV(0);
    const step = (t) => {
      if (!start) start = t;
      const k = Math.min((t - start) / dur, 1);
      const e = 1 - Math.pow(1 - k, 3);
      setV(target * e);
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    const safety = setTimeout(() => setV(target), dur + 200);
    return () => { cancelAnimationFrame(raf); clearTimeout(safety); };
  }, [target, on]);
  return v;
}

/* ---- Header ---- */
function Header({ t, lang, setLang, cartCount, onCart, onHome, user, onAccount, onMenu, onMyOrders, onHelp, onCatalog, query, onSearch, products, onSelect }) {
  return (
    <header className="hdr">
      <div className="wrap hdr-row">
        <button className="burger" onClick={onMenu} aria-label="menu"><I.menu /></button>
        <div className="brand" onClick={onHome}>
          <div className="brand-mark"><I.basket /></div>
          <div>
            <div className="brand-name">SAVAT<span className="uz">.UZ</span></div>
            <div className="brand-tag">{t.tag}</div>
          </div>
        </div>
        <nav className="nav">
          <button onClick={onHome}>{t.nav_home}</button>
          <button onClick={onCatalog}>{t.nav_catalog}</button>
          {user && <button onClick={onMyOrders}>{t.nav_track}</button>}
          <button onClick={onHelp}>{t.nav_help}</button>
        </nav>
        <SearchBox t={t} query={query} onSearch={onSearch} products={products} onSelect={onSelect} lang={lang} />
        <div className="hdr-actions">
          <div className="lang">
            <button className={lang === "uz" ? "on" : ""} onClick={() => setLang("uz")}>UZ</button>
            <button className={lang === "ru" ? "on" : ""} onClick={() => setLang("ru")}>RU</button>
          </div>
          <button className="acct-btn" onClick={onAccount}>

/* ---- Search with Dropdown ---- */
function SearchBox({ t, query, onSearch, products, onSelect, lang, mobile }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const fmt = window.SAVAT.fmt;
  const bd = window.SAVAT.breakdown;

  const suggestions = query.trim().length > 0
    ? products.filter(p => {
        const q = query.trim().toLowerCase();
        return p.name.uz.toLowerCase().includes(q) || p.name.ru.toLowerCase().includes(q);
      }).slice(0, 6)
    : [];

  React.useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
  }, []);

  const inner = (
    <div className="search-wrap" ref={ref}>
      <div className="search">
        <I.search />
        <input
          placeholder={t.search}
          value={query}
          onChange={(e) => { onSearch(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
          onKeyDown={(e) => { if(e.key === "Escape") { onSearch(""); setOpen(false); } }}
        />
        {query && <button className="search-clear" onClick={() => { onSearch(""); setOpen(false); }}>×</button>}
      </div>
      {open && query.trim().length > 0 && (
        <div className="search-dropdown">
          {suggestions.length === 0 ? (
            <div className="sd-empty">🔍 {lang === "ru" ? "Ничего не найдено" : "Hech narsa topilmadi"}</div>
          ) : suggestions.map(p => {
            const b = bd(p);
            const imgUrl = (p.image_urls && p.image_urls[0]) || p.image_url;
            return (
              <div className="sd-item" key={p.id} onMouseDown={(e) => { e.preventDefault(); onSelect(p); onSearch(""); setOpen(false); }}>
                <div className="sd-img">
                  {imgUrl ? <img src={imgUrl} alt={p.name[lang||"uz"]} onError={(e)=>{e.target.style.display="none";}} /> : <div style={{width:"100%",height:"100%",background:p.tile||"#ede9ff",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}}>{"🛒"}</div>}
                </div>
                <div className="sd-info">
                  <div className="sd-name">{p.name[lang||"uz"]}</div>
                  <div className="sd-price">{fmt(b.total)} so'm</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  if(mobile) return <div className="mobile-search">{inner}</div>;
  return inner;
}

function MobileSearch({ t, query, onSearch, products, onSelect, lang }) {
  return <SearchBox t={t} query={query} onSearch={onSearch} products={products} onSelect={onSelect} lang={lang} mobile={true} />;
}

/* ---- Product card ---- */
function ProductCard({ p, t, lang, qty, onView, onAdd, onInc, onDec }) {
  const b = breakdown(p);

  return (
    <div className="card" onClick={() => onView(p)}>
      <div className="card-media">
        <span className="badge-disc">−{b.pct}%</span>
        {qty > 0 && <span className="badge-incart"><I.check style={{ width: 12, height: 12, strokeWidth: 2.6 }} />{qty} {t.qty}</span>}

            <div className="stepper" onClick={stop}>

</script>
  <script type="text/babel">
/* ============ SAVAT.UZ — auth, checkout, mobile menu ============ */
const AC_D = window.SAVAT;
const AC_I = window.Icons;
const ACMedia = () => window.SC.Media;

/* phone mask: +998 90 123 45 67 */
function maskPhone(raw) {
  let d = raw.replace(/\D/g, "");
  if (d.startsWith("998")) d = d.slice(3);
  d = d.slice(0, 9);
  let out = "+998";
  if (d.length) out += " " + d.slice(0, 2);
  if (d.length > 2) out += " " + d.slice(2, 5);
  if (d.length > 5) out += " " + d.slice(5, 7);
  if (d.length > 7) out += " " + d.slice(7, 9);
  return out;
}
function phoneValid(p) { return p.replace(/\D/g, "").length === 12; }

/* ---------- Auth modal ---------- */
function AuthModal({ open, t, onClose, onAuth }) {
  const [tab, setTab] = useState("login"); // login | register | verify | forgot | reset-sent
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [otp, setOtp] = useState("");
  const [err, setErr] = useState("");
  const [info, setInfo] = useState("");
  const [loading, setLoading] = useState(false);

  const SB_URL = "https://gjsaelqqubmlwnmfyuso.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqc2FlbHFxdWJtbHdubWZ5dXNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDY5MzAsImV4cCI6MjA5NzAyMjkzMH0.zLx1yBAUdMqtTW61zibbhQts3zVk-aRQTmTjn0L1U9Y";

  useEffect(() => { if (open) { setErr(""); setInfo(""); setLoading(false); } }, [open, tab]);
  if (!open) return null;

  const sb = (path, body) => fetch(SB_URL + path, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(r => r.json().then(d => ({ ok: r.ok, d })));

  // Kirish
  const doLogin = async () => {
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    if (password.length < 6) { setErr("Parol kamida 6 ta belgi"); return; }
    setLoading(true); setErr("");
    const { ok, d } = await sb("/auth/v1/token?grant_type=password", { email, password });
    setLoading(false);
    if (!ok) {
      if (d.error_description === "Invalid login credentials") setErr("Email yoki parol noto'g'ri");
      else if (d.error_description?.includes("Email not confirmed")) setErr("Email tasdiqlanmagan — pochtangizni tekshiring");
      else setErr(d.error_description || "Xatolik yuz berdi");
      return;
    }
    const finalName = d.user?.user_metadata?.name || email.split("@")[0];
    onAuth({ name: finalName, email, token: d.access_token });
    setName(""); setEmail(""); setPassword("");
  };

  // Ro'yxatdan o'tish
  const doRegister = async () => {
    if (name.trim().length < 2) { setErr("Ismingizni kiriting"); return; }
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    if (password.length < 6) { setErr("Parol kamida 6 ta belgi"); return; }
    setLoading(true); setErr("");

    // Email mavjudligini tekshirish
    const check = await sb("/auth/v1/token?grant_type=password", { email, password: "___check___x9z" });
    if (!check.ok) {
      const desc = check.d.error_description || "";
      if (desc === "Invalid login credentials") {
        // Email bor, faqat parol noto'g'ri = allaqachon ro'yxatdan o'tgan
        setErr("Bu email allaqachon ro'yxatdan o'tgan");
        setLoading(false); return;
      }
      // "Email not confirmed" ham email borligini bildiradi
      if (desc.includes("not confirmed") || desc.includes("Email")) {
        setErr("Bu email allaqachon ro'yxatdan o'tgan");
        setLoading(false); return;
      }
    }

    const { ok, d } = await sb("/auth/v1/signup", { email, password, data: { name: name.trim() } });
    setLoading(false);
    if (!ok) {
      setErr(d.error_description || d.msg || d.message || "Xatolik yuz berdi");
      return;
    }
    setTab("verify");
    setInfo(email + " manziliga tasdiqlash kodi yuborildi");
  };

  // OTP tasdiqlash
  const doVerify = async () => {
    if (otp.trim().length < 6) { setErr("Kodni to'liq kiriting"); return; }
    setLoading(true); setErr("");
    const { ok, d } = await sb("/auth/v1/verify", { type: "signup", email, token: otp.trim() });
    setLoading(false);
    if (!ok) { 
      setErr("Kod noto'g'ri yoki muddati o'tgan. Agar avval ro'yxatdan o'tgan bo'lsangiz — 'Kirishga qaytish' tugmasini bosib, email va parolingiz bilan kiring."); 
      return; 
    }
    const finalName = d.user?.user_metadata?.name || name || email.split("@")[0];
    onAuth({ name: finalName, email, token: d.access_token });
    setName(""); setEmail(""); setPassword(""); setOtp("");
  };

  // Parolni tiklash
  const doForgot = async () => {
    if (!email.includes("@")) { setErr("To'g'ri email kiriting"); return; }
    setLoading(true); setErr("");
    const res = await fetch(SB_URL + "/auth/v1/recover", {
      method: "POST",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    setLoading(false);
    if (res.status === 429) {
      setErr("Urinishlar soni ko'payib ketdi. 5-10 daqiqadan keyin qayta urinib ko'ring.");
      return;
    }
    setTab("reset-sent");
  };

  const Brand = () => (
    <div className="modal-brand">
      <div className="brand-mark" style={{ width: 44, height: 44 }}><AC_I.basket style={{ width: 25, height: 25 }} /></div>
      <div className="brand-name" style={{ fontSize: 22 }}>SAVAT<span className="uz">.UZ</span></div>
    </div>
  );

  // OTP ekrani
  if (tab === "verify") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>

        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📧</div>

        </div>
        <div className="auth-fields">
          <label className="field">
            <span>Tasdiqlash kodi</span>
            <div className="field-in">
              <AC_I.lock style={{ width: 18, height: 18 }} />
              <input value={otp} onChange={e => setOtp(e.target.value)} placeholder="123456"

            </div>
          </label>
          {err && <p className="field-err">{err}</p>}
        </div>
        <button className="auth-submit" onClick={doVerify} disabled={loading}>
          {loading ? "Tekshirilmoqda..." : "Tasdiqlash"} {!loading && <AC_I.arrow style={{ width: 18, height: 18 }} />}
        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}
          onClick={() => { setTab("login"); setErr(""); }}>← Kirishga qaytish</p>
      </div>
    </div>
  );

  // Parol tiklash yuborildi
  if (tab === "reset-sent") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ textAlign: "center", padding: "16px 0" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>✉️</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 8 }}>Xat yuborildi</div>
          <div style={{ color: "#8a849c", fontSize: 13.5 }}><b>{email}</b> manziliga parolni tiklash havolasi yuborildi. Pochtangizni tekshiring.</div>
        </div>
        <button className="auth-submit" onClick={() => { setTab("login"); setErr(""); }}>
          Kirishga qaytish
        </button>
      </div>
    </div>
  );

  // Parolni unutdim
  if (tab === "forgot") return (
    <div className="modal-scrim on" onClick={onClose}>
      <div className="modal pop" onClick={e => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose}><AC_I.x style={{ width: 20, height: 20 }} /></button>
        <Brand />
        <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 4 }}>Parolni tiklash</div>
        <div style={{ color: "#8a849c", fontSize: 13.5, marginBottom: 16 }}>Emailingizga tiklash havolasi yuboramiz</div>
        <div className="auth-fields">
          <label className="field">
            <span>Email</span>
            <div className="field-in">
              <AC_I.user style={{ width: 18, height: 18 }} />
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="email@misol.com"
                onKeyDown={e => { if (e.key === "Enter") doForgot(); }} />

        <button className="auth-submit" onClick={doForgot} disabled={loading}>

        </button>
        <p className="auth-note" style={{ textAlign: "center", cursor: "pointer", color: "#6c2bd9" }}

      </div>

  // Asosiy kirish / ro'yxatdan o'tish
  return (
    <div className="modal-scrim on" onClick={onClose}>
